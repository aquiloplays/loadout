<!-- L_n back overlays -->

<!-- L4: growth plate behind core -->
<rect x="32" y="92" width="192" height="124" rx="14"
      fill="#5E6471" opacity="0.35"/>
<!-- L1 building art -->

  
<ellipse cx="128" cy="232" rx="92" ry="14" fill="url(#gk-contact-shadow)"/>

    <rect x="40" y="88" width="176" height="136" rx="12" ry="12"
          fill="url(#gk-rgrad-stone)"
          stroke="#262B36" stroke-width="4"/>
    <path d="M 42 100
             Q 42 90 52 90
             L 204 90
             Q 214 90 214 100
             L 214 145.12
             Q 128 162.8 42 145.12
             Z"
          fill="url(#gk-gloss)" opacity="0.7" pointer-events="none"/>
<!-- crenellations -->
<g fill="url(#gk-rgrad-stone)" stroke="#262B36" stroke-width="3" stroke-linejoin="round">
  <rect x="40"        y="72" width="22" height="22" rx="2"/>
  <rect x="72"   y="72" width="22" height="22" rx="2"/>
  <rect x="104"   y="72" width="22" height="22" rx="2"/>
  <rect x="136"   y="72" width="22" height="22" rx="2"/>
  <rect x="168"  y="72" width="22" height="22" rx="2"/>
  <rect x="194"  y="72" width="22" height="22" rx="2"/>
</g>
<!-- mortar courses (depth detail) -->
<g stroke="#262B36" stroke-width="1.5" opacity="0.55">
  <line x1="44" y1="130" x2="212" y2="130"/>
  <line x1="44" y1="170" x2="212" y2="170"/>
  <line x1="68" y1="98" x2="68" y2="130"/>
  <line x1="124" y1="98" x2="124" y2="130"/>
  <line x1="172" y1="98" x2="172" y2="130"/>
</g>
<!-- door -->

    <path d="M 106 220
