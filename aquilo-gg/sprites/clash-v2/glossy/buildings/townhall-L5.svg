             L 150 220 Z"
          fill="url(#gk-grad-wood)" stroke="#0A0D14" stroke-width="3"/>
    <circle cx="139" cy="200.4" r="2.5" fill="#FFD970" stroke="#0A0D14" stroke-width="1"/>
<!-- gold band above door (rich accent) -->
<rect x="98" y="156" width="60" height="10" rx="3"
