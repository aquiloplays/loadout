</g>
<!-- L6: brand emblem badge (chest-medallion style) -->
<circle cx="128" cy="66" r="9"
        fill="url(#gk-rgrad-gold)" stroke="#3F2D01" stroke-width="2"/>
<!-- mini bolt motif inside emblem -->
<path d="M 130 60
         L 124 66
         L 127 66
         L 126 72
         L 132 66
         L 129 66 Z"
      fill="#3F2D01" opacity="0.85"/>

<!-- L8: gem mount -->
<g>
  <path d="M 116 18
           L 128 2
           L 140 18
           L 134 26
           L 122 26 Z"
        fill="url(#gk-grad-gold)" stroke="#3F2D01" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="128" cy="18" r="8"
