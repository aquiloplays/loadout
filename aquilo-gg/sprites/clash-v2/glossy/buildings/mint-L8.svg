<!-- L_n back overlays -->

<!-- L7: rarity glow halo -->
<defs>
  <radialGradient id="lvl-glow" cx="0.5" cy="0.55" r="0.55">
    <stop offset="0"   stop-color="#B581FF" stop-opacity="0.65"/>
    <stop offset="0.6" stop-color="#B581FF" stop-opacity="0.25"/>
    <stop offset="1"   stop-color="#B581FF" stop-opacity="0"/>
  </radialGradient>
</defs>
<ellipse cx="128" cy="136" rx="118" ry="100" fill="url(#lvl-glow)"/>

<!-- L4: growth plate behind core -->
<rect x="32" y="92" width="192" height="124" rx="14"
      fill="#5E6471" opacity="0.35"/>
<!-- L1 building art -->

  
<ellipse cx="128" cy="232" rx="92" ry="14" fill="url(#gk-contact-shadow)"/>

    <rect x="40" y="144" width="176" height="80" rx="6" ry="6"
          fill="url(#gk-grad-cream)"
          stroke="#5A4A20" stroke-width="4"/>
    <path d="M 42 150
             Q 42 146 46 146
             L 210 146
             Q 214 146 214 150
             L 214 177.6
             Q 128 188 42 177.6
             Z"
          fill="url(#gk-gloss)" opacity="0.7" pointer-events="none"/>
<!-- roof -->
<path d="M 28 150
         L 128 80
         L 228 150
         L 216 158
         L 40 158 Z"
      fill="url(#gk-grad-gold)" stroke="#3F2D01" stroke-width="4" stroke-linejoin="round"/>
<!-- roof gloss -->
<path d="M 34 148 L 122 84 L 126 156 L 44 156 Z"
      fill="url(#gk-gloss)" opacity="0.5"/>
<!-- chimney -->
<rect x="166" y="108" width="22" height="40" rx="3"
      fill="url(#gk-grad-stone)" stroke="#262B36" stroke-width="3"/>
<!-- chimney puff -->
<ellipse cx="177" cy="94" rx="16" ry="9" fill="#FFF6D8" opacity="0.85" stroke="#262B36" stroke-width="1.5"/>
<ellipse cx="188" cy="80" rx="10" ry="6" fill="#FFF6D8" opacity="0.7"/>
<!-- door -->

    <path d="M 90 220
             L 90 190
             A 18 18 0 0 1 126 190
             L 126 220 Z"
          fill="url(#gk-grad-wood)" stroke="#0A0D14" stroke-width="3"/>
    <circle cx="117" cy="203.2" r="2.5" fill="#FFD970" stroke="#0A0D14" stroke-width="1"/>
<!-- accent icon plaque to right of door -->
<rect x="140" y="180" width="48" height="48" rx="5"
      fill="url(#gk-grad-cream)" stroke="#0A0D14" stroke-width="2.5"/>

<circle cx="164" cy="204" r="14" fill="url(#gk-rgrad-gold)" stroke="#3F2D01" stroke-width="2.5"/>
<text x="164" y="209" font-size="14" font-family="serif" font-weight="bold"
      fill="#3F2D01" text-anchor="middle">$</text>


<!-- L_n front overlays -->

<!-- L2: left pennant -->
<g>
  <rect x="90" y="30" width="4" height="36" rx="1.5"
        fill="url(#gk-grad-wood)" stroke="#3B240F" stroke-width="1.5"/>
  <path d="M 94 34
           L 114 38
           L 94 42 Z"
        fill="url(#gk-grad-ruby)" stroke="#3B0510" stroke-width="2" stroke-linejoin="round"/>
</g>

<!-- L3: gold trim band -->
<rect x="44" y="138" width="168" height="6" rx="2"
