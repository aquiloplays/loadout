<rect x="44" y="138" width="168" height="2" fill="#FFFFFF" opacity="0.55"/>

<!-- L5: corner rivets -->
<g fill="url(#gk-rgrad-gold)" stroke="#3F2D01" stroke-width="1.5">
  <circle cx="48"  cy="200" r="4"/>
  <circle cx="208" cy="200" r="4"/>
  <circle cx="48"  cy="100" r="3.5"/>
  <circle cx="208" cy="100" r="3.5"/>
</g>

<!-- L6: right pennant + emblem -->
<g>
  <rect x="162" y="30" width="4" height="36" rx="1.5"
