<!-- L_n back overlays -->

<!-- L4: growth plate behind core -->
<rect x="32" y="92" width="192" height="124" rx="14"
      fill="#5E6471" opacity="0.35"/>
<!-- L1 building art -->

  
<ellipse cx="128" cy="232" rx="92" ry="14" fill="url(#gk-contact-shadow)"/>
<!-- walls -->

    <rect x="36" y="130" width="184" height="94" rx="6" ry="6"
          fill="url(#gk-grad-wood)"
          stroke="#3B240F" stroke-width="4"/>
    <path d="M 38 136
             Q 38 132 42 132
             L 214 132
             Q 218 132 218 136
             L 218 169.48
             Q 128 181.7 38 169.48
             Z"
          fill="url(#gk-gloss)" opacity="0.7" pointer-events="none"/>
<!-- pitched roof -->
<path d="M 26 136
