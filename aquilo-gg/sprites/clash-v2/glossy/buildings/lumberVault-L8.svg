<!-- L_n back overlays -->

<!-- L7: rarity glow halo -->
<defs>
  <radialGradient id="lvl-glow" cx="0.5" cy="0.55" r="0.55">
    <stop offset="0"   stop-color="#B581FF" stop-opacity="0.65"/>
    <stop offset="0.6" stop-color="#B581FF" stop-opacity="0.25"/>
    <stop offset="1"   stop-color="#B581FF" stop-opacity="0"/>
  </radialGradient>
</defs>
<ellipse cx="128" cy="136" rx="118" ry="100" fill="url(#lvl-glow)"/>

<!-- L4: growth plate behind core -->
<rect x="32" y="92" width="192" height="124" rx="14"
      fill="#5E6471" opacity="0.35"/>
<!-- L1 building art -->

  
<ellipse cx="128" cy="232" rx="92" ry="14" fill="url(#gk-contact-shadow)"/>

    <rect x="36" y="162" width="184" height="62" rx="12" ry="12"
          fill="url(#gk-grad-wood)"
