<!-- L_n back overlays -->

<!-- L4: growth plate behind core -->
<rect x="32" y="92" width="192" height="124" rx="14"
      fill="#5E6471" opacity="0.35"/>
<!-- L1 building art -->

  
<ellipse cx="128" cy="232" rx="92" ry="14" fill="url(#gk-contact-shadow)"/>
<!-- stone tower -->

    <rect x="84" y="102" width="88" height="116" rx="10" ry="10"
          fill="url(#gk-rgrad-stone)"
          stroke="#262B36" stroke-width="4"/>
    <path d="M 86 112
             Q 86 104 94 104
             L 162 104
             Q 170 104 170 112
             L 170 150.72
             Q 128 165.8 86 150.72
             Z"
          fill="url(#gk-gloss)" opacity="0.7" pointer-events="none"/>
<!-- ring of corbels (top platform overhang) -->
<rect x="76" y="94" width="104" height="14" rx="3"
      fill="url(#gk-grad-stone)" stroke="#262B36" stroke-width="3"/>
<!-- merlons on the platform -->
<g fill="url(#gk-grad-stone)" stroke="#262B36" stroke-width="3" stroke-linejoin="round">
  <rect x="76"      y="82" width="16" height="14" rx="1"/>
  <rect x="98"     y="82" width="16" height="14" rx="1"/>
  <rect x="120"     y="82" width="16" height="14" rx="1"/>
  <rect x="142"     y="82" width="16" height="14" rx="1"/>
  <rect x="164"     y="82" width="16" height="14" rx="1"/>
</g>
<!-- conical wooden roof -->
<path d="M 70 86
         L 128 16
         L 186 86 Z"
      fill="url(#gk-grad-wood)" stroke="#3B240F" stroke-width="4" stroke-linejoin="round"/>
<!-- roof gloss -->
<path d="M 74 84 L 122 22 L 126 86 Z"
      fill="url(#gk-gloss)" opacity="0.55"/>
<!-- gold finial -->
<circle cx="128" cy="12" r="6" fill="url(#gk-rgrad-gold)" stroke="#3F2D01" stroke-width="2"/>
<path d="M 128 4 L 125 -6 L 128 -14 L 131 -6 Z"
      fill="url(#gk-grad-gold)" stroke="#3F2D01" stroke-width="2" stroke-linejoin="round"/>
<!-- arrow slits -->
<rect x="110" y="122" width="6" height="22" rx="2" fill="#0A0D14" stroke="#262B36" stroke-width="1.5"/>
<rect x="134" y="122" width="6" height="22" rx="2" fill="#0A0D14" stroke="#262B36" stroke-width="1.5"/>
<rect x="122" y="174" width="6" height="22" rx="2" fill="#0A0D14" stroke="#262B36" stroke-width="1.5"/>
<!-- door at base -->

    <path d="M 113 212
             L 113 185
             A 15 15 0 0 1 143 185
             L 143 212 Z"
          fill="url(#gk-grad-wood)" stroke="#0A0D14" stroke-width="3"/>
    <circle cx="135.5" cy="197.3" r="2.5" fill="#FFD970" stroke="#0A0D14" stroke-width="1"/>


<!-- L_n front overlays -->

<!-- L2: left pennant -->
<g>
  <rect x="90" y="30" width="4" height="36" rx="1.5"
        fill="url(#gk-grad-wood)" stroke="#3B240F" stroke-width="1.5"/>
  <path d="M 94 34
           L 114 38
           L 94 42 Z"
        fill="url(#gk-grad-ruby)" stroke="#3B0510" stroke-width="2" stroke-linejoin="round"/>
</g>

<!-- L3: gold trim band -->
<rect x="44" y="138" width="168" height="6" rx="2"
      fill="url(#gk-grad-gold)" stroke="#3F2D01" stroke-width="1.5" opacity="0.95"/>
<rect x="44" y="138" width="168" height="2" fill="#FFFFFF" opacity="0.55"/>

<!-- L5: corner rivets -->
<g fill="url(#gk-rgrad-gold)" stroke="#3F2D01" stroke-width="1.5">
  <circle cx="48"  cy="200" r="4"/>
  <circle cx="208" cy="200" r="4"/>
  <circle cx="48"  cy="100" r="3.5"/>
  <circle cx="208" cy="100" r="3.5"/>
</g>

<!-- L6: right pennant + emblem -->
<g>
  <rect x="162" y="30" width="4" height="36" rx="1.5"
        fill="url(#gk-grad-wood)" stroke="#3B240F" stroke-width="1.5"/>
  <path d="M 166 34
           L 186 38
           L 166 42 Z"
        fill="url(#gk-grad-sapphire)" stroke="#04143B" stroke-width="2" stroke-linejoin="round"/>
</g>
<!-- L6: brand emblem badge (chest-medallion style) -->
<circle cx="128" cy="66" r="9"
        fill="url(#gk-rgrad-gold)" stroke="#3F2D01" stroke-width="2"/>
<!-- mini bolt motif inside emblem -->
<path d="M 130 60
         L 124 66
         L 127 66
         L 126 72
         L 132 66
         L 129 66 Z"
