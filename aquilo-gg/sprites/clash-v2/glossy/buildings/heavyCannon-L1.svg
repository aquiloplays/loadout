<ellipse cx="128" cy="232" rx="92" ry="14" fill="url(#gk-contact-shadow)"/>
<!-- column base flare -->

    <ellipse cx="128" cy="216" rx="56" ry="14"
             fill="url(#gk-grad-iron)" stroke="#0B0E1C" stroke-width="4"/>
    <path d="M 80.4 214.6
             A 47.6 9.799999999999999 0 0 1 164.4 206.2
             A 39.199999999999996 5.6000000000000005 0 0 1 80.4 214.6 Z"
          fill="url(#gk-gloss)" opacity="0.7" pointer-events="none"/>
<!-- tower column -->

    <rect x="88" y="96" width="80" height="120" rx="10" ry="10"
          fill="url(#gk-grad-iron)"
          stroke="#0B0E1C" stroke-width="4"/>
    <path d="M 90 106
             Q 90 98 98 98
             L 158 98
             Q 166 98 166 106
             L 166 146.4
             Q 128 162 90 146.4
             Z"
          fill="url(#gk-gloss)" opacity="0.7" pointer-events="none"/>
<!-- accent band at top -->
<rect x="82" y="92" width="92" height="12" rx="3"
