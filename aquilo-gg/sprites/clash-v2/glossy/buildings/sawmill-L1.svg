  <circle cx="0" cy="0" r="6" fill="#43485A" stroke="#0A0D14" stroke-width="2"/>
</g>
<!-- water splash at base of wheel -->
<ellipse cx="76" cy="220" rx="36" ry="6" fill="url(#gk-grad-sky)" opacity="0.7"/>

