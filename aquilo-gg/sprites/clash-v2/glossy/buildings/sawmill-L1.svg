<ellipse cx="128" cy="232" rx="92" ry="14" fill="url(#gk-contact-shadow)"/>
<!-- log pile (front) -->
<g fill="url(#gk-grad-wood)" stroke="#3B240F" stroke-width="2.5">
  <ellipse cx="60" cy="214" rx="20" ry="8"/>
  <ellipse cx="76" cy="202" rx="20" ry="8"/>
  <ellipse cx="58" cy="190" rx="20" ry="8"/>
</g>
<g stroke="#3B240F" stroke-width="1.2" fill="#6E4621">
  <circle cx="60" cy="214" r="4"/>
  <circle cx="76" cy="202" r="4"/>
  <circle cx="58" cy="190" r="4"/>
</g>
<!-- mill hut body (right side) -->
<rect x="130" y="130" width="90" height="90" rx="6" ry="6"
    fill="url(#gk-grad-wood)" stroke="#3B240F" stroke-width="4"/>
<!-- pitched red roof -->
<path d="M 122 134 L 175 88 L 228 134 L 220 142 L 130 142 Z"
      fill="url(#gk-grad-brick)" stroke="#321009" stroke-width="4" stroke-linejoin="round"/>
<path d="M 128 134 L 172 92 L 174 100 L 134 142 Z" fill="url(#gk-gloss)" opacity="0.5" pointer-events="none"/>
<!-- mill door -->
<rect x="160" y="170" width="30" height="50" rx="3" fill="#6E4621" stroke="#3B240F" stroke-width="2.5"/>
<circle cx="184" cy="195" r="2" fill="#FFD970"/>
<!-- waterwheel (big!) -->
<g transform="translate(76, 160)">
  <circle cx="0" cy="0" r="48" fill="url(#gk-rgrad-wood)" stroke="#3B240F" stroke-width="4"/>
  <circle cx="0" cy="0" r="34" fill="none" stroke="#3B240F" stroke-width="3" opacity="0.7"/>
  <!-- spokes -->
  <line x1="12.0" y1="0.0" x2="46.0" y2="0.0" stroke="#3B240F" stroke-width="3"/><line x1="8.5" y1="8.5" x2="32.5" y2="32.5" stroke="#3B240F" stroke-width="3"/><line x1="-0.0" y1="12.0" x2="-0.0" y2="46.0" stroke="#3B240F" stroke-width="3"/><line x1="-8.5" y1="8.5" x2="-32.5" y2="32.5" stroke="#3B240F" stroke-width="3"/><line x1="-12.0" y1="-0.0" x2="-46.0" y2="-0.0" stroke="#3B240F" stroke-width="3"/><line x1="-8.5" y1="-8.5" x2="-32.5" y2="-32.5" stroke="#3B240F" stroke-width="3"/><line x1="-0.0" y1="-12.0" x2="-0.0" y2="-46.0" stroke="#3B240F" stroke-width="3"/><line x1="8.5" y1="-8.5" x2="32.5" y2="-32.5" stroke="#3B240F" stroke-width="3"/>
  <!-- paddles -->
  <rect x="35.6" y="13.9" width="10" height="6"
                  transform="rotate(22 40.6 16.9)"
                  fill="#A06A36" stroke="#3B240F" stroke-width="1.5"/><rect x="11.8" y="37.6" width="10" height="6"
                  transform="rotate(67 16.8 40.6)"
                  fill="#A06A36" stroke="#3B240F" stroke-width="1.5"/><rect x="-21.8" y="37.7" width="10" height="6"
                  transform="rotate(112 -16.8 40.7)"
                  fill="#A06A36" stroke="#3B240F" stroke-width="1.5"/><rect x="-45.7" y="13.8" width="10" height="6"
                  transform="rotate(157 -40.7 16.8)"
                  fill="#A06A36" stroke="#3B240F" stroke-width="1.5"/><rect x="-45.7" y="-19.8" width="10" height="6"
                  transform="rotate(202 -40.7 -16.8)"
                  fill="#A06A36" stroke="#3B240F" stroke-width="1.5"/><rect x="-21.8" y="-43.7" width="10" height="6"
                  transform="rotate(247 -16.8 -40.7)"
                  fill="#A06A36" stroke="#3B240F" stroke-width="1.5"/><rect x="11.8" y="-43.7" width="10" height="6"
                  transform="rotate(292 16.8 -40.7)"
                  fill="#A06A36" stroke="#3B240F" stroke-width="1.5"/><rect x="35.6" y="-19.9" width="10" height="6"
