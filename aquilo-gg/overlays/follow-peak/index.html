<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Follow Overlay, PEAK (Summit Climb)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "Inter", "Segoe UI", system-ui, sans-serif;
  }

  /* Ambient snow particle layer (full window, behind stage) */
  #bgFX {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  #stage {
    position: fixed;
    left: 50%;
    bottom: 20px;
    transform: translate3d(-50%, 0, 0);
    width: 440px;
    height: 260px;
    pointer-events: none;
    z-index: 1;
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  #stage.shake { animation: stageShake 0.2s linear; }
  @keyframes stageShake {
    0%,100% { transform: translate3d(-50%, 0, 0); }
    20%  { transform: translate3d(calc(-50% - 4px), 2px, 0); }
    40%  { transform: translate3d(calc(-50% + 4px), -2px, 0); }
    60%  { transform: translate3d(calc(-50% - 3px), 1px, 0); }
    80%  { transform: translate3d(calc(-50% + 3px), -1px, 0); }
  }

  /* 440x36 alpine ice-blue bar */
  #bar {
    position: absolute;
    left: 0; bottom: 0;
    width: 440px;
    height: 36px;
    overflow: hidden;
    pointer-events: auto;
    isolation: isolate;
    box-shadow:
      0 4px 14px rgba(0,0,0,0.8),
      0 0 0 2px #1c3340,
      0 0 0 3px #88c8e0,
      0 0 18px rgba(136,200,224,0.50);
    animation: barPulse 2.6s ease-in-out infinite;
  }
  /* Gentle alpine glow breathe */
  @keyframes barPulse {
    0%, 100% { box-shadow: 0 4px 14px rgba(0,0,0,0.8), 0 0 0 2px #1c3340, 0 0 0 3px #88c8e0, 0 0 16px rgba(136,200,224,0.42); }
    50%      { box-shadow: 0 4px 14px rgba(0,0,0,0.8), 0 0 0 2px #1c3340, 0 0 0 3px #a6dcf0, 0 0 28px rgba(136,200,224,0.85); }
  }

  /* Cold alpine background */
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 160% at 50% 0%, rgba(80,140,170,0.45) 0%, rgba(20,34,44,1) 70%),
      linear-gradient(180deg, #1a2c38 0%, #0c161d 100%);
    z-index: 1;
  }
  /* Faint frost sheen over the bar */
  .scan {
    position: absolute; inset: 0;
    z-index: 3;
    pointer-events: none;
    background: repeating-linear-gradient(
      180deg,
      rgba(255,255,255,0) 0px,
      rgba(255,255,255,0) 1px,
      rgba(255,255,255,0.05) 2px,
      rgba(255,255,255,0.05) 3px
    );
    mix-blend-mode: screen;
  }
  /* CTA / thank-you text layer */
  #textLayer {
    position: absolute; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    z-index: 5;
    color: #f2f9ff;
    font-family: "Inter", "Segoe UI", sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 0.5px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-shadow:
      0 0 5px rgba(136,200,224,0.9),
      0 0 12px rgba(136,200,224,0.55),
      1px 1px 0 #0c161d;
  }
  #textInner {
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: font-size 0.15s ease;
  }

  #barFX {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 4;
    pointer-events: none;
  }

  #demoPanel {
    position: fixed; top: 10px; right: 10px;
    background: rgba(16,28,36,0.92); color: #d6ecf6;
    font-family: "Inter", sans-serif; font-size: 12px;
    padding: 10px; border-radius: 6px; border: 1px solid rgba(136,200,224,0.45);
    z-index: 9999; min-width: 196px;
  }
  #demoPanel h4 { font-size: 12px; margin-bottom: 6px; letter-spacing: 1px; color: #a6dcf0; font-weight: 800; }
  #demoPanel button {
    display: block; width: 100%; margin-top: 4px; padding: 5px 8px;
    background: #1b3848; color: #e6f4fc; border: 1px solid #3a6a82; border-radius: 4px; cursor: pointer; font-size: 11px;
    font-family: "Inter", sans-serif; font-weight: 600;
  }
  #demoPanel button:hover { background: #244c60; }
  #demoPanel select, #demoPanel input[type="text"], #demoPanel input[type="number"] {
    width: 100%; padding: 4px; background: #11242e; color: #e6f4fc; border: 1px solid #3a6a82; border-radius: 3px; font-size: 11px; margin-top: 4px;
    font-family: "Inter", sans-serif;
  }
  #demoPanel.hidden { display: none; }
  #wsStatus { font-size: 10px; padding: 3px 6px; border-radius: 3px; display: inline-block; margin-top: 6px; }
  #wsStatus.on  { background: #14463a; color: #8ff0c8; }
  #wsStatus.off { background: #4a1313; color: #ff8f8f; }
  #wsStatus.try { background: #4a4413; color: #ffd98f; }
  .row { display: flex; gap: 4px; }
  .row > * { flex: 1; }
</style>
</head>
<body>

<canvas id="bgFX"></canvas>

<div id="stage">
  <canvas id="aboveFX" width="440" height="224"></canvas>
  <div id="bar">
    <div class="bg"></div>
    <canvas id="barFX" width="440" height="36"></canvas>
    <div class="scan"></div>
    <div id="textLayer"><span id="textInner">Follow = Random Game Effect</span></div>
  </div>
</div>

<div id="demoPanel" class="hidden">
  <h4>PEAK OVERLAY</h4>
  <button id="btnFollow">Trigger 1 Follow</button>
  <input type="text" id="demoUser" placeholder="username" value="Summit">
  <input type="number" id="demoBatch" placeholder="batch size" value="1" min="1" max="20">
  <button id="btnBatch">Trigger Batch</button>
  <button id="btnPeek">Test Idle Peek</button>
  <button id="btnLoop">Auto-Loop: OFF</button>
  <button id="btnHide">Hide Panel (H)</button>
  <div id="wsStatus" class="off">WS: disconnected</div>
</div>

<script>
// ============================================================
// CONFIG, PEAK / co-op summit climb theme
// ============================================================
const CTA_TEXT   = "Follow = Random Game Effect";
const PROMO_TEXT = "Reach the peak, aquilo.gg • Community Night";

// URL params (preserved from template family + PEAK extras)
const params       = new URLSearchParams(location.search);
const SHOW_DEMO    = params.get("demo") === "1";
const CYCLE_NAMES  = params.get("cycle") !== "off";
const PARTICLE_KIND= (params.get("particles") || "snow").toLowerCase(); // snow | dust | none
const SHOT_MODE    = params.get("shot"); // "mobs" => line up all sprites for a contact shot

// ============================================================
// STATE
// ============================================================
const state = {
  animating: false,
  followQueue: [],
  thankActive: false,
  totalFollowers: 0,
  lastFollower: "",
  recentFollowers: [],
  signShowTime: 0,
  signDuration: 5000,
  signImgCache: {},
  idleSprites: [],
  idleTimer: null,
  idleAnimFrame: null,
  autoLoop: false,
  autoLoopTimer: null,
};

// ============================================================
// DOM refs
// ============================================================
const $stage     = document.getElementById("stage");
const $bar       = document.getElementById("bar");
const $textInner = document.getElementById("textInner");
const $textLayer = document.getElementById("textLayer");
const $barFX     = document.getElementById("barFX");
const $aboveFX   = document.getElementById("aboveFX");
const $bgFX      = document.getElementById("bgFX");
const barCtx     = $barFX.getContext("2d");
const aboveCtx   = $aboveFX.getContext("2d");

// ============================================================
// UTILITIES
// ============================================================
function clearBarFX()   { barCtx.clearRect(0, 0, $barFX.width, $barFX.height); }
function clearAboveFX() { aboveCtx.clearRect(0, 0, $aboveFX.width, $aboveFX.height); }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

function blendHex(a, b, t) {
  const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
  const br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

function renderCTA() {
  resetTextSize();
  $textInner.textContent = CTA_TEXT;
  $textLayer.style.visibility = "visible";
}

const BASE_FONT_SIZE = 22;
const MIN_FONT_SIZE  = 11;
function resetTextSize() { $textInner.style.fontSize = ""; }

// ============================================================
// PEAK PALETTE, ice-blue / snow-white / slate rock / summit-gold
// ============================================================
const GP = {
  main:   { fill:"#88c8e0", line:"#1c3340", hi:"#f2f9ff", dim:"#5a6b78", glow:"#a6dcf0" },
  shadow: { fill:"#0e1c24", line:"#0e1c24", hi:"#0e1c24", dim:"#0e1c24", glow:"#0e1c24" },
  flash:  { fill:"#f2f9ff", line:"#cfeaf6", hi:"#ffffff", dim:"#e6f4fc", glow:"#ffffff" },
};

// Faint frost sheen drawn over an icon's bounding box
function drawScanlines(ctx, x, y, w, h, alpha) {
  ctx.save();
  ctx.globalAlpha = (alpha == null ? 1 : alpha) * 0.10;
  ctx.fillStyle = "#0c161d";
  for (let yy = Math.floor(y); yy < y + h; yy += 2) ctx.fillRect(x, yy, w, 1);
  ctx.restore();
}

// ============================================================
// PEAK SPRITES, code-drawn alpine iconography.
// Each fn draws an icon centered at the origin, spanning ~ +/-7.5u
// where u = size/16. Color set `c` = {fill,line,hi,dim,glow}.
// drawSprite() handles the 2.5D extrude, glow, and frost sheen.
// ============================================================
function lineW(u, n) { return Math.max(1, u * n); }

// 1) Climber REACHING UP, body stretched, one arm high grabbing a hold
function drawClimberReach(ctx, u, c) {
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineJoin = "round"; ctx.lineCap = "round";
  // head
  ctx.beginPath(); ctx.arc(-0.5*u, -5.2*u, 1.7*u, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // torso (leaning into wall)
  ctx.lineWidth = lineW(u,1.6);
  ctx.beginPath(); ctx.moveTo(-0.4*u, -3.4*u); ctx.lineTo(0.4*u, 1.6*u); ctx.stroke();
  // high reaching arm (up-right, grabbing)
  ctx.beginPath(); ctx.moveTo(-0.2*u, -2.4*u); ctx.lineTo(2.0*u, -5.0*u); ctx.lineTo(3.4*u, -7.0*u); ctx.stroke();
  // low support arm (down-left to a hold)
  ctx.beginPath(); ctx.moveTo(-0.3*u, -1.6*u); ctx.lineTo(-2.6*u, 0.2*u); ctx.lineTo(-3.4*u, 1.6*u); ctx.stroke();
  // legs braced on wall
  ctx.beginPath(); ctx.moveTo(0.4*u, 1.6*u); ctx.lineTo(2.2*u, 4.2*u); ctx.lineTo(2.6*u, 6.6*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0.3*u, 1.4*u); ctx.lineTo(-1.4*u, 4.4*u); ctx.lineTo(-1.0*u, 6.8*u); ctx.stroke();
  // grabbed hold highlight (top)
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.arc(3.6*u, -7.2*u, 0.7*u, 0, Math.PI*2); ctx.fill();
}

// 2) Climber HANGING, both arms up on an overhang, body dangling
function drawClimberHang(ctx, u, c) {
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineJoin = "round"; ctx.lineCap = "round";
  // overhang ledge above
  ctx.fillStyle = c.dim;
  roundRect(ctx, -6.5*u, -7.6*u, 13*u, 1.8*u, 0.5*u); ctx.fill();
  ctx.fillStyle = c.fill;
  // head
  ctx.beginPath(); ctx.arc(0, -4.0*u, 1.7*u, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // torso hanging straight down
  ctx.lineWidth = lineW(u,1.6);
  ctx.beginPath(); ctx.moveTo(0, -2.2*u); ctx.lineTo(0, 3.4*u); ctx.stroke();
  // both arms up to the ledge
  ctx.beginPath(); ctx.moveTo(-0.2*u, -3.2*u); ctx.lineTo(-2.4*u, -5.4*u); ctx.lineTo(-2.8*u, -6.6*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0.2*u, -3.2*u); ctx.lineTo(2.4*u, -5.4*u); ctx.lineTo(2.8*u, -6.6*u); ctx.stroke();
  // dangling legs (slight swing)
  ctx.beginPath(); ctx.moveTo(0, 3.4*u); ctx.lineTo(-1.4*u, 5.6*u); ctx.lineTo(-1.0*u, 7.2*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 3.4*u); ctx.lineTo(1.2*u, 5.8*u); ctx.lineTo(1.8*u, 7.0*u); ctx.stroke();
}

// 3) Climber MID-STRIDE, scrambling up, one leg high, opposite arm reaching
function drawClimberStride(ctx, u, c) {
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineJoin = "round"; ctx.lineCap = "round";
  // head
  ctx.beginPath(); ctx.arc(1.0*u, -4.8*u, 1.7*u, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // torso angled forward
  ctx.lineWidth = lineW(u,1.6);
  ctx.beginPath(); ctx.moveTo(0.8*u, -3.0*u); ctx.lineTo(-0.6*u, 1.8*u); ctx.stroke();
  // forward reaching arm (up)
  ctx.beginPath(); ctx.moveTo(0.7*u, -2.2*u); ctx.lineTo(2.8*u, -4.0*u); ctx.lineTo(4.2*u, -5.2*u); ctx.stroke();
  // trailing arm (back-down)
  ctx.beginPath(); ctx.moveTo(0.4*u, -1.0*u); ctx.lineTo(-2.4*u, -1.8*u); ctx.lineTo(-3.6*u, -1.0*u); ctx.stroke();
  // high stepping leg (knee up)
  ctx.beginPath(); ctx.moveTo(-0.6*u, 1.8*u); ctx.lineTo(2.2*u, 1.4*u); ctx.lineTo(3.4*u, -0.6*u); ctx.stroke();
  // trailing pushing leg (down-back)
  ctx.beginPath(); ctx.moveTo(-0.6*u, 1.8*u); ctx.lineTo(-2.4*u, 4.8*u); ctx.lineTo(-3.0*u, 6.8*u); ctx.stroke();
}

// 4) Mountain peak, snow-capped triangle with ridge lines
function drawPeak(ctx, u, c) {
  ctx.lineJoin = "round";
  // main rock mass
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6);
  ctx.beginPath();
  ctx.moveTo(-7.2*u, 6.4*u);
  ctx.lineTo(-1.2*u, -6.6*u);   // main summit
  ctx.lineTo(2.4*u, -1.4*u);    // saddle
  ctx.lineTo(4.4*u, -4.0*u);    // secondary peak
  ctx.lineTo(7.4*u, 6.4*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // slate-grey lower rock shading (right face)
  ctx.fillStyle = c.dim;
  ctx.beginPath();
  ctx.moveTo(-1.2*u, -6.6*u);
  ctx.lineTo(2.4*u, -1.4*u);
  ctx.lineTo(0.6*u, 6.4*u);
  ctx.lineTo(-1.2*u, 6.4*u);
  ctx.closePath(); ctx.fill();
  // snow caps (white)
  ctx.fillStyle = c.hi;
  ctx.beginPath();
  ctx.moveTo(-1.2*u, -6.6*u);
  ctx.lineTo(-3.2*u, -2.2*u);
  ctx.lineTo(-2.1*u, -1.6*u);
  ctx.lineTo(-0.6*u, -2.8*u);
  ctx.lineTo(0.4*u, -1.4*u);
  ctx.lineTo(1.4*u, -3.0*u);
  ctx.lineTo(2.4*u, -1.4*u);
  ctx.lineTo(1.0*u, -4.2*u);
  ctx.lineTo(-1.2*u, -6.6*u);
  ctx.closePath(); ctx.fill();
  // secondary peak snow
  ctx.beginPath();
  ctx.moveTo(4.4*u, -4.0*u);
  ctx.lineTo(3.4*u, -1.4*u);
  ctx.lineTo(5.4*u, -1.4*u);
  ctx.closePath(); ctx.fill();
  // summit-gold marker flag on top
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.45);
  ctx.beginPath(); ctx.moveTo(-1.2*u, -6.6*u); ctx.lineTo(-1.2*u, -8.4*u); ctx.stroke();
  ctx.fillStyle = "#ffd56b";
  ctx.beginPath(); ctx.moveTo(-1.2*u, -8.4*u); ctx.lineTo(1.0*u, -7.9*u); ctx.lineTo(-1.2*u, -7.0*u); ctx.closePath(); ctx.fill();
}

// 5) Ice-axe / climbing pick, shaft, curved pick head, spike
function drawIceAxe(ctx, u, c) {
  ctx.lineJoin = "round"; ctx.lineCap = "round";
  // shaft (diagonal)
  ctx.strokeStyle = c.fill; ctx.lineWidth = lineW(u,1.5);
  ctx.beginPath(); ctx.moveTo(-4.4*u, -5.2*u); ctx.lineTo(3.6*u, 6.2*u); ctx.stroke();
  // shaft outline
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.4);
  ctx.beginPath(); ctx.moveTo(-4.4*u, -5.2*u); ctx.lineTo(3.6*u, 6.2*u); ctx.stroke();
  // head, curved pick (one side) + adze (other), summit-gold steel
  ctx.fillStyle = "#ffd56b"; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.5);
  // curved pick reaching down-right
  ctx.beginPath();
  ctx.moveTo(-4.4*u, -5.2*u);
  ctx.quadraticCurveTo(0.6*u, -5.0*u, 2.2*u, -1.8*u);
  ctx.quadraticCurveTo(-0.4*u, -3.4*u, -3.0*u, -3.6*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // adze (back, up-left blunt)
  ctx.beginPath();
  ctx.moveTo(-4.4*u, -5.2*u);
  ctx.lineTo(-6.4*u, -6.6*u);
  ctx.lineTo(-5.4*u, -4.2*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // teeth on pick
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.35);
  for (let i = 0; i < 3; i++) {
    const tx = -1.0*u + i*1.0*u, ty = -3.2*u + i*0.4*u;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx+0.4*u, ty+0.6*u); ctx.stroke();
  }
  // spike tip highlight
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.arc(3.6*u, 6.2*u, 0.6*u, 0, Math.PI*2); ctx.fill();
  // grip wrap band
  ctx.strokeStyle = c.dim; ctx.lineWidth = lineW(u,1.0);
  ctx.beginPath(); ctx.moveTo(0.4*u, 1.6*u); ctx.lineTo(1.6*u, 3.4*u); ctx.stroke();
}

// 6) Cave gem, glowing faceted crystal cluster
function drawGem(ctx, u, c) {
  ctx.lineJoin = "round";
  // main crystal
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.55);
  ctx.beginPath();
  ctx.moveTo(0, -6.6*u);
  ctx.lineTo(3.2*u, -1.0*u);
  ctx.lineTo(1.8*u, 5.4*u);
  ctx.lineTo(-1.8*u, 5.4*u);
  ctx.lineTo(-3.2*u, -1.0*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // facet shading (right half darker)
  ctx.fillStyle = c.dim;
  ctx.beginPath();
  ctx.moveTo(0, -6.6*u);
  ctx.lineTo(3.2*u, -1.0*u);
  ctx.lineTo(1.8*u, 5.4*u);
  ctx.lineTo(0, 2.0*u);
  ctx.closePath(); ctx.fill();
  // facet highlight (left edge)
  ctx.fillStyle = c.hi;
  ctx.beginPath();
  ctx.moveTo(0, -6.6*u);
  ctx.lineTo(-3.2*u, -1.0*u);
  ctx.lineTo(-1.0*u, -0.2*u);
  ctx.lineTo(0, -3.4*u);
  ctx.closePath(); ctx.fill();
  // facet seams
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.4);
  ctx.beginPath(); ctx.moveTo(-3.2*u, -1.0*u); ctx.lineTo(0, 2.0*u); ctx.lineTo(3.2*u, -1.0*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, -6.6*u); ctx.lineTo(0, 2.0*u); ctx.stroke();
  // small side shard
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.45);
  ctx.beginPath();
  ctx.moveTo(3.0*u, 0.2*u); ctx.lineTo(5.2*u, 2.0*u); ctx.lineTo(4.0*u, 5.2*u); ctx.lineTo(2.6*u, 4.2*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // glint
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.arc(-1.2*u, -2.6*u, 0.5*u, 0, Math.PI*2); ctx.fill();
}

// 7) Pine tree, alpine conifer, snow-dusted tiers + trunk
function drawPine(ctx, u, c) {
  ctx.lineJoin = "round";
  // trunk
  ctx.fillStyle = c.dim; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.4);
  roundRect(ctx, -0.9*u, 4.4*u, 1.8*u, 2.6*u, 0.3*u); ctx.fill(); ctx.stroke();
  // three foliage tiers
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.5);
  function tier(topY, baseY, halfW) {
    ctx.beginPath();
    ctx.moveTo(0, topY);
    ctx.lineTo(halfW, baseY);
    ctx.lineTo(-halfW, baseY);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }
  tier(0.8*u, 4.6*u, 4.6*u);    // bottom tier
  tier(-2.4*u, 2.0*u, 3.7*u);   // mid tier
  tier(-6.6*u, -1.0*u, 2.8*u);  // top tier
  // snow dusting on each tier (white left edges)
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.moveTo(0, -6.6*u); ctx.lineTo(-1.6*u, -2.4*u); ctx.lineTo(0, -3.0*u); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0, -2.4*u); ctx.lineTo(-2.0*u, 1.4*u); ctx.lineTo(0, 0.6*u); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0, 0.8*u); ctx.lineTo(-2.4*u, 4.2*u); ctx.lineTo(0, 3.2*u); ctx.closePath(); ctx.fill();
}

// 8) Mushroom, biome flora, rounded cap with spots + stem
function drawMushroomSprite(ctx, u, c) {
  ctx.lineJoin = "round";
  // stem
  ctx.fillStyle = c.hi; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.5);
  ctx.beginPath();
  ctx.moveTo(-1.8*u, 6.4*u);
  ctx.quadraticCurveTo(-2.2*u, 1.0*u, -1.6*u, 0.4*u);
  ctx.lineTo(1.6*u, 0.4*u);
  ctx.quadraticCurveTo(2.2*u, 1.0*u, 1.8*u, 6.4*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // cap (dome)
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.55);
  ctx.beginPath();
  ctx.moveTo(-6.4*u, 0.8*u);
  ctx.quadraticCurveTo(-6.6*u, -6.4*u, 0, -6.6*u);
  ctx.quadraticCurveTo(6.6*u, -6.4*u, 6.4*u, 0.8*u);
  ctx.quadraticCurveTo(0, 2.0*u, -6.4*u, 0.8*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // cap shading (right)
  ctx.fillStyle = c.dim;
  ctx.beginPath();
  ctx.moveTo(0.4*u, -6.4*u);
  ctx.quadraticCurveTo(6.6*u, -6.0*u, 6.4*u, 0.8*u);
  ctx.quadraticCurveTo(3.0*u, 1.6*u, 0.4*u, 1.4*u);
  ctx.closePath(); ctx.fill();
  // glowing spots
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.arc(-2.6*u, -3.4*u, 1.1*u, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1.8*u, -4.0*u, 0.8*u, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.2*u, -1.6*u, 0.7*u, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-0.4*u, -1.2*u, 0.6*u, 0, Math.PI*2); ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

const FO_SPRITES = {
  reach:    drawClimberReach,
  hang:     drawClimberHang,
  stride:   drawClimberStride,
  peak:     drawPeak,
  iceaxe:   drawIceAxe,
  gem:      drawGem,
  pine:     drawPine,
  mushroom: drawMushroomSprite,
};
const PEEK_SPRITES = ["reach","hang","stride","peak","iceaxe","gem","pine","mushroom"];

// Draw a sprite with 2.5D extrude shadow + ice-blue glow + frost sheen.
// Rendered to an offscreen buffer so the sheen clips to the icon (no square
// tile artifact when a sprite floats over live gameplay).
const _spriteBuf = document.createElement("canvas");
const _sbx = _spriteBuf.getContext("2d");
function drawSprite(ctx, name, cx, cy, size, alpha, flash) {
  const fn = FO_SPRITES[name];
  if (!fn) return;
  const u = size / 16;
  const a = alpha == null ? 1 : alpha;
  const pad = Math.ceil(size * 0.6);     // room for glow halo, axe head, flag
  const bw = Math.ceil(size + pad * 2);
  _spriteBuf.width = bw; _spriteBuf.height = bw;
  const g = _sbx;
  const ox = bw / 2, oy = bw / 2;
  // extrude shadow (offset down-right) for pseudo-3D depth
  g.save(); g.translate(ox + u*0.9, oy + u*0.9); fn(g, u, GP.shadow); g.restore();
  // main pass with ice-blue glow
  g.save();
  g.translate(ox, oy);
  g.shadowColor = "rgba(136,200,224,0.55)";
  g.shadowBlur = u * 1.6;
  fn(g, u, flash ? GP.flash : GP.main);
  g.restore();
  // frost sheen, clipped to painted pixels only
  g.save();
  g.globalCompositeOperation = "source-atop";
  g.globalAlpha = 0.10;
  g.fillStyle = "#0c161d";
  for (let yy = 0; yy < bw; yy += 2) g.fillRect(0, yy, bw, 1);
  g.restore();
  // blit to target
  ctx.save();
  ctx.globalAlpha = a;
  ctx.drawImage(_spriteBuf, cx - ox, cy - oy);
  ctx.restore();
}

function handleFollow(user, pic) {
  const entry = { user: user || "Climber", pic: pic || "" };
  state.followQueue.push(entry);

}

function processQueue() {
  if (state.followQueue.length === 0) return;
  stopIdleLoop();
  const batch = state.followQueue.splice(0, state.followQueue.length);
  state.animating = true;
  playPeakAnim(() => {
    state.animating = false;
    showThankYou(batch);
  });
}

function showThankYou(list) {
  state.thankActive = true;
  state.totalFollowers += list.length;
  state.lastFollower = list[list.length - 1].user;
  state.recentFollowers = list.slice();
  for (const f of list) {
    if (f.pic && !state.signImgCache[f.pic]) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = f.pic;
      state.signImgCache[f.pic] = img;
    }

  state.signShowTime = 0;
  playThankYouCanvas(list, () => endThankYou());
}

function endThankYou() {
  state.thankActive = false;

  startIdleLoop();

}

// ============================================================
// THANK-YOU RENDERER (above bar)
// ============================================================
function fitTextSize(ctx, text, maxFontSize, minFontSize, maxW, fontFamily) {
  let lo = minFontSize, hi = maxFontSize, best = lo;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    ctx.font = `${mid}px ${fontFamily}`;
    if (ctx.measureText(text).width <= maxW) { best = mid; lo = mid + 1; }
    else { hi = mid - 1; }
  }
  return best;
}

function playThankYouCanvas(list, onComplete) {
  const W = $aboveFX.width, H = $aboveFX.height;
  const t0 = performance.now();
  const FADE_IN = 400, HOLD_END = 3500, FADE_OUT_END = 4200;
  const total = list.length;
  let cycleIdx = 0;
  const cycleMs = total > 1 ? Math.max(600, Math.floor(3100 / total)) : 0;

  const BAR_W = 440, TEXT_PAD = 24;
  const MAX_TEXT_W = BAR_W - TEXT_PAD;
  const FONT_FAMILY = '700 "Inter", sans-serif';
  const MAX_FONT = 20, MIN_FONT = 10;

  function getText() {
    if (total === 1) return "@" + list[0].user + " has reached the summit";
    return total + " new climbers reached the summit";
  }
  let text = getText();
  let fontSize = fitTextSize(aboveCtx, text, MAX_FONT, MIN_FONT, MAX_TEXT_W, FONT_FAMILY);

  function frame(now) {
    const t = now - t0;
    let alpha;
    if (t < FADE_IN) {
      const p = t / FADE_IN; alpha = 1 - Math.pow(1 - p, 2);
    } else if (t < HOLD_END) {
      alpha = 1;
      if (total > 1 && cycleMs > 0) {
        const newIdx = Math.floor((t - FADE_IN) / cycleMs) % total;
        if (newIdx !== cycleIdx) {
          cycleIdx = newIdx;
          text = "@" + list[cycleIdx].user + " summited";
          fontSize = fitTextSize(aboveCtx, text, MAX_FONT, MIN_FONT, MAX_TEXT_W, FONT_FAMILY);
        }
      }
    } else if (t < FADE_OUT_END) {
      const p = (t - HOLD_END) / (FADE_OUT_END - HOLD_END); alpha = (1 - p) * (1 - p);
    } else {
      clearAboveFX(); onComplete(); return;
    }

    clearAboveFX();
    aboveCtx.save();
    aboveCtx.globalAlpha = alpha;
    aboveCtx.font = `${fontSize}px ${FONT_FAMILY}`;
    aboveCtx.textAlign = "center";
    aboveCtx.textBaseline = "middle";
    const ty = H - 30;
    aboveCtx.beginPath();
    aboveCtx.rect((W - BAR_W) / 2, 0, BAR_W, H);
    aboveCtx.clip();
    aboveCtx.fillStyle = "#0c161d";
    aboveCtx.fillText(text, W/2 + 1, ty + 1);
    aboveCtx.shadowColor = "rgba(136,200,224,0.7)";
    aboveCtx.shadowBlur = 10;
    aboveCtx.fillStyle = "#f2f9ff";
    aboveCtx.fillText(text, W/2, ty);
    aboveCtx.restore();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ============================================================
// IDLE ANIMATIONS, sprite peek-up (round-robin)
// ============================================================
let peekIndex = 0;
function scheduleIdleEvent() {
  state.idleTimer = setTimeout(() => {
    if (state.animating || state.thankActive) return;
    startSpritePeek();
    scheduleIdleEvent();
  }, rand(4000, 8000));
}

function startSpritePeek(forced) {
  const name = forced || PEEK_SPRITES[peekIndex];
  if (!forced) peekIndex = (peekIndex + 1) % PEEK_SPRITES.length;
  const sz = 60;
  const x = randInt(24, $aboveFX.width - 24 - sz);
  const H = $aboveFX.height;
  const GAP = 6;
  const hiddenY = H + 14;
  const peekY   = H - sz - GAP;
  const t0 = performance.now();
  const RISE = 420, HOLD = 1700, LOWER = 2100;

  state.idleSprites.push({
    draw(now) {
      const t = now - t0;
      if (t > LOWER) return false;
      let y;
      if (t < RISE) {
        const p = t / RISE;
        y = hiddenY + (peekY - hiddenY) * (1 - Math.pow(1 - p, 5));
      } else if (t < HOLD) {
        const bp = (t - RISE) / (HOLD - RISE);
        y = peekY + Math.sin(bp * Math.PI * 4) * 2.5;
      } else {
        const p = (t - HOLD) / (LOWER - HOLD);
        y = peekY + (hiddenY - peekY) * (p * p * p);
      }
      drawSprite(aboveCtx, name, x + sz/2, y + sz/2, sz, 1, false);
      return true;
    }
  });
}

  aboveCtx.fillText(PROMO_TEXT, W/2, ty + bob);

}

// ============================================================
// IDLE RENDER LOOP
// ============================================================
function startIdleLoop() {
  if (state.totalFollowers > 0) state.signShowTime = performance.now();
  scheduleIdleEvent();
  function idleFrame(now) {
    if (state.animating || state.thankActive) return;
    clearAboveFX();
    let signVisible = false, signAlpha = 0;
    if (state.signShowTime > 0) {
      const elapsed = now - state.signShowTime;
      const fadeStart = state.signDuration, fadeEnd = fadeStart + 800;
      if (elapsed < fadeEnd) {
        signVisible = true;
        signAlpha = elapsed > fadeStart ? 1 - (elapsed - fadeStart) / 800 : 1;
      }
    }
    if (!signVisible) drawPromoText(now);
    if (signVisible) drawFollowerCounter(signAlpha, now);
    for (let i = state.idleSprites.length - 1; i >= 0; i--) {
      if (!state.idleSprites[i].draw(now)) state.idleSprites.splice(i, 1);
    }
    state.idleAnimFrame = requestAnimationFrame(idleFrame);
  }
  state.idleAnimFrame = requestAnimationFrame(idleFrame);
}

function stopIdleLoop() {
  cancelAnimationFrame(state.idleAnimFrame);
  clearTimeout(state.idleTimer);
  state.idleTimer = null;
  state.idleAnimFrame = null;
  state.idleSprites = [];
}

// ============================================================
// PEAK FOLLOW CELEBRATION  (6 phases)
//   popIn 500 / idle 400 / charge 750 / boom 200 / smoke 850 / fade 300
//   A climber crests a rising mountain peak and plants a gold summit flag.
// ============================================================
function drawSummitMountain(ctx, cx, baseY, grow, alpha) {
  // grow 0..1 controls how high the big peak silhouette rises
  if (alpha <= 0.01) return;
  const peakH = 30 + 120 * grow;          // summit rises out of the ground
  const halfW = 60 + 50 * grow;
  const apexY = baseY - peakH;
  ctx.save();
  ctx.globalAlpha = alpha;
  // rock mass
  const rg = ctx.createLinearGradient(0, apexY, 0, baseY);
  rg.addColorStop(0, "#7e94a4"); rg.addColorStop(0.5, "#5a6b78"); rg.addColorStop(1, "#2e3b45");
  ctx.fillStyle = rg;
  ctx.beginPath();
  ctx.moveTo(cx - halfW, baseY);
  ctx.lineTo(cx - halfW*0.18, apexY);     // approach to summit
  ctx.lineTo(cx, apexY - 4);              // true summit
  ctx.lineTo(cx + halfW*0.5, apexY + peakH*0.42);
  ctx.lineTo(cx + halfW*0.72, apexY + peakH*0.28);
  ctx.lineTo(cx + halfW, baseY);
  ctx.closePath(); ctx.fill();
  // snow cap
  ctx.fillStyle = "#f2f9ff";
  ctx.beginPath();
  ctx.moveTo(cx, apexY - 4);
  ctx.lineTo(cx - halfW*0.34, apexY + peakH*0.30);
  ctx.lineTo(cx - halfW*0.20, apexY + peakH*0.24);
  ctx.lineTo(cx - halfW*0.05, apexY + peakH*0.34);
  ctx.lineTo(cx + halfW*0.12, apexY + peakH*0.20);
  ctx.lineTo(cx + halfW*0.30, apexY + peakH*0.36);
  ctx.lineTo(cx + halfW*0.5, apexY + peakH*0.42);
  ctx.lineTo(cx, apexY - 4);
  ctx.closePath(); ctx.fill();
  // ice-blue ridge glow
  ctx.globalAlpha = alpha * 0.6;
  ctx.strokeStyle = "rgba(136,200,224,0.7)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - halfW*0.18, apexY);
  ctx.lineTo(cx, apexY - 4);
  ctx.lineTo(cx + halfW*0.5, apexY + peakH*0.42);
  ctx.stroke();
  ctx.restore();
  return apexY - 4;
}

// Climber silhouette planting a gold flag at the summit apex
function drawFlagPlanter(ctx, apexX, apexY, plant, wave, now) {
  ctx.save();
  // tiny climber standing at summit (white silhouette)
  ctx.strokeStyle = "#f2f9ff"; ctx.fillStyle = "#f2f9ff";
  ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round";
  const bx = apexX - 12, by = apexY + 2;
  // head
  ctx.beginPath(); ctx.arc(bx, by - 16, 3.4, 0, Math.PI*2); ctx.fill();
  // torso
  ctx.beginPath(); ctx.moveTo(bx, by - 12); ctx.lineTo(bx, by - 1); ctx.stroke();
  // legs
  ctx.beginPath(); ctx.moveTo(bx, by - 1); ctx.lineTo(bx - 5, by + 7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx, by - 1); ctx.lineTo(bx + 4, by + 7); ctx.stroke();
  // raised arm holding flagpole
  ctx.beginPath(); ctx.moveTo(bx, by - 10); ctx.lineTo(bx + 9, by - 20); ctx.stroke();

  // flagpole rising as `plant` goes 0..1
  const poleX = bx + 11;
  const poleTopY = by - 20 - 34 * plant;
  ctx.strokeStyle = "#cfeaf6"; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.moveTo(poleX, by - 18); ctx.lineTo(poleX, poleTopY); ctx.stroke();
  // gold triangular flag, waving
  if (plant > 0.25) {
    const fa = (plant - 0.25) / 0.75;
    const sway = Math.sin(now * 0.012) * 5 * wave;
    ctx.globalAlpha = fa;
    ctx.fillStyle = "#ffd56b";
    ctx.strokeStyle = "#d99e2a"; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(poleX, poleTopY);
    ctx.quadraticCurveTo(poleX + 16 + sway, poleTopY + 4, poleX + 26 + sway, poleTopY + 9);
    ctx.quadraticCurveTo(poleX + 16 + sway, poleTopY + 12, poleX, poleTopY + 18);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  ctx.restore();
}

function playPeakAnim(done, freezeMs) {
  const W = $aboveFX.width, H = $aboveFX.height;
  const barW = $barFX.width, barH = $barFX.height;
  const frozen = freezeMs != null;

  const heroSize = 86;
  const heroCX   = W/2;
  const restCY   = H - 54;
  const spawnCY  = H + heroSize;

  const t0 = performance.now();
  const PH = {
    popIn:   [0,    500],
    idle:    [500,  900],
    charge:  [900,  1650],
    boom:    [1650, 1850],
    smoke:   [1850, 2700],
    fadeEnd: [2700, 3000],
  };
  function pt(t, [a,b]) { return Math.max(0, Math.min(1, (t-a)/(b-a))); }
  function easeOutBounce(p) {
    const n1 = 7.5625, d1 = 2.75;
    if (p < 1/d1) return n1*p*p;
    else if (p < 2/d1) { p -= 1.5/d1; return n1*p*p + 0.75; }
    else if (p < 2.5/d1) { p -= 2.25/d1; return n1*p*p + 0.9375; }
    else { p -= 2.625/d1; return n1*p*p + 0.984375; }
  }

  const flakes = [];  // big celebratory snowflakes
  const glints = [];  // gold/white sparkle glints
  const gusts  = [];  // wind-driven snow streaks
  let boomFired = false, shookScreen = false;
  let summitApexY = restCY;

  function seedBurst() {
    const cx = heroCX, cy = restCY;
    for (let i = 0; i < 40; i++) {
      flakes.push({
        x: cx + rand(-90, 90), y: cy - rand(-10, 70),
        vx: rand(-0.8, 0.8), vy: rand(0.4, 1.6),
        r: rand(1.6, 4), drift: rand(0, Math.PI*2), driftSpd: rand(0.02, 0.06),
        life: 0, maxLife: rand(1000, 1800),
      });
    }
    for (let i = 0; i < 24; i++) {
      const ang = rand(-Math.PI, 0), spd = rand(2, 7);
      glints.push({
        x: cx + rand(-10, 10), y: cy - 60,
        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - rand(0.5, 2),
        size: rand(1.5, 3), col: Math.random() < 0.5 ? "#ffd56b" : "#f2f9ff",
        life: 0, maxLife: rand(400, 800),
      });
    }
  }

  function drawFlake(ctx, f, a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(f.x, f.y);
    ctx.fillStyle = "#f2f9ff";
    ctx.shadowColor = "rgba(136,200,224,0.8)"; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(0, 0, f.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  let lastFrameTime = t0;
  function frame(now) {
    const t = now - t0;
    const dt = Math.min(32, now - lastFrameTime); lastFrameTime = now;
    const dtF = dt / 16.667;

    clearAboveFX();
    clearBarFX();

    if (t < PH.popIn[1]) {
      // POP IN, a climber bounces up into view (reaching)
      const p = pt(t, PH.popIn);
      const cy = spawnCY + (restCY - spawnCY) * easeOutBounce(p);
      drawSprite(aboveCtx, "reach", heroCX, cy, heroSize, 1, false);
    }
    else if (t < PH.idle[1]) {
      // IDLE, hover + breath pulse (scale)
      const p = pt(t, PH.idle);
      const cy = restCY + Math.sin(p * Math.PI * 2) * 2;
      const pulse = 1 + Math.sin(p * Math.PI * 2) * 0.06;
      drawSprite(aboveCtx, "reach", heroCX, cy, heroSize * pulse, 1, false);
    }
    else if (t < PH.charge[1]) {
      // CHARGE, wind/snow gust intensifies, SUMMIT PUSH text, shake ramps
      const p = pt(t, PH.charge);
      const pulse = (Math.sin(p * Math.PI * 8 - Math.PI/2) + 1) / 2;
      const flash = pulse * (0.1 + p * 0.5);
      const shakeX = Math.sin(t * 0.05) * p * 3;
      const shakeY = Math.cos(t * 0.06) * p * 2;
      const swell = 1 + p * 0.12;
      drawSprite(aboveCtx, "reach", heroCX + shakeX, restCY + shakeY, heroSize * swell, 1, pulse > 0.6);
      // wind-driven snow streaks blowing across (intensify with p)
      const streakCount = Math.floor(46 * p);
      aboveCtx.save();
      aboveCtx.strokeStyle = "#e6f4fc";
      for (let i = 0; i < streakCount; i++) {
        aboveCtx.globalAlpha = rand(0.15, 0.6);
        aboveCtx.lineWidth = rand(0.6, 1.6);
        const yy = rand(H - 130, H);
        const xx = rand(0, W);
        const len = rand(6, 18) * (0.5 + p);
        aboveCtx.beginPath(); aboveCtx.moveTo(xx, yy); aboveCtx.lineTo(xx + len, yy + len*0.25); aboveCtx.stroke();
      }
      aboveCtx.restore();
      // SUMMIT PUSH (flickering)
      if (Math.floor(t / 90) % 2 === 0 || p > 0.7) {
        aboveCtx.save();
        aboveCtx.font = `800 ${15 + p*4}px "Inter", sans-serif`;
        aboveCtx.textAlign = "center"; aboveCtx.textBaseline = "middle";
        aboveCtx.shadowColor = "rgba(136,200,224,0.9)"; aboveCtx.shadowBlur = 10;
        aboveCtx.fillStyle = "#0c161d";
        aboveCtx.fillText("SUMMIT PUSH", W/2 + 1, H - 120 + 1);
        aboveCtx.fillStyle = p > 0.5 ? "#ffffff" : "#a6dcf0";
        aboveCtx.fillText("SUMMIT PUSH", W/2, H - 120);
        aboveCtx.restore();
      }
      // bar frost tint flicker
      barCtx.fillStyle = `rgba(136,200,224,${0.06 + flash*0.25})`;
      barCtx.fillRect(0, 0, barW, barH);
    }
    else if (t < PH.boom[1]) {
      // BOOM, bright summit-reached flash + the big peak begins to rise
      const p = pt(t, PH.boom);
      if (!boomFired) { seedBurst(); boomFired = true; }
      if (!shookScreen) {
        $stage.classList.remove("shake"); void $stage.offsetWidth;
        $stage.classList.add("shake"); shookScreen = true;
      }
      const a = (1 - p) * (1 - p);
      aboveCtx.fillStyle = `rgba(255,255,255,${a})`;
      aboveCtx.fillRect(0, 0, W, H);
      barCtx.fillStyle = `rgba(255,255,255,${a * 0.9})`;
      barCtx.fillRect(0, 0, barW, barH);
      // expanding flash ring
      aboveCtx.strokeStyle = `rgba(166,220,240,${a})`;
      aboveCtx.lineWidth = 4;
      aboveCtx.beginPath(); aboveCtx.arc(heroCX, restCY, 20 + p*120, 0, Math.PI*2); aboveCtx.stroke();
      summitApexY = drawSummitMountain(aboveCtx, heroCX, restCY + 50, p * 0.45, 0.85 * (1-a*0.4));
      updateAndDrawBurst(dtF, 1, t);
    }
    else if (t < PH.smoke[1]) {
      // SMOKE, peak fully risen, climber plants gold flag, snow settles
      const p = pt(t, PH.smoke);
      summitApexY = drawSummitMountain(aboveCtx, heroCX, restCY + 50, 0.45 + p*0.55, 0.95);
      drawFlagPlanter(aboveCtx, heroCX, summitApexY, Math.min(1, p*1.3), 1, now);
      // SUMMIT! big text
      aboveCtx.save();
      const ts = 22 + Math.min(1, p*2)*6;
      aboveCtx.font = `800 ${ts}px "Inter", sans-serif`;
      aboveCtx.textAlign = "center"; aboveCtx.textBaseline = "middle";
      aboveCtx.shadowColor = "rgba(255,213,107,0.9)"; aboveCtx.shadowBlur = 14;
      aboveCtx.fillStyle = "#0c161d";
      aboveCtx.fillText("SUMMIT!", W/2 + 1, H - 122 + 1);
      aboveCtx.fillStyle = "#ffd56b";
      aboveCtx.fillText("SUMMIT!", W/2, H - 122);
      aboveCtx.restore();
      updateAndDrawBurst(dtF, 1, t);
    }
    else if (t < PH.fadeEnd[1]) {
      // FADE, quadratic fade to clean, flag still waving
      const p = pt(t, PH.fadeEnd);
      const fade = (1 - p) * (1 - p);
      summitApexY = drawSummitMountain(aboveCtx, heroCX, restCY + 50, 1, fade * 0.95);
      drawFlagPlanter(aboveCtx, heroCX, summitApexY, 1, 1, now);
      aboveCtx.save();
      aboveCtx.globalAlpha = fade;
      aboveCtx.font = '800 28px "Inter", sans-serif';
      aboveCtx.textAlign = "center"; aboveCtx.textBaseline = "middle";
      aboveCtx.shadowColor = "rgba(255,213,107,0.9)"; aboveCtx.shadowBlur = 14;
      aboveCtx.fillStyle = "#ffd56b";
      aboveCtx.fillText("SUMMIT!", W/2, H - 122);
      aboveCtx.restore();
      updateAndDrawBurst(dtF, fade, t);
    }
    else {
      clearAboveFX(); clearBarFX();
      $stage.classList.remove("shake");
      done(); return;
    }
    if (!frozen) requestAnimationFrame(frame);
  }

  function updateAndDrawBurst(dtF, alphaMul, t) {
    // drifting snowflakes
    for (let i = flakes.length - 1; i >= 0; i--) {
      const f = flakes[i];
      f.life += 16 * dtF;
      f.drift += f.driftSpd * dtF;
      f.x += (f.vx + Math.sin(f.drift) * 0.4) * dtF;
      f.y += f.vy * dtF;
      if (f.life >= f.maxLife || f.y > H + 20) { flakes.splice(i, 1); continue; }
      const lp = f.life / f.maxLife;
      let a = 1; if (lp < 0.15) a = lp/0.15; else if (lp > 0.7) a = (1-lp)/0.3;
      drawFlake(aboveCtx, f, a * alphaMul);
    }
    aboveCtx.globalAlpha = 1; aboveCtx.shadowBlur = 0;
    // sparkle glints
    for (let i = glints.length - 1; i >= 0; i--) {
      const s = glints[i];
      s.life += 16 * dtF;
      s.x += s.vx * dtF; s.y += s.vy * dtF; s.vy += 0.12 * dtF; s.vx *= Math.pow(0.97, dtF);
      if (s.life >= s.maxLife) { glints.splice(i, 1); continue; }
      const a = (1 - s.life/s.maxLife) * alphaMul;
      aboveCtx.save();
      aboveCtx.globalAlpha = a;
      aboveCtx.fillStyle = s.col;
      aboveCtx.shadowColor = s.col === "#ffd56b" ? "rgba(255,213,107,0.9)" : "rgba(166,220,240,0.9)";
      aboveCtx.shadowBlur = 5;
      // 4-point sparkle
      const sx = Math.floor(s.x), sy = Math.floor(s.y), ss = s.size;
      aboveCtx.fillRect(sx - ss*1.6, sy - 0.5, ss*3.2, 1);
      aboveCtx.fillRect(sx - 0.5, sy - ss*1.6, 1, ss*3.2);
      aboveCtx.restore();
    }
    aboveCtx.globalAlpha = 1; aboveCtx.shadowBlur = 0;
  }

  if (frozen) {
    // Synchronous stepping driver, evolves particles up to freezeMs and draws
    // the final frame statically (no rAF), so a plain headless --screenshot
    // reliably captures any celebration phase.
    for (let tt = 0; tt <= freezeMs; tt += 16) frame(t0 + tt);
  } else {
    requestAnimationFrame(frame);
  }
}

// ============================================================
// AMBIENT SNOW PARTICLE LAYER (#bgFX, full window)
// ============================================================
let bgParticles = [];
function initBgParticles() {
  if (PARTICLE_KIND === "none") return;
  const ctx = $bgFX.getContext("2d");
  function resize() { $bgFX.width = window.innerWidth; $bgFX.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);
  const count = 60;
  const isDust = PARTICLE_KIND === "dust";
  for (let i = 0; i < count; i++) {
    bgParticles.push({
      x: Math.random() * $bgFX.width,
      y: Math.random() * $bgFX.height,
      vx: rand(-0.4, 0.2),
      vy: isDust ? rand(-0.5, -0.1) : rand(0.3, 1.0),  // snow falls down
      r: rand(0.8, 2.8),
      drift: rand(0, Math.PI*2),
      driftSpd: rand(0.01, 0.03),
    });
  }
  function loop() {
    ctx.clearRect(0, 0, $bgFX.width, $bgFX.height);
    for (const p of bgParticles) {
      p.drift += p.driftSpd;
      p.x += p.vx + (isDust ? 0 : Math.sin(p.drift) * 0.35);
      p.y += p.vy;
      if (p.y < -5) p.y = $bgFX.height + 5;
      if (p.y > $bgFX.height + 5) p.y = -5;
      if (p.x < -5) p.x = $bgFX.width + 5;
      if (p.x > $bgFX.width + 5) p.x = -5;
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = isDust ? "#9c8a5a" : "#f2f9ff";
      ctx.shadowColor = isDust ? "rgba(156,138,90,0.4)" : "rgba(136,200,224,0.7)";
      ctx.shadowBlur = isDust ? 0 : 4;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  loop();
}

document.getElementById("btnFollow").addEventListener("click", (e) => {
  e.stopPropagation();
  handleFollow(document.getElementById("demoUser").value || "Summit", "");

});
document.getElementById("btnPeek").addEventListener("click", (e) => {
  e.stopPropagation();
  if (!state.animating && !state.thankActive) startSpritePeek();
});
const $btnLoop = document.getElementById("btnLoop");
$btnLoop.addEventListener("click", (e) => {
  e.stopPropagation();
  state.autoLoop = !state.autoLoop;
  $btnLoop.textContent = "Auto-Loop: " + (state.autoLoop ? "ON" : "OFF");
  if (state.autoLoop) runAutoLoop(); else clearTimeout(state.autoLoopTimer);
});
function runAutoLoop() {
  if (!state.autoLoop) return;
  const fakeUsers = ["Scout","Summit","Ridge","Alpine","Crampon","Belay","Cairn","Glacier","Cliff","Ascend"];
  const batchSize = Math.random() < 0.6 ? 1 : randInt(2, 5);
  for (let i = 0; i < batchSize; i++) handleFollow(fakeUsers[randInt(0, fakeUsers.length-1)] + randInt(1,999), "");
  state.autoLoopTimer = setTimeout(runAutoLoop, randInt(5000, 9000));
}
document.getElementById("btnHide").addEventListener("click", (e) => {
  e.stopPropagation();
  document.getElementById("demoPanel").classList.add("hidden");
});
window.addEventListener("keydown", (e) => {
  if (e.key === "h" || e.key === "H") document.getElementById("demoPanel").classList.toggle("hidden");
});

// ============================================================
// TIKFINITY WEBSOCKET
// ============================================================
const $wsStatus = document.getElementById("wsStatus");
function setWsStatus(cls, text) { $wsStatus.className = cls; $wsStatus.textContent = "WS: " + text; }
function connectTikfinity() {
  setWsStatus("try", "connecting...");
  let ws;
  try { ws = new WebSocket("ws://localhost:21213/"); }
  catch (err) { setWsStatus("off", "failed"); setTimeout(connectTikfinity, 5000); return; }
  ws.onopen  = () => setWsStatus("on", "connected");
  ws.onclose = () => { setWsStatus("off", "disconnected"); setTimeout(connectTikfinity, 5000); };
  ws.onerror = () => setWsStatus("off", "error");
  ws.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (data && (data.event === "follow" || data.type === "follow")) {
        const d = data.data || data;
        const name = d.nickname || d.uniqueId || d.userId || "Climber";
        const pic  = d.profilePictureUrl || d.profilePicture || "";
        handleFollow(name, pic);
      }
    } catch (err) { /* ignore */ }
  };
}

// ============================================================
// SHOT MODE, line up every sprite for a contact screenshot
// ============================================================
function renderContactSheet() {
  stopIdleLoop();
  clearAboveFX();
  const cols = 4, rows = 2, sz = 80;
  const W = $aboveFX.width;
  const cellW = W / cols, cellH = 96;
  PEEK_SPRITES.forEach((name, i) => {
    const cx = (i % cols) * cellW + cellW/2;
    const cy = Math.floor(i / cols) * cellH + cellH/2 + 8;
    drawSprite(aboveCtx, name, cx, cy, sz, 1, false);
  });
}

// ============================================================
// INIT
// ============================================================
if (SHOW_DEMO) document.getElementById("demoPanel").classList.remove("hidden");
initBgParticles();
renderCTA();
connectTikfinity();
if (SHOT_MODE === "mobs") {
  renderContactSheet();
} else {
  startIdleLoop();
}
// Screenshot helpers:
//   ?fire=1, auto-trigger a live follow after load (visual smoke-test)
//   ?freeze=<phase>, render ONE static celebration frame (popin|idle|charge|
//                        boom|smoke|fade), reliably captured by plain --screenshot
if (params.get("fire")) {
  setTimeout(() => handleFollow(params.get("user") || "Summit", ""), 60);
}
const FREEZE_MS = { popin:300, idle:760, charge:1500, boom:1760, smoke:2350, fade:2860 };
if (params.get("freeze")) {
  stopIdleLoop();
  const ms = FREEZE_MS[params.get("freeze")] != null ? FREEZE_MS[params.get("freeze")] : 1760;
  playPeakAnim(() => {}, ms);
}
// ?signshot=N, static render of the alpine trail-sign summit log
if (params.get("signshot")) {
  stopIdleLoop();
  state.totalFollowers = parseInt(params.get("signshot"), 10) || 7;
  state.recentFollowers = [{ user: params.get("user") || "Summit", pic: "" }];
  state.signShowTime = performance.now();
  clearAboveFX();
  drawFollowerCounter(1, performance.now());
}
window.triggerFollow = handleFollow;
window.startSpritePeek = startSpritePeek;
window.renderContactSheet = renderContactSheet;
