<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Follow Overlay, R.E.P.O. (Extraction Terminal)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "Oswald", "Arial Narrow", Arial, sans-serif;
  }

  /* Ambient warehouse-dust particle layer (full window, behind stage) */
  #bgFX {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  #stage {
    position: fixed;
    left: 50%;
    bottom: 20px;
    transform: translate3d(-50%, 0, 0);
    width: 440px;
    height: 260px;
    pointer-events: none;
    z-index: 1;
    will-change: transform;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  #stage.shake { animation: stageShake 0.2s linear; }
  @keyframes stageShake {
    0%,100% { transform: translate3d(-50%, 0, 0); }
    20%  { transform: translate3d(calc(-50% - 4px), 2px, 0); }
    40%  { transform: translate3d(calc(-50% + 4px), -2px, 0); }
    60%  { transform: translate3d(calc(-50% - 3px), 1px, 0); }
    80%  { transform: translate3d(calc(-50% + 3px), -1px, 0); }
  }

  /* 440x36 industrial orange extraction-terminal bar */
  #bar {
    position: absolute;
    left: 0; bottom: 0;
    width: 440px;
    height: 36px;
    overflow: hidden;
    pointer-events: auto;
    isolation: isolate;
    box-shadow:
      0 4px 14px rgba(0,0,0,0.8),
      0 0 0 2px #1a1206,
      0 0 0 3px #f5a623,
      0 0 18px rgba(245,166,35,0.45);
    animation: barPulse 2.6s steps(60) infinite;
  }
  /* Hazard-light style pulse, industrial amber strobe */
  @keyframes barPulse {
    0%, 100% { box-shadow: 0 4px 14px rgba(0,0,0,0.8), 0 0 0 2px #1a1206, 0 0 0 3px #f5a623, 0 0 16px rgba(245,166,35,0.40); }
    47%      { box-shadow: 0 4px 14px rgba(0,0,0,0.8), 0 0 0 2px #1a1206, 0 0 0 3px #ffbe4d, 0 0 28px rgba(245,166,35,0.85); }
    49%      { box-shadow: 0 4px 14px rgba(0,0,0,0.8), 0 0 0 2px #1a1206, 0 0 0 3px #c47e10, 0 0 10px rgba(245,166,35,0.30); }
    51%      { box-shadow: 0 4px 14px rgba(0,0,0,0.8), 0 0 0 2px #1a1206, 0 0 0 3px #ffbe4d, 0 0 26px rgba(245,166,35,0.80); }
  }

  /* Dark industrial background */
  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(120% 160% at 50% 0%, rgba(80,52,12,0.55) 0%, rgba(14,12,10,1) 70%),
      linear-gradient(180deg, #1d1710 0%, #0a0805 100%);
    z-index: 1;
  }
  /* Hazard-stripe scanlines over the bar */
  .scan {
    position: absolute; inset: 0;
    z-index: 3;
    pointer-events: none;
    background: repeating-linear-gradient(
      180deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 1px,
      rgba(0,0,0,0.22) 2px,
      rgba(0,0,0,0.22) 3px
    );
    mix-blend-mode: multiply;
  }
  /* CTA / thank-you text layer */
  #textLayer {
    position: absolute; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 12px;
    z-index: 5;
    color: #ffce7a;
    font-family: "Oswald", "Arial Narrow", sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-shadow:
      0 0 5px rgba(245,166,35,0.9),
      0 0 12px rgba(245,166,35,0.55),
      1px 1px 0 #1a0f03;
  }
  #textInner {
    display: inline-block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: font-size 0.15s ease;
  }

  #barFX {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 4;
    pointer-events: none;
  }

  #demoPanel {
    position: fixed; top: 10px; right: 10px;
    background: rgba(18,14,8,0.92); color: #ffce7a;
    font-family: "Oswald", sans-serif; font-size: 12px;
    padding: 10px; border-radius: 6px; border: 1px solid rgba(245,166,35,0.4);
    z-index: 9999; min-width: 196px;
  }
  #demoPanel h4 { font-size: 12px; margin-bottom: 6px; letter-spacing: 1px; color: #ffbe4d; text-transform: uppercase; }
  #demoPanel button {
    display: block; width: 100%; margin-top: 4px; padding: 5px 8px;
    background: #2a1d08; color: #ffe0b0; border: 1px solid #7a560f; border-radius: 4px; cursor: pointer; font-size: 11px;
    font-family: "Oswald", sans-serif;
  }
  #demoPanel button:hover { background: #40300f; }
  #demoPanel select, #demoPanel input[type="text"], #demoPanel input[type="number"] {
    width: 100%; padding: 4px; background: #160f06; color: #ffe0b0; border: 1px solid #7a560f; border-radius: 3px; font-size: 11px; margin-top: 4px;
    font-family: "Oswald", sans-serif;
  }
  #demoPanel.hidden { display: none; }
  #wsStatus { font-size: 10px; padding: 3px 6px; border-radius: 3px; display: inline-block; margin-top: 6px; }
  #wsStatus.on  { background: #4a3413; color: #ffd98f; }
  #wsStatus.off { background: #4a1313; color: #ff8f8f; }
  #wsStatus.try { background: #4a4413; color: #ffe98f; }
  .row { display: flex; gap: 4px; }
  .row > * { flex: 1; }
</style>
</head>
<body>

<canvas id="bgFX"></canvas>

<div id="stage">
  <canvas id="aboveFX" width="440" height="224"></canvas>
  <div id="bar">
    <div class="bg"></div>
    <canvas id="barFX" width="440" height="36"></canvas>
    <div class="scan"></div>
    <div id="textLayer"><span id="textInner">Follow = Random Game Effect</span></div>
  </div>
</div>

<div id="demoPanel" class="hidden">
  <h4>R.E.P.O. OVERLAY</h4>
  <button id="btnFollow">Trigger 1 Follow</button>
  <input type="text" id="demoUser" placeholder="username" value="Semibot">
  <input type="number" id="demoBatch" placeholder="batch size" value="1" min="1" max="20">
  <button id="btnBatch">Trigger Batch</button>
  <button id="btnPeek">Test Idle Peek</button>
  <button id="btnLoop">Auto-Loop: OFF</button>
  <button id="btnHide">Hide Panel (H)</button>
  <div id="wsStatus" class="off">WS: disconnected</div>
</div>

<script>
// ============================================================
// CONFIG, R.E.P.O. / Extraction Terminal theme
// ============================================================
const CTA_TEXT   = "Follow = Random Game Effect";
const PROMO_TEXT = "Repo with us, aquilo.gg • Community Night";

// URL params (preserved from template family + R.E.P.O. extras)
const params       = new URLSearchParams(location.search);
const SHOW_DEMO    = params.get("demo") === "1";
const CYCLE_NAMES  = params.get("cycle") !== "off";
const PARTICLE_KIND= (params.get("particles") || "dust").toLowerCase(); // dust | sparks | none
const SHOT_MODE    = params.get("shot"); // "mobs" => line up all sprites for a contact shot

// ============================================================
// STATE
// ============================================================
const state = {
  animating: false,
  followQueue: [],
  thankActive: false,
  totalFollowers: 0,
  lastFollower: "",
  recentFollowers: [],
  signShowTime: 0,
  signDuration: 5000,
  signImgCache: {},
  idleSprites: [],
  idleTimer: null,
  idleAnimFrame: null,
  autoLoop: false,
  autoLoopTimer: null,
};

// ============================================================
// DOM refs
// ============================================================
const $stage     = document.getElementById("stage");
const $bar       = document.getElementById("bar");
const $textInner = document.getElementById("textInner");
const $textLayer = document.getElementById("textLayer");
const $barFX     = document.getElementById("barFX");
const $aboveFX   = document.getElementById("aboveFX");
const $bgFX      = document.getElementById("bgFX");
const barCtx     = $barFX.getContext("2d");
const aboveCtx   = $aboveFX.getContext("2d");

// ============================================================
// UTILITIES
// ============================================================
function clearBarFX()   { barCtx.clearRect(0, 0, $barFX.width, $barFX.height); }
function clearAboveFX() { aboveCtx.clearRect(0, 0, $aboveFX.width, $aboveFX.height); }
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

function blendHex(a, b, t) {
  const ar = parseInt(a.slice(1,3),16), ag = parseInt(a.slice(3,5),16), ab = parseInt(a.slice(5,7),16);
  const br = parseInt(b.slice(1,3),16), bg = parseInt(b.slice(3,5),16), bb = parseInt(b.slice(5,7),16);
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

function renderCTA() {
  resetTextSize();
  $textInner.textContent = CTA_TEXT;
  $textLayer.style.visibility = "visible";
}

const BASE_FONT_SIZE = 22;
const MIN_FONT_SIZE  = 11;
function resetTextSize() { $textInner.style.fontSize = ""; }

// ============================================================
// R.E.P.O. PALETTE  (industrial hazard orange / amber)
// ============================================================
const GP = {
  main:   { fill:"#f5a623", line:"#3a2607", hi:"#ffe2a8", dim:"#b87814", glow:"#ffbe4d" },
  shadow: { fill:"#2a1c06", line:"#2a1c06", hi:"#2a1c06", dim:"#2a1c06", glow:"#2a1c06" },
  flash:  { fill:"#fff6e2", line:"#ffe6bf", hi:"#ffffff", dim:"#ffeccf", glow:"#ffffff" },
};

// Faint scanlines drawn over an icon's bounding box
function drawScanlines(ctx, x, y, w, h, alpha) {
  ctx.save();
  ctx.globalAlpha = (alpha == null ? 1 : alpha) * 0.16;
  ctx.fillStyle = "#120c03";
  for (let yy = Math.floor(y); yy < y + h; yy += 2) ctx.fillRect(x, yy, w, 1);
  ctx.restore();
}

// ============================================================
// R.E.P.O. SPRITES, code-drawn industrial-amber iconography.
// Each fn draws an icon centered at the origin, spanning ~ +/-7.5u
// where u = size/16. Color set `c` = {fill,line,hi,dim}.
// drawSprite() handles the 2.5D extrude, glow, and scanlines.
// ============================================================
function lineW(u, n) { return Math.max(1, u * n); }

// 1) R.E.P.O. robot, rounded glass-dome head, two big round camera lens eyes,
//    long thin extendable grabber arms
function drawRobot(ctx, u, c) {
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineJoin = "round"; ctx.lineCap = "round";
  // squat body / base
  ctx.fillStyle = c.fill;
  roundRect(ctx, -3.4*u, 1.4*u, 6.8*u, 4.6*u, 1.2*u); ctx.fill(); ctx.stroke();
  // belly panel line
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.4);
  ctx.beginPath(); ctx.moveTo(-3.0*u, 3.4*u); ctx.lineTo(3.0*u, 3.4*u); ctx.stroke();
  // little stub feet
  ctx.fillStyle = c.dim;
  roundRect(ctx, -2.8*u, 5.8*u, 1.8*u, 1.1*u, 0.4*u); ctx.fill();
  roundRect(ctx, 1.0*u, 5.8*u, 1.8*u, 1.1*u, 0.4*u); ctx.fill();
  // neck
  ctx.fillStyle = c.dim; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.5);
  roundRect(ctx, -1.0*u, 0.2*u, 2.0*u, 1.6*u, 0.4*u); ctx.fill(); ctx.stroke();
  // rounded glass-dome head
  ctx.fillStyle = c.fill;
  ctx.beginPath();
  ctx.arc(0, -2.4*u, 3.9*u, Math.PI, Math.PI*2);            // dome top
  ctx.lineTo(3.9*u, -1.2*u);
  ctx.quadraticCurveTo(0, 0.4*u, -3.9*u, -1.2*u);            // rounded chin
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // glass-dome glare arc
  ctx.strokeStyle = c.hi; ctx.lineWidth = lineW(u,0.45);
  ctx.beginPath(); ctx.arc(0, -2.4*u, 3.1*u, Math.PI*1.15, Math.PI*1.55); ctx.stroke();
  // two big round camera-lens eyes
  for (const ex of [-1.7, 1.7]) {
    ctx.fillStyle = c.line;
    ctx.beginPath(); ctx.arc(ex*u, -2.4*u, 1.45*u, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = c.hi;
    ctx.beginPath(); ctx.arc(ex*u, -2.4*u, 0.85*u, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = c.line;
    ctx.beginPath(); ctx.arc(ex*u, -2.4*u, 0.38*u, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = c.hi;
    ctx.beginPath(); ctx.arc(ex*u - 0.4*u, -2.8*u, 0.22*u, 0, Math.PI*2); ctx.fill();
  }
  // long thin extendable grabber arms (segmented), reaching out + claws
  ctx.strokeStyle = c.fill; ctx.lineWidth = lineW(u,0.7); ctx.lineCap = "round";
  for (const dir of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(dir*3.0*u, 2.4*u);
    ctx.lineTo(dir*5.4*u, 0.8*u);
    ctx.lineTo(dir*7.2*u, 1.8*u);
    ctx.stroke();
    // joint dots
    ctx.fillStyle = c.hi;
    ctx.beginPath(); ctx.arc(dir*5.4*u, 0.8*u, 0.5*u, 0, Math.PI*2); ctx.fill();
    // pincer claw
    ctx.strokeStyle = c.fill; ctx.lineWidth = lineW(u,0.5);
    ctx.beginPath();
    ctx.moveTo(dir*7.2*u, 1.8*u); ctx.lineTo(dir*8.0*u, 0.9*u);
    ctx.moveTo(dir*7.2*u, 1.8*u); ctx.lineTo(dir*8.0*u, 2.7*u);
    ctx.stroke();
    ctx.lineWidth = lineW(u,0.7);
  }
}

// 2) Ornate vase, bulbous body, narrow neck, flared rim, decorative band
function drawVase(ctx, u, c) {
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineJoin = "round";
  // body
  ctx.beginPath();
  ctx.moveTo(-1.7*u, -5.4*u);                                  // neck top L
  ctx.quadraticCurveTo(-2.4*u, -4.4*u, -1.4*u, -3.4*u);        // shoulder dip
  ctx.quadraticCurveTo(-4.6*u, -1.6*u, -4.2*u, 2.4*u);         // bulge L
  ctx.quadraticCurveTo(-3.6*u, 5.4*u, -1.8*u, 6.0*u);          // base L
  ctx.lineTo(1.8*u, 6.0*u);
  ctx.quadraticCurveTo(3.6*u, 5.4*u, 4.2*u, 2.4*u);            // bulge R
  ctx.quadraticCurveTo(4.6*u, -1.6*u, 1.4*u, -3.4*u);
  ctx.quadraticCurveTo(2.4*u, -4.4*u, 1.7*u, -5.4*u);          // neck top R
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // flared rim
  ctx.fillStyle = c.hi;
  ctx.beginPath();
  ctx.moveTo(-2.4*u, -5.8*u);
  ctx.quadraticCurveTo(0, -6.8*u, 2.4*u, -5.8*u);
  ctx.quadraticCurveTo(0, -5.0*u, -2.4*u, -5.8*u);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.4); ctx.stroke();
  // decorative bands
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.5);
  ctx.beginPath(); ctx.moveTo(-3.9*u, 0.6*u); ctx.quadraticCurveTo(0, 1.6*u, 3.9*u, 0.6*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-3.5*u, 2.8*u); ctx.quadraticCurveTo(0, 3.8*u, 3.5*u, 2.8*u); ctx.stroke();
  // ornamental dots
  ctx.fillStyle = c.hi;
  for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.arc(i*1.5*u, 1.4*u, 0.35*u, 0, Math.PI*2); ctx.fill(); }
  // gloss highlight
  ctx.fillStyle = c.hi; ctx.globalAlpha = 0.7;
  ctx.beginPath(); ctx.ellipse(-1.9*u, 1.0*u, 0.6*u, 2.2*u, -0.1, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

// 3) Table lamp, wide pleated shade, slim stem, round base
function drawLamp(ctx, u, c) {
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineJoin = "round";
  // shade (trapezoid)
  ctx.beginPath();
  ctx.moveTo(-2.6*u, -5.4*u);
  ctx.lineTo(2.6*u, -5.4*u);
  ctx.lineTo(4.6*u, -1.0*u);
  ctx.lineTo(-4.6*u, -1.0*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // pleat lines
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.35);
  for (let i = -3; i <= 3; i++) {
    const tx = i*1.0*u, bx = i*1.5*u;
    ctx.beginPath(); ctx.moveTo(tx, -5.2*u); ctx.lineTo(bx, -1.2*u); ctx.stroke();
  }
  // warm glow under shade rim
  ctx.fillStyle = c.hi; ctx.globalAlpha = 0.55;
  ctx.beginPath(); ctx.ellipse(0, -1.0*u, 4.4*u, 0.9*u, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // stem
  ctx.strokeStyle = c.fill; ctx.lineWidth = lineW(u,0.9);
  ctx.beginPath(); ctx.moveTo(0, -1.0*u); ctx.lineTo(0, 4.6*u); ctx.stroke();
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.3);
  ctx.beginPath(); ctx.moveTo(0, -1.0*u); ctx.lineTo(0, 4.6*u); ctx.stroke();
  // finial on top
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.arc(0, -6.0*u, 0.6*u, 0, Math.PI*2); ctx.fill();
  // round base
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6);
  ctx.beginPath(); ctx.ellipse(0, 5.2*u, 3.0*u, 1.1*u, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
}

// 4) Bust / sculpture, classical head + shoulders on a plinth
function drawBust(ctx, u, c) {
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineJoin = "round";
  // plinth / base
  roundRect(ctx, -3.4*u, 4.4*u, 6.8*u, 2.2*u, 0.5*u); ctx.fill(); ctx.stroke();
  ctx.fillStyle = c.dim;
  roundRect(ctx, -2.8*u, 4.0*u, 5.6*u, 0.8*u, 0.3*u); ctx.fill();
  // shoulders / chest
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6);
  ctx.beginPath();
  ctx.moveTo(-4.4*u, 4.2*u);
  ctx.quadraticCurveTo(-4.6*u, 0.6*u, -1.6*u, -0.4*u);
  ctx.lineTo(1.6*u, -0.4*u);
  ctx.quadraticCurveTo(4.6*u, 0.6*u, 4.4*u, 4.2*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // neck
  ctx.fillStyle = c.fill;
  roundRect(ctx, -1.4*u, -2.0*u, 2.8*u, 2.4*u, 0.6*u); ctx.fill(); ctx.stroke();
  // head (profile-ish oval, classical)
  ctx.beginPath();
  ctx.ellipse(0.2*u, -3.8*u, 2.9*u, 3.4*u, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // hair / laurel sweep
  ctx.fillStyle = c.line;
  ctx.beginPath();
  ctx.moveTo(-2.6*u, -5.0*u);
  ctx.quadraticCurveTo(0, -7.6*u, 3.0*u, -5.2*u);
  ctx.quadraticCurveTo(1.4*u, -5.6*u, -0.4*u, -5.2*u);
  ctx.quadraticCurveTo(-1.6*u, -5.0*u, -2.6*u, -5.0*u);
  ctx.closePath(); ctx.fill();
  // serene face features
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.4); ctx.lineCap = "round";
  // brow + nose line (profile)
  ctx.beginPath(); ctx.moveTo(2.6*u, -4.4*u); ctx.quadraticCurveTo(3.2*u, -3.4*u, 2.4*u, -2.8*u); ctx.stroke();
  // eye
  ctx.fillStyle = c.line;
  ctx.beginPath(); ctx.arc(0.6*u, -4.0*u, 0.3*u, 0, Math.PI*2); ctx.fill();
  // cheek highlight
  ctx.fillStyle = c.hi; ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.arc(-1.2*u, -3.4*u, 0.7*u, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

// 5) Wall clock, round face, bezel, hands, hour ticks
function drawClock(ctx, u, c) {
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.7);
  // outer case
  ctx.beginPath(); ctx.arc(0, 0, 6.4*u, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // face
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.arc(0, 0, 5.2*u, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.4); ctx.stroke();
  // hour ticks
  ctx.strokeStyle = c.line; ctx.lineCap = "round";
  for (let i = 0; i < 12; i++) {
    const a = (i/12)*Math.PI*2;
    const r1 = 4.7*u, r2 = (i % 3 === 0) ? 3.7*u : 4.1*u;
    ctx.lineWidth = (i % 3 === 0) ? lineW(u,0.6) : lineW(u,0.35);
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r1, Math.sin(a)*r1);
    ctx.lineTo(Math.cos(a)*r2, Math.sin(a)*r2);
    ctx.stroke();
  }
  // hands (10:10 classic)
  ctx.strokeStyle = c.line; ctx.lineCap = "round";
  ctx.lineWidth = lineW(u,0.7);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-2.4*u, -2.2*u); ctx.stroke();   // hour
  ctx.lineWidth = lineW(u,0.5);
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(2.6*u, -2.6*u); ctx.stroke();    // minute
  // center pin
  ctx.fillStyle = c.line;
  ctx.beginPath(); ctx.arc(0, 0, 0.7*u, 0, Math.PI*2); ctx.fill();
  // top mount ring
  ctx.strokeStyle = c.fill; ctx.lineWidth = lineW(u,0.6);
  ctx.beginPath(); ctx.arc(0, -6.9*u, 0.9*u, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
}

// 6) The Hidden, invisible shimmer outline, dashed body, faint refraction
function drawHidden(ctx, u, c) {
  // ghostly tall blob silhouette, drawn as a shimmer outline only
  ctx.save();
  ctx.strokeStyle = c.fill; ctx.lineWidth = lineW(u,0.55); ctx.lineJoin = "round"; ctx.lineCap = "round";
  ctx.setLineDash([1.2*u, 1.0*u]);
  // amorphous floating body
  ctx.beginPath();
  ctx.moveTo(-3.4*u, 5.2*u);
  ctx.quadraticCurveTo(-5.0*u, 1.0*u, -3.0*u, -3.0*u);
  ctx.quadraticCurveTo(-1.6*u, -6.6*u, 1.4*u, -6.0*u);
  ctx.quadraticCurveTo(5.0*u, -5.0*u, 4.4*u, -0.6*u);
  ctx.quadraticCurveTo(4.0*u, 3.2*u, 3.0*u, 5.2*u);
  // wavy bottom (ghost tail)
  ctx.quadraticCurveTo(2.0*u, 4.0*u, 1.0*u, 5.2*u);
  ctx.quadraticCurveTo(0, 4.0*u, -1.0*u, 5.2*u);
  ctx.quadraticCurveTo(-2.2*u, 4.0*u, -3.4*u, 5.2*u);
  ctx.closePath(); ctx.stroke();
  ctx.setLineDash([]);
  // refraction shimmer streaks inside
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = c.hi; ctx.lineWidth = lineW(u,0.4);
  ctx.beginPath(); ctx.moveTo(-1.6*u, -3.4*u); ctx.quadraticCurveTo(-0.6*u, 0, -1.8*u, 3.6*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1.8*u, -2.6*u); ctx.quadraticCurveTo(0.8*u, 0.6*u, 2.0*u, 3.4*u); ctx.stroke();
  ctx.globalAlpha = 1;
  // two faint glowing eye glints (the only solid thing)
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.arc(-1.3*u, -2.0*u, 0.55*u, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1.3*u, -2.0*u, 0.55*u, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = c.line;
  ctx.beginPath(); ctx.arc(-1.3*u, -2.0*u, 0.22*u, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1.3*u, -2.0*u, 0.22*u, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// 7) Shadow Child, small dark child silhouette, big void with faint eyes
function drawShadowChild(ctx, u, c) {
  ctx.fillStyle = c.line; ctx.strokeStyle = c.dim; ctx.lineWidth = lineW(u,0.45); ctx.lineJoin = "round";
  // small body (short, child proportions)
  ctx.beginPath();
  ctx.moveTo(-2.4*u, 6.2*u);
  ctx.lineTo(-2.0*u, 1.2*u);
  ctx.quadraticCurveTo(-2.4*u, -0.2*u, -1.4*u, -0.8*u);   // shoulder L
  ctx.lineTo(1.4*u, -0.8*u);
  ctx.quadraticCurveTo(2.4*u, -0.2*u, 2.0*u, 1.2*u);      // shoulder R
  ctx.lineTo(2.4*u, 6.2*u);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // thin dangling arms
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.7); ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-1.8*u, 0.4*u); ctx.lineTo(-2.8*u, 4.4*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1.8*u, 0.4*u); ctx.lineTo(2.8*u, 4.4*u); ctx.stroke();
  // big round head
  ctx.fillStyle = c.line; ctx.strokeStyle = c.dim; ctx.lineWidth = lineW(u,0.45);
  ctx.beginPath(); ctx.arc(0, -3.4*u, 3.2*u, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // faint dim purple-ish rim shimmer (use dim color)
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = c.dim; ctx.lineWidth = lineW(u,0.5);
  ctx.beginPath(); ctx.arc(0, -3.4*u, 3.4*u, Math.PI*0.7, Math.PI*1.6); ctx.stroke();
  ctx.globalAlpha = 1;
  // two faint hollow eyes
  ctx.fillStyle = c.dim;
  ctx.beginPath(); ctx.ellipse(-1.2*u, -3.6*u, 0.55*u, 0.85*u, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(1.2*u, -3.6*u, 0.55*u, 0.85*u, 0, 0, Math.PI*2); ctx.fill();
  // tiny glints
  ctx.fillStyle = c.hi;
  ctx.beginPath(); ctx.arc(-1.2*u, -3.9*u, 0.18*u, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1.2*u, -3.9*u, 0.18*u, 0, Math.PI*2); ctx.fill();
}

// 8) Banger, round bomb-headed creature, lit fuse + spark, little legs
function drawBanger(ctx, u, c) {
  ctx.fillStyle = c.fill; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineJoin = "round";
  // round bomb body
  ctx.beginPath(); ctx.arc(0, 0.8*u, 5.0*u, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  // bomb gleam
  ctx.fillStyle = c.hi; ctx.globalAlpha = 0.55;
  ctx.beginPath(); ctx.arc(-1.8*u, -1.2*u, 1.3*u, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // fuse cap (top neck)
  ctx.fillStyle = c.dim; ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.5);
  roundRect(ctx, -1.4*u, -5.4*u, 2.8*u, 1.8*u, 0.4*u); ctx.fill(); ctx.stroke();
  // curved fuse
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.6); ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(0, -5.4*u);
  ctx.quadraticCurveTo(2.6*u, -7.0*u, 3.6*u, -5.0*u);
  ctx.stroke();
  // lit spark at fuse tip
  ctx.fillStyle = "#ffd24d";
  ctx.beginPath(); ctx.arc(3.6*u, -5.0*u, 0.9*u, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#fff2c2";
  ctx.beginPath(); ctx.arc(3.6*u, -5.0*u, 0.45*u, 0, Math.PI*2); ctx.fill();
  // spark rays
  ctx.strokeStyle = "#ffd24d"; ctx.lineWidth = lineW(u,0.3);
  for (let i = 0; i < 6; i++) {
    const a = (i/6)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(3.6*u + Math.cos(a)*1.1*u, -5.0*u + Math.sin(a)*1.1*u);
    ctx.lineTo(3.6*u + Math.cos(a)*1.7*u, -5.0*u + Math.sin(a)*1.7*u);
    ctx.stroke();
  }
  // angry eyes on the bomb
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.55); ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-2.6*u, -1.0*u); ctx.lineTo(-0.9*u, -0.2*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2.6*u, -1.0*u); ctx.lineTo(0.9*u, -0.2*u); ctx.stroke();
  ctx.fillStyle = c.line;
  ctx.beginPath(); ctx.arc(-1.6*u, 0.4*u, 0.5*u, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1.6*u, 0.4*u, 0.5*u, 0, Math.PI*2); ctx.fill();
  // grimace
  ctx.strokeStyle = c.line; ctx.lineWidth = lineW(u,0.5);
  ctx.beginPath(); ctx.arc(0, 3.2*u, 1.6*u, 1.15*Math.PI, 1.85*Math.PI); ctx.stroke();
  // little legs
  ctx.lineWidth = lineW(u,0.6);
  ctx.beginPath(); ctx.moveTo(-2.0*u, 5.4*u); ctx.lineTo(-2.6*u, 6.8*u); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2.0*u, 5.4*u); ctx.lineTo(2.6*u, 6.8*u); ctx.stroke();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

const FO_SPRITES = {
  robot:       drawRobot,
  vase:        drawVase,
  lamp:        drawLamp,
  bust:        drawBust,
  clock:       drawClock,
  hidden:      drawHidden,
  shadowchild: drawShadowChild,
  banger:      drawBanger,
};
const PEEK_SPRITES = ["robot","vase","lamp","bust","clock","hidden","shadowchild","banger"];

// Draw a sprite with 2.5D extrude shadow + amber glow + silhouette scanlines.
// Rendered to an offscreen buffer so scanlines clip to the icon (no square
// tile artifact when a sprite floats over live gameplay).
const _spriteBuf = document.createElement("canvas");
const _sbx = _spriteBuf.getContext("2d");
function drawSprite(ctx, name, cx, cy, size, alpha, flash) {
  const fn = FO_SPRITES[name];
  if (!fn) return;
  const u = size / 16;
  const a = alpha == null ? 1 : alpha;
  const pad = Math.ceil(size * 0.6);     // room for glow halo, grabber arms, fuse
  const bw = Math.ceil(size + pad * 2);
  _spriteBuf.width = bw; _spriteBuf.height = bw;
  const g = _sbx;
  const ox = bw / 2, oy = bw / 2;
  // extrude shadow (offset down-right) for pseudo-3D depth
  g.save(); g.translate(ox + u*0.9, oy + u*0.9); fn(g, u, GP.shadow); g.restore();
  // main pass with amber glow
  g.save();
  g.translate(ox, oy);
  g.shadowColor = "rgba(245,166,35,0.55)";
  g.shadowBlur = u * 1.6;
  fn(g, u, flash ? GP.flash : GP.main);
  g.restore();
  // scanlines, clipped to painted pixels only
  g.save();
  g.globalCompositeOperation = "source-atop";
  g.globalAlpha = 0.16;
  g.fillStyle = "#120c03";
  for (let yy = 0; yy < bw; yy += 2) g.fillRect(0, yy, bw, 1);
  g.restore();
  // blit to target
  ctx.save();
  ctx.globalAlpha = a;
  ctx.drawImage(_spriteBuf, cx - ox, cy - oy);
  ctx.restore();
}

// ============================================================
// FOLLOW PIPELINE
// ============================================================
function handleFollow(user, pic) {
  const entry = { user: user || "Crewmate", pic: pic || "" };
  state.followQueue.push(entry);
  if (!state.animating && !state.thankActive) processQueue();
}

function processQueue() {
  if (state.followQueue.length === 0) return;
  stopIdleLoop();
  const batch = state.followQueue.splice(0, state.followQueue.length);
  state.animating = true;
  playFalloutAnim(() => {
    state.animating = false;
    showThankYou(batch);
  });
}

function showThankYou(list) {
  state.thankActive = true;
  state.totalFollowers += list.length;
  state.lastFollower = list[list.length - 1].user;
  state.recentFollowers = list.slice();
  for (const f of list) {
    if (f.pic && !state.signImgCache[f.pic]) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src = f.pic;
      state.signImgCache[f.pic] = img;
    }
  }
  state.signShowTime = 0;
  playThankYouCanvas(list, () => endThankYou());
}

function endThankYou() {
  state.thankActive = false;
  clearBarFX();
  clearAboveFX();
  startIdleLoop();
  if (state.followQueue.length > 0) processQueue();
}

// ============================================================
// THANK-YOU RENDERER (above bar)
// ============================================================
function fitTextSize(ctx, text, maxFontSize, minFontSize, maxW, fontFamily) {
  let lo = minFontSize, hi = maxFontSize, best = lo;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    ctx.font = `${mid}px ${fontFamily}`;
    if (ctx.measureText(text).width <= maxW) { best = mid; lo = mid + 1; }
    else { hi = mid - 1; }
  }
  return best;
}

function playThankYouCanvas(list, onComplete) {
  const W = $aboveFX.width, H = $aboveFX.height;
  const t0 = performance.now();
  const FADE_IN = 400, HOLD_END = 3500, FADE_OUT_END = 4200;
  const total = list.length;
  let cycleIdx = 0;
  const cycleMs = total > 1 ? Math.max(600, Math.floor(3100 / total)) : 0;

  const BAR_W = 440, TEXT_PAD = 24;
  const MAX_TEXT_W = BAR_W - TEXT_PAD;
  const FONT_FAMILY = '700 "Oswald", sans-serif';
  const MAX_FONT = 20, MIN_FONT = 10;

  function getText() {
    if (total === 1) return "@" + list[0].user + " HAS JOINED THE EXTRACTION CREW";
    return total + " NEW CREWMATES JOINED THE EXTRACTION";
  }
  let text = getText();
  let fontSize = fitTextSize(aboveCtx, text, MAX_FONT, MIN_FONT, MAX_TEXT_W, FONT_FAMILY);

  function frame(now) {
    const t = now - t0;
    let alpha;
    if (t < FADE_IN) {
      const p = t / FADE_IN; alpha = 1 - Math.pow(1 - p, 2);
    } else if (t < HOLD_END) {
      alpha = 1;
      if (total > 1 && cycleMs > 0) {
        const newIdx = Math.floor((t - FADE_IN) / cycleMs) % total;
        if (newIdx !== cycleIdx) {
          cycleIdx = newIdx;
          text = "@" + list[cycleIdx].user + " HIRED";
          fontSize = fitTextSize(aboveCtx, text, MAX_FONT, MIN_FONT, MAX_TEXT_W, FONT_FAMILY);
        }
      }
    } else if (t < FADE_OUT_END) {
      const p = (t - HOLD_END) / (FADE_OUT_END - HOLD_END); alpha = (1 - p) * (1 - p);
    } else {
      clearAboveFX(); onComplete(); return;
    }

    clearAboveFX();
    aboveCtx.save();
    aboveCtx.globalAlpha = alpha;
    aboveCtx.font = `${fontSize}px ${FONT_FAMILY}`;
    aboveCtx.textAlign = "center";
    aboveCtx.textBaseline = "middle";
    const ty = H - 30;
    aboveCtx.beginPath();
    aboveCtx.rect((W - BAR_W) / 2, 0, BAR_W, H);
    aboveCtx.clip();
    aboveCtx.fillStyle = "#1a0f03";
    aboveCtx.fillText(text, W/2 + 1, ty + 1);
    aboveCtx.shadowColor = "rgba(245,166,35,0.7)";
    aboveCtx.shadowBlur = 10;
    aboveCtx.fillStyle = "#ffe2a8";
    aboveCtx.fillText(text, W/2, ty);
    aboveCtx.restore();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ============================================================
// R.E.P.O. EXTRACTION TERMINAL COUNTER SIGN
// ============================================================
function drawFollowerCounter(alpha, now) {
  if (state.totalFollowers === 0 || alpha <= 0) return;
  const W = $aboveFX.width, H = $aboveFX.height;
  const signW = 250, signH = 50;
  const sx = (W - signW) / 2;
  const sy = H - signH - 16;

  const batch = state.recentFollowers.length > 0 ? state.recentFollowers : [{user: state.lastFollower, pic: ""}];
  const elapsed = now - state.signShowTime;
  const idx = CYCLE_NAMES ? Math.floor(elapsed / 900) % batch.length : batch.length - 1;
  const cur = batch[idx];

  // terminal flicker
  const flick = 0.88 + 0.12 * (Math.sin(now*0.02) > 0.7 ? 0.4 : 1);
  aboveCtx.save();
  aboveCtx.globalAlpha = alpha;

  // metal bezel
  aboveCtx.fillStyle = "#1a130a";
  roundRect(aboveCtx, sx-3, sy-3, signW+6, signH+6, 6); aboveCtx.fill();
  // panel face (brushed dark metal)
  const g = aboveCtx.createLinearGradient(0, sy, 0, sy+signH);
  g.addColorStop(0, "#2c2210"); g.addColorStop(1, "#16100a");
  aboveCtx.fillStyle = g;
  roundRect(aboveCtx, sx, sy, signW, signH, 4); aboveCtx.fill();
  // amber border glow
  aboveCtx.strokeStyle = "#f5a623";
  aboveCtx.lineWidth = 2;
  aboveCtx.shadowColor = "rgba(245,166,35,0.6)";
  aboveCtx.shadowBlur = 8;
  roundRect(aboveCtx, sx, sy, signW, signH, 4); aboveCtx.stroke();
  aboveCtx.shadowBlur = 0;

  // corner rivets
  aboveCtx.fillStyle = "#ffce7a";
  const rv = [[sx+6, sy+6],[sx+signW-6, sy+6],[sx+6, sy+signH-6],[sx+signW-6, sy+signH-6]];
  for (const [rx, ry] of rv) { aboveCtx.beginPath(); aboveCtx.arc(rx, ry, 1.8, 0, Math.PI*2); aboveCtx.fill(); }

  // header bar (hazard amber)
  aboveCtx.fillStyle = "rgba(245,166,35,0.18)";
  aboveCtx.fillRect(sx, sy, signW, 15);
  aboveCtx.font = '600 11px "Oswald", sans-serif';
  aboveCtx.textAlign = "left"; aboveCtx.textBaseline = "middle";
  aboveCtx.fillStyle = "#ffd98f";
  aboveCtx.fillText("R.E.P.O. EXTRACTION", sx + 8, sy + 8);

  // body text (amber readout)
  aboveCtx.globalAlpha = alpha * flick;
  aboveCtx.shadowColor = "rgba(245,166,35,0.7)";
  aboveCtx.shadowBlur = 6;
  aboveCtx.fillStyle = "#f5b84a";
  aboveCtx.font = '600 14px "Oswald", sans-serif';
  aboveCtx.fillText("VALUABLES: " + state.totalFollowers, sx + 10, sy + 28);
  const rawName = cur && cur.user ? cur.user : "";
  const nameText = rawName.length > 18 ? rawName.slice(0, 16) + ".." : rawName;
  aboveCtx.fillStyle = "#ffe2a8";
  aboveCtx.fillText("LAST: @" + nameText, sx + 10, sy + 42);
  aboveCtx.shadowBlur = 0;

  // blinking cursor
  if (Math.floor(now / 500) % 2 === 0) {
    aboveCtx.fillStyle = "#f5b84a";
    aboveCtx.fillRect(sx + signW - 16, sy + 36, 7, 9);
  }

  // scanlines over panel
  aboveCtx.globalAlpha = alpha * 0.18;
  aboveCtx.fillStyle = "#1a0f03";
  for (let yy = sy + 15; yy < sy + signH; yy += 3) aboveCtx.fillRect(sx, yy, signW, 1);

  aboveCtx.restore();
}

function drawPromoText(now) {
  const W = $aboveFX.width, H = $aboveFX.height;
  const ty = H - 64;
  const bob = Math.sin(now * 0.002) * 1.5;

}

// ============================================================
// IDLE ANIMATIONS, sprite peek-up (round-robin)
// ============================================================
let peekIndex = 0;
function scheduleIdleEvent() {
  state.idleTimer = setTimeout(() => {
    if (state.animating || state.thankActive) return;
    startSpritePeek();
    scheduleIdleEvent();
  }, rand(4000, 8000));
}

function startSpritePeek(forced) {
  const name = forced || PEEK_SPRITES[peekIndex];
  if (!forced) peekIndex = (peekIndex + 1) % PEEK_SPRITES.length;
  const sz = 60;
  const x = randInt(24, $aboveFX.width - 24 - sz);
  const H = $aboveFX.height;
  const GAP = 6;
  const hiddenY = H + 14;
  const peekY   = H - sz - GAP;
  const t0 = performance.now();
  const RISE = 420, HOLD = 1700, LOWER = 2100;

  state.idleSprites.push({
    draw(now) {
      const t = now - t0;
      if (t > LOWER) return false;
      let y;
      if (t < RISE) {
        const p = t / RISE;
        y = hiddenY + (peekY - hiddenY) * (1 - Math.pow(1 - p, 5));
      } else if (t < HOLD) {
        const bp = (t - RISE) / (HOLD - RISE);
        y = peekY + Math.sin(bp * Math.PI * 4) * 2.5;
      } else {
        const p = (t - HOLD) / (LOWER - HOLD);
        y = peekY + (hiddenY - peekY) * (p * p * p);
      }
      drawSprite(aboveCtx, name, x + sz/2, y + sz/2, sz, 1, false);
      return true;
    }
  });
}

// ============================================================
// IDLE RENDER LOOP
// ============================================================
function startIdleLoop() {
  if (state.totalFollowers > 0) state.signShowTime = performance.now();
  scheduleIdleEvent();
  function idleFrame(now) {
    if (state.animating || state.thankActive) return;
    clearAboveFX();
    let signVisible = false, signAlpha = 0;
    if (state.signShowTime > 0) {
      const elapsed = now - state.signShowTime;
      const fadeStart = state.signDuration, fadeEnd = fadeStart + 800;
      if (elapsed < fadeEnd) {
        signVisible = true;
        signAlpha = elapsed > fadeStart ? 1 - (elapsed - fadeStart) / 800 : 1;
      }
    }
    if (!signVisible) drawPromoText(now);
    if (signVisible) drawFollowerCounter(signAlpha, now);
    for (let i = state.idleSprites.length - 1; i >= 0; i--) {
      if (!state.idleSprites[i].draw(now)) state.idleSprites.splice(i, 1);
    }
    state.idleAnimFrame = requestAnimationFrame(idleFrame);
  }
  state.idleAnimFrame = requestAnimationFrame(idleFrame);
}

function stopIdleLoop() {
  cancelAnimationFrame(state.idleAnimFrame);
  clearTimeout(state.idleTimer);
  state.idleTimer = null;
  state.idleAnimFrame = null;
  state.idleSprites = [];
}

// ============================================================
// R.E.P.O. FOLLOW CELEBRATION  (6 phases)
//   popIn 500 / idle 400 / charge 750 / boom 200 / smoke 850 / fade 300
//   robot grabs a valuable -> strains -> SHATTERS it -> cash count-up
// ============================================================
function playFalloutAnim(done, freezeMs) {
  const W = $aboveFX.width, H = $aboveFX.height;
  const barW = $barFX.width, barH = $barFX.height;
  const frozen = freezeMs != null;

  const heroSize = 86;
  const heroCX   = W/2;
  const restCY   = H - 54;
  const spawnCY  = H + heroSize;

  // pick which valuable gets extracted this run + outcome
  const VALUABLES = ["vase","lamp","bust","clock"];
  const valuable  = VALUABLES[randInt(0, VALUABLES.length - 1)];
  const failed    = frozen ? false : Math.random() < 0.18;  // occasional MISSION FAILED; frozen screenshots force the win
  const cashTarget = randInt(2, 9) * 1000 + randInt(0, 9) * 100;

  const t0 = performance.now();
  const PH = {
    popIn:   [0,    500],
    idle:    [500,  900],
    charge:  [900,  1650],
    boom:    [1650, 1850],
    smoke:   [1850, 2700],
    fadeEnd: [2700, 3000],
  };
  function pt(t, [a,b]) { return Math.max(0, Math.min(1, (t-a)/(b-a))); }
  function easeOutBounce(p) {
    const n1 = 7.5625, d1 = 2.75;
    if (p < 1/d1) return n1*p*p;
    else if (p < 2/d1) { p -= 1.5/d1; return n1*p*p + 0.75; }
    else if (p < 2.5/d1) { p -= 2.25/d1; return n1*p*p + 0.9375; }
    else { p -= 2.625/d1; return n1*p*p + 0.984375; }
  }

  const shards = [];  // ceramic shard debris
  const coins  = [];  // gold coins / cash
  const sparks = [];  // impact sparks
  let boomFired = false, shookScreen = false;

  function seedShatter() {
    const cx = heroCX, cy = restCY - 6;
    // ceramic shards (triangular splinters of the valuable)
    for (let i = 0; i < 30; i++) {
      const ang = rand(0, Math.PI * 2), spd = rand(2.5, 7);
      shards.push({
        x: cx + rand(-8, 8), y: cy + rand(-8, 8),
        vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - rand(1.5, 3.5),
        size: rand(3, 7),
        rot: rand(0, Math.PI*2), rotSpd: rand(-0.25, 0.25),
        life: 0, maxLife: rand(900, 1600),
      });
    }
    // rising gold coins / cash (only on success)
    if (!failed) {
      for (let i = 0; i < 26; i++) {
        const ang = rand(-Math.PI*0.85, -Math.PI*0.15), spd = rand(2.5, 6.5);
        coins.push({
          x: cx + rand(-12, 12), y: cy + rand(-4, 8),
          vx: Math.cos(ang)*spd*0.6, vy: Math.sin(ang)*spd - rand(0.5, 1.5),
          r: rand(3.5, 6), cash: Math.random() < 0.3,
          rot: rand(0, Math.PI*2), rotSpd: rand(-0.18, 0.18),
          flip: rand(0, Math.PI*2), flipSpd: rand(0.1, 0.3),
          life: 0, maxLife: rand(1100, 1900),
        });
      }
    }
    // impact sparks
    for (let i = 0; i < 22; i++) {
      const ang = rand(0, Math.PI * 2), spd = rand(3, 9);
      sparks.push({
        x: cx, y: cy, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - rand(1, 2),
        size: rand(1.5, 3), col: Math.random() < 0.6 ? "#ffd24d" : "#ffe9a8",
        life: 0, maxLife: rand(350, 750),
      });
    }
  }

  function drawCoin(ctx, c, a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(c.x, c.y);
    if (c.cash) {
      // green cash note
      ctx.rotate(c.rot);
      ctx.fillStyle = "#3c7a4a";
      roundRect(ctx, -c.r*1.4, -c.r*0.8, c.r*2.8, c.r*1.6, c.r*0.3); ctx.fill();
      ctx.strokeStyle = "#9fe0a8"; ctx.lineWidth = 1;
      roundRect(ctx, -c.r*1.4, -c.r*0.8, c.r*2.8, c.r*1.6, c.r*0.3); ctx.stroke();
      ctx.fillStyle = "#cfffd6";
      ctx.font = `bold ${c.r*1.2}px "Oswald", sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("$", 0, 0.5);
    } else {
      // gold coin (flipping ellipse)
      const sx = Math.abs(Math.cos(c.flip));
      ctx.scale(Math.max(0.18, sx), 1);
      ctx.fillStyle = "#f5c542";
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = "#a87814"; ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = "#fff1b8";
      ctx.beginPath(); ctx.arc(-c.r*0.25, -c.r*0.25, c.r*0.35, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#c79318";
      ctx.font = `bold ${c.r*1.1}px "Oswald", sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("$", 0, 0.5);
    }
    ctx.restore();
  }

  function drawShard(ctx, s, a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(s.x, s.y); ctx.rotate(s.rot);
    ctx.fillStyle = "#e8d7b0";
    ctx.beginPath();
    ctx.moveTo(0, -s.size);
    ctx.lineTo(s.size*0.8, s.size*0.6);
    ctx.lineTo(-s.size*0.6, s.size*0.5);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#b89b6a"; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.restore();
  }

  let lastFrameTime = t0;
  function frame(now) {
    const t = now - t0;
    const dt = Math.min(32, now - lastFrameTime); lastFrameTime = now;
    const dtF = dt / 16.667;

    clearAboveFX();
    clearBarFX();

    if (t < PH.popIn[1]) {
      // POP IN, robot bounces up holding the valuable in its grabbers
      const p = pt(t, PH.popIn);
      const cy = spawnCY + (restCY - spawnCY) * easeOutBounce(p);
      drawSprite(aboveCtx, "robot", heroCX, cy, heroSize, 1, false);
      drawSprite(aboveCtx, valuable, heroCX, cy - heroSize*0.62, heroSize*0.5, 1, false);
    }
    else if (t < PH.idle[1]) {
      // IDLE, hover, valuable bobs above the grabbers
      const p = pt(t, PH.idle);
      const cy = restCY + Math.sin(p * Math.PI * 2) * 2;
      drawSprite(aboveCtx, "robot", heroCX, cy, heroSize, 1, false);
      drawSprite(aboveCtx, valuable, heroCX, cy - heroSize*0.62 - Math.sin(p*Math.PI*2)*2, heroSize*0.5, 1, false);
    }
    else if (t < PH.charge[1]) {
      // CHARGE, grabbing/straining shake, "EXTRACTING..." text
      const p = pt(t, PH.charge);
      const pulse = (Math.sin(p * Math.PI * 8 - Math.PI/2) + 1) / 2;
      const flash = pulse * (0.1 + p * 0.5);
      const shakeX = Math.sin(t * 0.06) * p * 4;
      const shakeY = Math.cos(t * 0.07) * p * 3;
      const swell = 1 + p * 0.10;
      // robot strains, valuable judders harder than the robot
      drawSprite(aboveCtx, "robot", heroCX + shakeX*0.5, restCY + shakeY*0.5, heroSize * swell, 1, pulse > 0.6);
      drawSprite(aboveCtx, valuable, heroCX + shakeX, restCY - heroSize*0.62 + shakeY, heroSize*0.5*(1+p*0.08), 1, pulse > 0.6);
      // strain sparks at the grabbers
      const speckCount = Math.floor(36 * p);
      for (let i = 0; i < speckCount; i++) {
        aboveCtx.globalAlpha = rand(0.2, 0.7);
        aboveCtx.fillStyle = Math.random() < 0.5 ? "#ffd24d" : "#ffe9a8";
        aboveCtx.fillRect(randInt(0, W), randInt(H-110, H), randInt(1,3), randInt(1,2));
      }
      aboveCtx.globalAlpha = 1;
      // EXTRACTING... (flickering hazard label)
      if (Math.floor(t / 90) % 2 === 0 || p > 0.7) {
        aboveCtx.save();
        aboveCtx.font = `700 ${15 + p*4}px "Oswald", sans-serif`;
        aboveCtx.textAlign = "center"; aboveCtx.textBaseline = "middle";
        aboveCtx.shadowColor = "rgba(245,166,35,0.9)"; aboveCtx.shadowBlur = 10;
        aboveCtx.fillStyle = "#1a0f03";
        aboveCtx.fillText("⚠ EXTRACTING... ⚠", W/2 + 1, H - 120 + 1);
        aboveCtx.fillStyle = p > 0.5 ? "#fff0d0" : "#f5b84a";
        aboveCtx.fillText("⚠ EXTRACTING... ⚠", W/2, H - 120);
        aboveCtx.restore();
      }
      // bar amber flicker tint
      barCtx.fillStyle = `rgba(245,166,35,${0.06 + flash*0.25})`;
      barCtx.fillRect(0, 0, barW, barH);
    }
    else if (t < PH.boom[1]) {
      // BOOM, valuable SHATTERS in a burst; bright flash, ring, screen shake
      const p = pt(t, PH.boom);
      if (!boomFired) { seedShatter(); boomFired = true; }
      if (!shookScreen) {
        $stage.classList.remove("shake"); void $stage.offsetWidth;
        $stage.classList.add("shake"); shookScreen = true;
      }
      const a = (1 - p) * (1 - p);
      aboveCtx.fillStyle = `rgba(255,240,210,${a})`;
      aboveCtx.fillRect(0, 0, W, H);
      barCtx.fillStyle = `rgba(255,240,210,${a * 0.9})`;
      barCtx.fillRect(0, 0, barW, barH);
      // expanding shockwave ring
      aboveCtx.strokeStyle = `rgba(245,200,90,${a})`;
      aboveCtx.lineWidth = 4;
      aboveCtx.beginPath(); aboveCtx.arc(heroCX, restCY - 6, 20 + p*120, 0, Math.PI*2); aboveCtx.stroke();
      // robot still there (recoiling slightly)
      drawSprite(aboveCtx, "robot", heroCX, restCY + p*4, heroSize, 1, false);
      updateAndDrawExtraction(dtF, 1, t);
    }
    else if (t < PH.smoke[1]) {
      // SMOKE, coins/cash + shards rain & settle, cash count-up cha-ching
      const p = pt(t, PH.smoke);
      drawSprite(aboveCtx, "robot", heroCX, restCY, heroSize, 1, false);
      updateAndDrawExtraction(dtF, 1, t);
      drawResultBanner(p, 1);
    }
    else if (t < PH.fadeEnd[1]) {
      // FADE, quadratic fade to clean
      const p = pt(t, PH.fadeEnd);
      const fade = (1 - p) * (1 - p);
      drawSprite(aboveCtx, "robot", heroCX, restCY, heroSize, fade, false);
      updateAndDrawExtraction(dtF, fade, t);
      drawResultBanner(1, fade);
    }
    else {
      clearAboveFX(); clearBarFX();
      $stage.classList.remove("shake");
      done(); return;
    }
    if (!frozen) requestAnimationFrame(frame);
  }

  function drawResultBanner(prog, alphaMul) {
    aboveCtx.save();
    aboveCtx.globalAlpha = alphaMul;
    aboveCtx.textAlign = "center"; aboveCtx.textBaseline = "middle";
    if (failed) {
      // MISSION FAILED (red)
      aboveCtx.font = `700 22px "Oswald", sans-serif`;
      aboveCtx.shadowColor = "rgba(255,60,40,0.9)"; aboveCtx.shadowBlur = 12;
      aboveCtx.fillStyle = "#1a0303";
      aboveCtx.fillText("MISSION FAILED", W/2 + 1, H - 132 + 1);
      aboveCtx.fillStyle = "#ff5a48";
      aboveCtx.fillText("MISSION FAILED", W/2, H - 132);
    } else {
      // EXTRACTION COMPLETE (amber)
      aboveCtx.font = `700 20px "Oswald", sans-serif`;
      aboveCtx.shadowColor = "rgba(245,166,35,0.9)"; aboveCtx.shadowBlur = 12;
      aboveCtx.fillStyle = "#1a0f03";
      aboveCtx.fillText("EXTRACTION COMPLETE", W/2 + 1, H - 138 + 1);
      aboveCtx.fillStyle = "#ffe2a8";
      aboveCtx.fillText("EXTRACTION COMPLETE", W/2, H - 138);
      // cash count-up cha-ching
      const shown = Math.floor(cashTarget * Math.min(1, prog * 1.2));
      aboveCtx.font = `700 26px "Oswald", sans-serif`;
      aboveCtx.shadowColor = "rgba(120,255,140,0.8)"; aboveCtx.shadowBlur = 10;
      aboveCtx.fillStyle = "#0a1a0c";
      aboveCtx.fillText("$" + shown.toLocaleString(), W/2 + 1, H - 110 + 1);
      aboveCtx.fillStyle = "#aaffba";
      aboveCtx.fillText("$" + shown.toLocaleString(), W/2, H - 110);
    }
    aboveCtx.restore();
  }

  function updateAndDrawExtraction(dtF, alphaMul, t) {
    // ceramic shards
    for (let i = shards.length - 1; i >= 0; i--) {
      const s = shards[i];
      s.life += 16 * dtF;
      s.x += s.vx * dtF; s.y += s.vy * dtF; s.vy += 0.24 * dtF;
      s.vx *= Math.pow(0.99, dtF); s.rot += s.rotSpd * dtF;
      if (s.life >= s.maxLife || s.y > H + 20) { shards.splice(i, 1); continue; }
      drawShard(aboveCtx, s, Math.max(0, (1 - s.life/s.maxLife)) * alphaMul);
    }
    aboveCtx.globalAlpha = 1;
    // sparks
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.life += 16 * dtF;
      s.x += s.vx * dtF; s.y += s.vy * dtF; s.vy += 0.12 * dtF; s.vx *= Math.pow(0.97, dtF);
      if (s.life >= s.maxLife) { sparks.splice(i, 1); continue; }
      aboveCtx.globalAlpha = (1 - s.life/s.maxLife) * alphaMul;
      aboveCtx.fillStyle = s.col;
      aboveCtx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
    }
    aboveCtx.globalAlpha = 1;
    // gold coins / cash (rise then fall + settle)
    for (let i = coins.length - 1; i >= 0; i--) {
      const c = coins[i];
      c.life += 16 * dtF;
      c.x += c.vx * dtF; c.y += c.vy * dtF; c.vy += 0.18 * dtF;
      c.vx *= Math.pow(0.99, dtF); c.rot += c.rotSpd * dtF; c.flip += c.flipSpd * dtF;
      if (c.life >= c.maxLife || c.y > H + 20) { coins.splice(i, 1); continue; }
      const lp = c.life / c.maxLife;
      let a = 1; if (lp > 0.75) a = (1 - lp) / 0.25;
      drawCoin(aboveCtx, c, Math.max(0, a) * alphaMul);
    }
    aboveCtx.globalAlpha = 1;
  }

  if (frozen) {
    // Synchronous stepping driver, evolves particles up to freezeMs and draws
    // the final frame statically (no rAF), so a plain headless --screenshot
    // reliably captures any celebration phase.
    for (let tt = 0; tt <= freezeMs; tt += 16) frame(t0 + tt);
  } else {
    requestAnimationFrame(frame);
  }
}

// ============================================================
// AMBIENT WAREHOUSE-DUST PARTICLE LAYER (#bgFX, full window)
// ============================================================
let bgParticles = [];
function initBgParticles() {
  if (PARTICLE_KIND === "none") return;
  const ctx = $bgFX.getContext("2d");
  function resize() { $bgFX.width = window.innerWidth; $bgFX.height = window.innerHeight; }
  resize();
  window.addEventListener("resize", resize);
  const count = 46;
  for (let i = 0; i < count; i++) {
    bgParticles.push({
      x: Math.random() * $bgFX.width,
      y: Math.random() * $bgFX.height,
      vx: rand(-0.25, 0.25),
      vy: PARTICLE_KIND === "sparks" ? rand(-0.5, -0.1) : rand(0.1, 0.5),
      r: rand(0.7, 2.4),
    });
  }
  const isSparks = PARTICLE_KIND === "sparks";
  function loop() {
    ctx.clearRect(0, 0, $bgFX.width, $bgFX.height);
    for (const p of bgParticles) {
      p.x += p.vx; p.y += p.vy;
      if (p.y < -5) p.y = $bgFX.height + 5;
      if (p.y > $bgFX.height + 5) p.y = -5;
      if (p.x < -5) p.x = $bgFX.width + 5;
      if (p.x > $bgFX.width + 5) p.x = -5;
      ctx.globalAlpha = isSparks ? 0.6 : 0.4;
      ctx.fillStyle = isSparks ? "#ffbe4d" : "#9c8a5a";
      if (isSparks) { ctx.shadowColor = "rgba(245,166,35,0.7)"; ctx.shadowBlur = 5; }
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  loop();
}

// ============================================================
// DEMO CONTROLS
// ============================================================
document.getElementById("btnFollow").addEventListener("click", (e) => {
  e.stopPropagation();
  handleFollow(document.getElementById("demoUser").value || "Semibot", "");
});
document.getElementById("btnBatch").addEventListener("click", (e) => {
  e.stopPropagation();
  const n = parseInt(document.getElementById("demoBatch").value, 10) || 1;
  const names = ["Semibot","Valuable","Extraction","Hidden","Banger","Surplus","Recon","Manor","Wizard","Arctic"];
  for (let i = 0; i < n; i++) handleFollow(names[i % names.length] + (i >= names.length ? i : ""), "");
});
document.getElementById("btnPeek").addEventListener("click", (e) => {
  e.stopPropagation();
  if (!state.animating && !state.thankActive) startSpritePeek();
});
const $btnLoop = document.getElementById("btnLoop");
$btnLoop.addEventListener("click", (e) => {
  e.stopPropagation();
  state.autoLoop = !state.autoLoop;
  $btnLoop.textContent = "Auto-Loop: " + (state.autoLoop ? "ON" : "OFF");
  if (state.autoLoop) runAutoLoop(); else clearTimeout(state.autoLoopTimer);
});
function runAutoLoop() {
  if (!state.autoLoop) return;
  const fakeUsers = ["Semibot","Valuable","Extraction","Hidden","Banger","Surplus","Recon"];
  const batchSize = Math.random() < 0.6 ? 1 : randInt(2, 5);
  for (let i = 0; i < batchSize; i++) handleFollow(fakeUsers[randInt(0, fakeUsers.length-1)] + randInt(1,999), "");
  state.autoLoopTimer = setTimeout(runAutoLoop, randInt(5000, 9000));
}
document.getElementById("btnHide").addEventListener("click", (e) => {
  e.stopPropagation();
  document.getElementById("demoPanel").classList.add("hidden");
});
window.addEventListener("keydown", (e) => {
  if (e.key === "h" || e.key === "H") document.getElementById("demoPanel").classList.toggle("hidden");
});

// ============================================================
// TIKFINITY WEBSOCKET
// ============================================================
const $wsStatus = document.getElementById("wsStatus");
function setWsStatus(cls, text) { $wsStatus.className = cls; $wsStatus.textContent = "WS: " + text; }
function connectTikfinity() {
  setWsStatus("try", "connecting...");
  let ws;
  try { ws = new WebSocket("ws://localhost:21213/"); }
  catch (err) { setWsStatus("off", "failed"); setTimeout(connectTikfinity, 5000); return; }
  ws.onopen  = () => setWsStatus("on", "connected");
  ws.onclose = () => { setWsStatus("off", "disconnected"); setTimeout(connectTikfinity, 5000); };
  ws.onerror = () => setWsStatus("off", "error");
  ws.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (data && (data.event === "follow" || data.type === "follow")) {
        const d = data.data || data;
        const name = d.nickname || d.uniqueId || d.userId || "Crewmate";
        const pic  = d.profilePictureUrl || d.profilePicture || "";
        handleFollow(name, pic);
      }
    } catch (err) { /* ignore */ }
  };
}

// ============================================================
// SHOT MODE, line up every sprite for a contact screenshot
// ============================================================
function renderContactSheet() {
  stopIdleLoop();
  clearAboveFX();
  const cols = 4, rows = 2, sz = 80;
  const W = $aboveFX.width;
  const cellW = W / cols, cellH = 96;
  PEEK_SPRITES.forEach((name, i) => {
    const cx = (i % cols) * cellW + cellW/2;
    const cy = Math.floor(i / cols) * cellH + cellH/2 + 8;
    drawSprite(aboveCtx, name, cx, cy, sz, 1, false);
  });
}

// ============================================================
// INIT
// ============================================================
if (SHOW_DEMO) document.getElementById("demoPanel").classList.remove("hidden");
initBgParticles();
renderCTA();
connectTikfinity();
if (SHOT_MODE === "mobs") {
  renderContactSheet();
} else {
  startIdleLoop();
}
// Screenshot helpers:
//   ?fire=1, auto-trigger a live follow after load (visual smoke-test)
//   ?freeze=<phase>, render ONE static celebration frame (popin|idle|charge|
//                        boom|smoke|fade), reliably captured by plain --screenshot
if (params.get("fire")) {
  setTimeout(() => handleFollow(params.get("user") || "Semibot", ""), 60);
}
const FREEZE_MS = { popin:300, idle:760, charge:1500, boom:1760, smoke:2350, fade:2860 };
if (params.get("freeze")) {
  stopIdleLoop();
  const ms = FREEZE_MS[params.get("freeze")] != null ? FREEZE_MS[params.get("freeze")] : 1760;
  playFalloutAnim(() => {}, ms);
}
// ?signshot=N, static render of the R.E.P.O. extraction terminal sign
if (params.get("signshot")) {
  stopIdleLoop();
  state.totalFollowers = parseInt(params.get("signshot"), 10) || 7;
  state.recentFollowers = [{ user: params.get("user") || "Semibot", pic: "" }];
  state.signShowTime = performance.now();
  clearAboveFX();
  drawFollowerCounter(1, performance.now());
}
window.triggerFollow = handleFollow;
window.startSpritePeek = startSpritePeek;
window.renderContactSheet = renderContactSheet;
