<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Loadout — Compact Overlay</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<!--
  One pane that fades to whichever Loadout event is currently happening
  (welcome / sub / bolt earn / counter bump / streak / hype train /
  minigame result / etc.) and falls back to the commands ticker when
  nothing else is going on. Designed as a single OBS browser source
  (~400x120) for streamers who don't want a different overlay per zone.

  Drop into OBS:
    https://widget.aquilo.gg/overlays/compact/?bus=ws://127.0.0.1:7470/aquilo/bus/&secret=YOUR_SECRET

  URL params:
    pos        - tr (default) | tl | br | bl | tc | bc
    holdMs     - active card hold time (default 4500, min 1500)
    idleRotate - seconds between commands while idle (default 30, min 10)
    accent     - hex (overrides --accent via _shared/theme.js)
    accent2    - hex (overrides --accent2 — used for gradients)
    font       - css font-family stack
    fontScale  - 0.5..2.0 multiplier on size

  Subscribes to:
    commands.list, bolts.*, welcome.*, hypetrain.*, counter.*,
    viewer.profile.shown, rotation.song.playing, rotation.song.queued
-->
<link rel="stylesheet" href="../_shared/loadout-design.css">
<link rel="stylesheet" href="style.css">
</head>
<body data-pos="tr">
  <!-- "How to advance the train" tip — only shown when a hype train
       is active. Sits ABOVE the card so the takeover doesn't crowd it.
       Lists the cross-platform actions that fuel the aggregate train. -->
  <div id="hypeTip" class="hype-tip" hidden>
    <span class="hype-tip-label">⚡ Fuel the train:</span>
    <span class="hype-tip-item"><span class="ico" data-platform="twitch">▶</span><span>sub · gift · cheer · raid</span></span>
    <span class="hype-tip-item"><span class="ico" data-platform="tiktok">♪</span><span>send any gift</span></span>
    <span class="hype-tip-item"><span class="ico" data-platform="youtube">▶</span><span>super-chat · membership</span></span>
    <span class="hype-tip-item"><span class="ico" data-platform="kick">K</span><span>sub</span></span>
  </div>

  <div id="card">
    <!-- Idle layer: commands ticker -->
    <div id="idle" class="layer">
      <span id="idleBadge" class="badge">CMD</span>
      <span id="idleName" class="title">!commands</span>
      <span id="idleDesc" class="sub">list every command available</span>
    </div>

    <!-- Active layer: one of these classes is added to set tone -->
    <div id="active" class="layer hidden">
      <span id="actIcon" class="badge"></span>
      <span id="actTitle" class="title"></span>
      <span id="actSub"   class="sub"></span>
    </div>

    <!-- Game layer: the badge slot becomes a 56px-square visual that
         flips / rolls / spins per the bolts.minigame.* event kind, then
         settles on the result. Styled to read at the compact card's
         88px height — coin and die are 56x56 circles/squares, slots
         are 3 ~14x40 mini reels with staggered settle. -->
    <div id="game" class="layer hidden">
      <div class="game-visual">
        <!-- 3D coin: 2 round faces + 16 thin side panels around the
             y-axis. Compact uses 16 segments (vs 24 in the full
             overlay) — at 56px the eye doesn't read the difference,
             and the smaller cell count keeps frame cost down. -->
        <div class="g-coin">
          <span class="g-coin-face heads">H</span>
          <span class="g-coin-face tails">T</span>
          <span class="g-coin-edge" style="--edge-angle:0deg"></span>
          <span class="g-coin-edge" style="--edge-angle:22.5deg"></span>
          <span class="g-coin-edge" style="--edge-angle:45deg"></span>
          <span class="g-coin-edge" style="--edge-angle:67.5deg"></span>
          <span class="g-coin-edge" style="--edge-angle:90deg"></span>
          <span class="g-coin-edge" style="--edge-angle:112.5deg"></span>
          <span class="g-coin-edge" style="--edge-angle:135deg"></span>
          <span class="g-coin-edge" style="--edge-angle:157.5deg"></span>
          <span class="g-coin-edge" style="--edge-angle:180deg"></span>
          <span class="g-coin-edge" style="--edge-angle:202.5deg"></span>
          <span class="g-coin-edge" style="--edge-angle:225deg"></span>
          <span class="g-coin-edge" style="--edge-angle:247.5deg"></span>
          <span class="g-coin-edge" style="--edge-angle:270deg"></span>
          <span class="g-coin-edge" style="--edge-angle:292.5deg"></span>
          <span class="g-coin-edge" style="--edge-angle:315deg"></span>
          <span class="g-coin-edge" style="--edge-angle:337.5deg"></span>
        </div>
        <!-- 3D die: 6-face cube. Same primitive as the minigames
             overlay; different sizing knobs via CSS. -->
        <div class="g-die">
          <div class="g-die-face g-die-face-1"><span class="g-pip"></span></div>
          <div class="g-die-face g-die-face-2"><span class="g-pip"></span><span class="g-pip"></span></div>
          <div class="g-die-face g-die-face-3"><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span></div>
          <div class="g-die-face g-die-face-4"><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span></div>
          <div class="g-die-face g-die-face-5"><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span></div>
          <div class="g-die-face g-die-face-6"><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span><span class="g-pip"></span></div>
        </div>
        <div class="g-slots">
          <div class="g-reel" id="gReel0"></div>
          <div class="g-reel" id="gReel1"></div>
          <div class="g-reel" id="gReel2"></div>
          <!-- Spring-loaded lever mirroring the minigames overlay.
               JS toggles `.pulling` for the down-stroke before reels
               start spinning. Sized smaller for the 56px badge slot. -->
          <div class="g-lever" id="gLever">
            <div class="g-lever-arm"></div>
            <div class="g-lever-knob"></div>
            <div class="g-lever-base"></div>
          </div>
        </div>
      </div>
      <span id="gameTitle" class="title"></span>
      <span id="gameSub"   class="sub"></span>
    </div>

    <!-- Hype-train takeover layer. Shows from hypetrain.start through
         hypetrain.end, taking over the entire card so the train read
         is unmistakable. Three sub-states:
           * banner   — train glides right-to-left, "HYPE TRAIN!" trails
           * bar      — fuel-fill bar + level + countdown timer
           * level-up — banner re-runs with the new level number
         Banner overlays the bar during animations; CSS handles the
         z-stack. -->
    <div id="hype" class="layer hidden hype">
      <div class="hype-banner" id="hypeBanner">
        <div class="hype-train" id="hypeTrain">🚂🚃🚃</div>
        <div class="hype-banner-text" id="hypeBannerText">HYPE TRAIN!</div>
      </div>
      <div class="hype-meta">
        <div class="hype-level" id="hypeLevel">LEVEL 1</div>
        <div class="hype-bar"><div class="hype-bar-fill" id="hypeBarFill"></div></div>
        <div class="hype-row">
          <span class="hype-fuel" id="hypeFuel">0 / 100 fuel</span>
          <span class="hype-countdown" id="hypeCountdown">5:00</span>
        </div>
      </div>
    </div>
  </div>
  <script src="../_shared/theme.js"></script>
  <script src="../_shared/tiktok-gifts.js"></script>
  <script src="../_shared/platform-icons.js"></script>
  <script src="main.js"></script>
</body>
</html>
