<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Loadout — Compact Overlay</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<!--
  One pane that fades to whichever Loadout event is currently happening
  (welcome / sub / bolt earn / counter bump / streak / hype train /
  minigame result / etc.) and falls back to the commands ticker when
  nothing else is going on. Designed as a single OBS browser source
  (~400x120) for streamers who don't want a different overlay per zone.

  Drop into OBS:
    https://widget.aquilo.gg/overlays/compact/?bus=ws://127.0.0.1:7470/aquilo/bus/&secret=YOUR_SECRET

  URL params:
    pos        - tr (default) | tl | br | bl | tc | bc
    holdMs     - active card hold time (default 4500, min 1500)
    idleRotate - seconds between commands while idle (default 30, min 10)
    accent     - hex (overrides --accent via _shared/theme.js)
    accent2    - hex (overrides --accent2 — used for gradients)
    font       - css font-family stack
    fontScale  - 0.5..2.0 multiplier on size

  Subscribes to:
    commands.list, bolts.*, welcome.*, hypetrain.*, counter.*,
    viewer.profile.shown, rotation.song.playing, rotation.song.queued
-->
<link rel="stylesheet" href="style.css">
</head>
<body data-pos="tr">
  <div id="card">
    <!-- Idle layer: commands ticker -->
    <div id="idle" class="layer">
      <span id="idleBadge" class="badge">CMD</span>
      <span id="idleName" class="title">!commands</span>
      <span id="idleDesc" class="sub">list every command available</span>
    </div>

    <!-- Active layer: one of these classes is added to set tone -->
    <div id="active" class="layer hidden">
      <span id="actIcon" class="badge"></span>
      <span id="actTitle" class="title"></span>
      <span id="actSub"   class="sub"></span>
    </div>

    <!-- Game layer: the badge slot becomes a 56px-square visual that
         flips / rolls / spins per the bolts.minigame.* event kind, then
         settles on the result. Styled to read at the compact card's
         88px height — coin and die are 56x56 circles/squares, slots
         are 3 ~14x40 mini reels with staggered settle. -->
    <div id="game" class="layer hidden">
      <div class="game-visual">
        <div class="g-coin">
          <span class="g-coin-face heads">H</span>
          <span class="g-coin-face tails">T</span>
        </div>
        <div class="g-die"><span class="g-die-pip"></span></div>
        <div class="g-slots">
          <div class="g-reel" id="gReel0"></div>
          <div class="g-reel" id="gReel1"></div>
          <div class="g-reel" id="gReel2"></div>
        </div>
      </div>
      <span id="gameTitle" class="title"></span>
      <span id="gameSub"   class="sub"></span>
    </div>
  </div>
  <script src="../_shared/theme.js"></script>
  <script src="../_shared/tiktok-gifts.js"></script>
  <script src="main.js"></script>
</body>
</html>
