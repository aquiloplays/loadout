<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Loadout — Daily Check-In Overlay</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<!--
  This page is intentionally static. Drop the URL into OBS (Browser Source):

    https://aquilo.gg/overlays/check-in?bus=ws://127.0.0.1:7470&secret=YOUR_SECRET

  Required query params:
    bus      WebSocket URL of the local Aquilo Bus
    secret   Shared secret from %APPDATA%\Aquilo\bus-secret.txt

  Optional:
    debug    1 to render a static demo card (also fires when no bus connects)
    width    fixed width in px (default 540)
-->
<link rel="stylesheet" href="../_shared/loadout-design.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root" data-state="hidden">
    <div class="card" id="card">
      <!-- Premium tier sheen: subtle highlight that sweeps across the
           card surface for paid tiers. CSS-only animation, fully
           contained inside the card via overflow: hidden. -->
      <div class="sheen" aria-hidden="true"></div>

      <!-- Premium tier tint: stationary radial glow in a card corner
           per tier. Contained inside the card; sits behind content. -->
      <div class="tint" aria-hidden="true"></div>

      <img id="pfp" alt="" />
      <div class="initials" id="initials"></div>

      <!-- TikTok Heart Me overlay: pink heart that pulses in the
           lower-right corner of the avatar when a fan-club member
           checks in. CSS-only animation. -->
      <div class="tt-heart" id="tt-heart" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 21s-7.5-4.6-9.5-9.4C1.4 8.4 3.6 5 7 5c1.9 0 3.5 1 4.5 2.5h.9C13.5 6 15.1 5 17 5c3.5 0 5.6 3.4 4.5 6.6C19.5 16.4 12 21 12 21z" fill="currentColor" /></svg>
      </div>

      <div class="content">
        <div class="line-user">
          <span id="user" class="user"></span>
          <span id="flairs" class="flairs"></span>
        </div>
        <!-- Viewer-supplied message: text after the !checkin command, OR the
             channel-points reward prompt input. Hidden when empty. Twitch
             emotes are spliced in as <img> using the {start, end} ranges from
             the bus payload; YouTube / TikTok emoji come through as Unicode
             in the text and render naturally. -->
        <div class="message" id="message" hidden></div>
        <div class="stats" id="stats"></div>
      </div>
    </div>
  </div>

  <script src="../_shared/theme.js"></script>
  <script src="main.js"></script>
</body>
</html>
