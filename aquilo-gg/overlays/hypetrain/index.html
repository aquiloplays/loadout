<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Loadout — Hype Train Overlay</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<!--
  Cross-platform hype train. Loadout's HypeTrainModule aggregates spend
  from sub / resub / gift / cheer / raid / TikTok-gift / Kick-sub /
  super-chat events and publishes hypetrain.* events on the bus. This
  overlay renders the current level, fuel-to-next, and latest
  contributor — appears only while a train is active, slides out when
  the train ends and the cooldown begins.

  Drop into OBS:
    https://widget.aquilo.gg/overlays/hypetrain/?bus=ws://127.0.0.1:7470/aquilo/bus/&secret=YOUR_SECRET

  Optional URL params:
    pos     - "tc" (default) | "tl" | "tr" | "bc" | "bl" | "br"
    accent  - hex (overrides --accent via _shared/theme.js)
-->
<link rel="stylesheet" href="../_shared/loadout-design.css">
<link rel="stylesheet" href="style.css">
</head>
<body data-pos="tc">
  <!-- Cross-platform "fuel the train" hint — sits ABOVE the card so
       viewers see at a glance how to push the train across every
       connected platform. Hidden when no train is active; only the
       card shows during cooldown / idle. -->
  <div id="tip" class="hype-tip" hidden>
    <span class="hype-tip-label">⚡ Fuel the train:</span>
    <span class="hype-tip-item"><span class="ico" data-platform="twitch">▶</span><span>sub · gift · cheer · raid</span></span>
    <span class="hype-tip-item"><span class="ico" data-platform="tiktok">♪</span><span>send any gift</span></span>
    <span class="hype-tip-item"><span class="ico" data-platform="youtube">▶</span><span>super-chat · membership</span></span>
    <span class="hype-tip-item"><span class="ico" data-platform="kick">K</span><span>sub</span></span>
  </div>

  <div id="card" class="hidden">
    <!-- Banner row: animated train + headline. .running class kicks
         the right→left glide animation; toggled on every banner state
         (start, level-up, end). -->
    <div class="banner" id="banner">
      <span class="train" id="train">🚂🚃🚃</span>
      <span class="banner-text" id="bannerText">HYPE TRAIN!</span>
    </div>
    <div class="row top">
      <span class="title">HYPE TRAIN</span>
      <span class="level">LV <span id="lvl">1</span></span>
      <span class="countdown" id="countdown">5:00</span>
    </div>
    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>
    <div class="row bot">
      <span id="contributor" class="contributor"></span>
      <span id="fuelText" class="fuel"></span>
    </div>
  </div>

  <script src="../_shared/theme.js"></script>
  <script src="main.js"></script>
</body>
</html>
