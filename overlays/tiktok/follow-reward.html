<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aquilo • Follow = Random Game Effect — TikTok Banner Overlay</title>
<style>
  /* ============================================================
     Aquilo TikTok "Follow = Random Game Effect" BANNER overlay
     Target Browser Source: 1080 x 120, transparent background.
     Sits full-width between the streamer cam/chat and the game
     capture on a 1080 x 1920 vertical canvas.
     House style: Glossy Game Premium (marketing surface).
     ============================================================ */

  :root {
    /* Aurora palette */
    --violet:  #7c5cff;
    --pink:    #ff6ab5;
    --green:   #5bff95;
    --teal:    #22d3ee;

    /* Theme accents (overridable via ?theme=) — default = full aurora */
    --accent-a: var(--violet);
    --accent-b: var(--pink);
    --accent-c: var(--teal);

    --ink:        #ffffff;
    --ink-soft:   rgba(255, 255, 255, 0.74);
    --ink-faint:  rgba(255, 255, 255, 0.48);
  }

  /* Transparent canvas — required for OBS Browser Source */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 1080px;
    height: 120px;
    overflow: hidden;
    font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .stage {
    width: 1080px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding: 8px 10px;
  }

  /* ---- The banner bar ----------------------------------------- */
  .bar {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 22px;
    box-sizing: border-box;
    padding: 0 24px;
    /* symmetric layout: fixed side columns keep the hero canvas-centered */
    display: grid;
    grid-template-columns: 236px 1fr 236px;
    align-items: center;

    /* Dark cosmic gradient, lit from the two ends with aurora */
    background:
      radial-gradient(80% 180% at 0% 50%, rgba(124, 92, 255, 0.42) 0%, rgba(124, 92, 255, 0) 55%),
      radial-gradient(80% 180% at 100% 50%, rgba(34, 211, 238, 0.34) 0%, rgba(34, 211, 238, 0) 55%),
      radial-gradient(60% 160% at 50% 120%, rgba(255, 106, 181, 0.22) 0%, rgba(255, 106, 181, 0) 60%),
      linear-gradient(90deg, #14122b 0%, #0c0a1c 50%, #110f26 100%);

    /* Glossy depth: outer aurora glow + inner highlight + crisp ring */
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.07),
      0 10px 34px rgba(124, 92, 255, 0.30),
      0 4px 16px rgba(34, 211, 238, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.18),
      inset 0 -18px 44px rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.10);
    animation: barBreath 9s ease-in-out infinite;
  }

  /* Glossy top sheen */
  .bar::before {
    content: "";
    position: absolute;
    inset: 1px 1px auto 1px;
    height: 48%;
    border-radius: 21px 21px 40% 40% / 21px 21px 60% 60%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.16) 0%, rgba(255, 255, 255, 0) 100%);
    pointer-events: none;
  }

  @keyframes barBreath {
    0%, 100% { box-shadow:
      0 0 0 1px rgba(255,255,255,0.07),
      0 10px 34px rgba(124,92,255,0.30),
      0 4px 16px rgba(34,211,238,0.18),
      inset 0 1px 0 rgba(255,255,255,0.18),
      inset 0 -18px 44px rgba(0,0,0,0.55); }
    50% { box-shadow:
      0 0 0 1px rgba(255,255,255,0.09),
      0 12px 44px rgba(124,92,255,0.44),
      0 6px 22px rgba(34,211,238,0.26),
      inset 0 1px 0 rgba(255,255,255,0.22),
      inset 0 -18px 44px rgba(0,0,0,0.55); }
  }

  /* ---- LEFT: emblem + wordmark + tiny d20 accent -------------- */
  .left {
    display: flex;
    align-items: center;
    gap: 13px;
    justify-self: start;
  }
  .left .emblem {
    width: 34px; height: 34px;
    filter: drop-shadow(0 0 7px rgba(124, 92, 255, 0.75));
  }
  .left .wordmark {
    font-size: 21px;
    font-weight: 800;
    letter-spacing: 0.01em;
    color: var(--ink);
    white-space: nowrap;
  }
  .left .wordmark .gg {
    background: linear-gradient(90deg, var(--accent-a), var(--accent-c));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  /* Tiny spinning d20 accent (sits next to the wordmark) */
  .die {
    flex: 0 0 auto;
    width: 40px; height: 40px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .die .glow {
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,92,255,0.55) 0%, rgba(34,211,238,0) 70%);
    animation: diePulse 3s ease-in-out infinite;
  }
  .die svg {
    width: 40px; height: 40px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    animation: spin 12s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes diePulse { 0%,100%{ transform: scale(0.9); opacity: .7;} 50%{ transform: scale(1.08); opacity: 1;} }

  /* ---- CENTER: hero CTA (dominant focal point) ---------------- */
  .hero {
    justify-self: center;
    text-align: center;
    min-width: 0;
    white-space: nowrap;
  }
  .hero .title {
    margin: 0;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 0.005em;
    line-height: 1;
    color: var(--ink);
    text-shadow: 0 2px 14px rgba(0,0,0,0.5);
  }
  .hero .title .reward {
    background: linear-gradient(100deg, var(--accent-b) 0%, var(--accent-a) 45%, var(--accent-c) 100%);
    background-size: 220% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: gradientSlide 6s ease-in-out infinite, heroGlow 2.6s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(124, 92, 255, 0.55));
  }
  @keyframes gradientSlide { 0%,100%{ background-position: 0% 50%; } 50%{ background-position: 100% 50%; } }
  @keyframes heroGlow {
    0%,100% { filter: drop-shadow(0 0 11px rgba(124,92,255,0.45)); }
    50%     { filter: drop-shadow(0 0 20px rgba(255,106,181,0.65)); }
  }

  /* ---- RIGHT: rotating product callout ------------------------ */
  .promo {
    justify-self: end;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }
  .promo .pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    max-width: 100%;
    padding: 9px 15px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(124,92,255,0.20), rgba(34,211,238,0.16));
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 6px 16px rgba(0,0,0,0.4);
    transition: opacity 0.55s ease, transform 0.55s ease;
  }
  .promo .pill.is-out { opacity: 0; transform: translateY(-5px); }
  .promo .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-c);
    box-shadow: 0 0 9px var(--accent-c);
    flex: 0 0 auto;
  }
  .promo .text { display: flex; flex-direction: column; line-height: 1.12; min-width: 0; }
  .promo .brandtag {
    font-size: 13px;
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent-a), var(--accent-c));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    white-space: nowrap;
  }
  .promo .copy {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---- Compact mode: hide the rotating callout ---------------- */
  body.compact .promo { display: none; }

  /* Reduce motion respect */
  @media (prefers-reduced-motion: reduce) {
    .die svg, .die .glow, .bar, .hero .reward { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="bar">

      <!-- LEFT: brand -->
      <div class="left">
        <svg class="emblem" viewBox="0 0 32 32" aria-hidden="true">
          <defs>
            <linearGradient id="emb" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#7c5cff"/>
              <stop offset="0.5" stop-color="#ff6ab5"/>
              <stop offset="1" stop-color="#22d3ee"/>
            </linearGradient>
          </defs>
          <!-- stylized 'A' / eagle wing emblem -->
          <path d="M16 3 L28 27 L21.5 27 L16 14.5 L10.5 27 L4 27 Z" fill="url(#emb)"/>
          <path d="M16 16.5 L19 23 L13 23 Z" fill="#0c0a1c"/>
        </svg>
        <span class="wordmark">aquilo<span class="gg">.gg</span></span>

        <!-- Tiny spinning d20 accent -->
        <div class="die">
          <div class="glow"></div>
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <defs>
              <linearGradient id="d20g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#9a7dff"/>
                <stop offset="1" stop-color="#5b34d6"/>
              </linearGradient>
            </defs>
            <polygon points="32,3 59,18 59,46 32,61 5,46 5,18" fill="url(#d20g)" stroke="#cdbcff" stroke-width="1.5"/>
            <polygon points="32,3 59,18 32,28 5,18" fill="#b6a2ff" opacity="0.55"/>
            <polygon points="32,28 59,18 59,46 32,61 5,46 5,18" fill="none" stroke="#3a2596" stroke-width="1"/>
            <polygon points="32,28 59,46 32,61 5,46" fill="#2a1b6b" opacity="0.35"/>
            <text x="32" y="40" text-anchor="middle" font-size="17" font-weight="900" fill="#fff" font-family="Segoe UI, sans-serif">20</text>
          </svg>
        </div>
      </div>

      <!-- CENTER: hero -->
      <div class="hero">
        <h1 class="title">FOLLOW = <span class="reward">RANDOM GAME EFFECT</span></h1>
      </div>

      <!-- RIGHT: rotating product callout -->
      <div class="promo">
        <div class="pill" id="promoPill">
          <span class="dot"></span>
          <span class="text">
            <span class="brandtag" id="promoBrand">aquilo.gg</span>
            <span class="copy" id="promoCopy">Play Boltbound TCG — free</span>
          </span>
        </div>
      </div>

    </div>
  </div>

  <script>
  /* ================= CONFIG ===================================== */
  const CONFIG = {
    // ms between product callouts
    rotationInterval: 7000,
    // Enabled callouts — comment out any line to disable it.
    callouts: [
      { brand: "aquilo.gg",     copy: "Play Boltbound TCG — free" },
      { brand: "aquilo.gg",     copy: "Build your Clash empire" },
      { brand: "aquilo.gg",     copy: "RPG heroes + expeditions" },
      { brand: "StreamFusion",  copy: "Free Twitch tools" },
      { brand: "Loadout",       copy: "Overlays for streamers" },
      { brand: "aquilo.gg",     copy: "Join the Patreon community" },
    ],
  };

  /* ================= URL FLAGS ================================== */
  const params = new URLSearchParams(location.search);

  // ?compact=1  -> hide rotating callout (hero-only minimal mode)
  if (params.get("compact") === "1") {
    document.body.classList.add("compact");
  }

  // ?theme=violet|pink|teal -> tint the accent trio
  const THEMES = {
    violet: { a: "#7c5cff", b: "#9a7dff", c: "#22d3ee" },
    pink:   { a: "#ff6ab5", b: "#ff8fcb", c: "#7c5cff" },
    teal:   { a: "#22d3ee", b: "#5bff95", c: "#7c5cff" },
  };
  const theme = THEMES[params.get("theme")];
  if (theme) {
    const r = document.documentElement.style;
    r.setProperty("--accent-a", theme.a);
    r.setProperty("--accent-b", theme.b);
    r.setProperty("--accent-c", theme.c);
  }

  // ?interval=NN (seconds) -> override rotation speed
  const ivl = parseFloat(params.get("interval"));
  if (!isNaN(ivl) && ivl > 0) CONFIG.rotationInterval = ivl * 1000;

  /* ================= ROTATION ENGINE =========================== */
  (function rotate() {
    const pill  = document.getElementById("promoPill");
    const brand = document.getElementById("promoBrand");
    const copy  = document.getElementById("promoCopy");
    const list  = CONFIG.callouts;
    if (!pill || list.length === 0) return;

    let i = 0;
    function show(idx) {
      brand.textContent = list[idx].brand;
      copy.textContent  = list[idx].copy;
    }
    show(0);

    if (list.length < 2) return; // nothing to rotate

    setInterval(() => {
      pill.classList.add("is-out");          // fade/slide out
      setTimeout(() => {
        i = (i + 1) % list.length;
        show(i);
        pill.classList.remove("is-out");     // fade back in
      }, 550);                                // matches CSS transition
    }, CONFIG.rotationInterval);
  })();
  </script>
</body>
</html>
