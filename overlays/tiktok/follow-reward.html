<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aquilo • Follow = Reward — TikTok Middle Overlay</title>
<style>
  /* ============================================================
     Aquilo TikTok "Follow = Reward" middle-canvas overlay
     Target Browser Source: 600 x 800, transparent background.
     Centers in OBS at the middle of a 1080 x 1920 vertical canvas.
     House style: Glossy Game Premium (marketing surface).
     ============================================================ */

  :root {
    /* Aurora palette */
    --violet:  #7c5cff;
    --pink:    #ff6ab5;
    --green:   #5bff95;
    --teal:    #22d3ee;

    /* Theme accents (overridable via ?theme=) — default = full aurora */
    --accent-a: var(--violet);
    --accent-b: var(--pink);
    --accent-c: var(--teal);

    --ink:        #ffffff;
    --ink-soft:   rgba(255, 255, 255, 0.72);
    --ink-faint:  rgba(255, 255, 255, 0.46);
  }

  /* Transparent canvas — required for OBS Browser Source */
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    width: 600px;
    height: 800px;
    overflow: hidden;
    font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Center the card in the 600x800 source */
  .stage {
    width: 600px;
    height: 800px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    padding: 24px;
  }

  /* ---- The card ----------------------------------------------- */
  .card {
    position: relative;
    width: 100%;
    max-width: 540px;
    border-radius: 32px;
    padding: 30px 30px 26px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;

    /* Dark cosmic gradient */
    background:
      radial-gradient(120% 90% at 50% -10%, rgba(124, 92, 255, 0.40) 0%, rgba(124, 92, 255, 0) 55%),
      radial-gradient(120% 80% at 100% 110%, rgba(34, 211, 238, 0.28) 0%, rgba(34, 211, 238, 0) 60%),
      radial-gradient(120% 80% at 0% 110%, rgba(255, 106, 181, 0.26) 0%, rgba(255, 106, 181, 0) 60%),
      linear-gradient(160deg, #14122b 0%, #0c0a1c 55%, #08070f 100%);

    /* Glossy depth: outer aurora glow + inner highlight + crisp ring */
    box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.06),
      0 24px 70px rgba(124, 92, 255, 0.30),
      0 8px 30px rgba(34, 211, 238, 0.16),
      inset 0 1px 0 rgba(255, 255, 255, 0.16),
      inset 0 -40px 90px rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.10);
    animation: cardBreath 9s ease-in-out infinite;
  }

  /* Glossy top sheen */
  .card::before {
    content: "";
    position: absolute;
    inset: 1px 1px auto 1px;
    height: 46%;
    border-radius: 31px 31px 60% 60% / 31px 31px 30% 30%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0) 100%);
    pointer-events: none;
  }

  @keyframes cardBreath {
    0%, 100% { box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.06),
      0 24px 70px rgba(124, 92, 255, 0.30),
      0 8px 30px rgba(34, 211, 238, 0.16),
      inset 0 1px 0 rgba(255, 255, 255, 0.16),
      inset 0 -40px 90px rgba(0, 0, 0, 0.55); }
    50% { box-shadow:
      0 0 0 1px rgba(255, 255, 255, 0.08),
      0 28px 84px rgba(124, 92, 255, 0.42),
      0 10px 38px rgba(34, 211, 238, 0.22),
      inset 0 1px 0 rgba(255, 255, 255, 0.20),
      inset 0 -40px 90px rgba(0, 0, 0, 0.55); }
  }

  /* ---- Top: emblem + wordmark --------------------------------- */
  .brand {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 2px;
  }
  .brand .emblem {
    width: 26px;
    height: 26px;
    filter: drop-shadow(0 0 6px rgba(124, 92, 255, 0.7));
  }
  .brand .wordmark {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .brand .wordmark .gg {
    background: linear-gradient(90deg, var(--accent-a), var(--accent-c));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* ---- Spinning visual: orb with orbiting d20 + coin ---------- */
  .visual {
    position: relative;
    width: 168px;
    height: 168px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 2px 0 2px;
  }
  /* Glow halo */
  .visual .halo {
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 40%,
      rgba(124, 92, 255, 0.55) 0%,
      rgba(34, 211, 238, 0.28) 45%,
      rgba(124, 92, 255, 0) 72%);
    filter: blur(2px);
    animation: haloPulse 3.4s ease-in-out infinite;
  }
  @keyframes haloPulse {
    0%, 100% { transform: scale(0.94); opacity: 0.75; }
    50%      { transform: scale(1.06); opacity: 1; }
  }
  /* Rotating ring that carries the orbiting tokens */
  .visual .ring {
    position: absolute;
    inset: 0;
    animation: spin 14s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .visual .d20 {
    position: absolute;
    top: -6px; left: 50%;
    width: 52px; height: 52px;
    margin-left: -26px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
    animation: counterSpin 14s linear infinite, tokenFloat 3.4s ease-in-out infinite;
  }
  .visual .coin {
    position: absolute;
    bottom: -2px; left: 50%;
    width: 38px; height: 38px;
    margin-left: -19px;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
    animation: counterSpin 14s linear infinite, coinFlip 4.2s ease-in-out infinite;
  }
  /* keep tokens upright while the ring rotates */
  @keyframes counterSpin { to { transform: rotate(-360deg); } }
  @keyframes tokenFloat { 0%,100%{ translate: 0 0; } 50%{ translate: 0 -3px; } }
  @keyframes coinFlip { 0%,100%{ transform: rotate(-360deg) rotateY(0); } 50%{ transform: rotate(-540deg) rotateY(180deg); } }

  /* Center core orb */
  .visual .core {
    position: relative;
    width: 78px; height: 78px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 36% 30%, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 38%),
      radial-gradient(circle at 50% 60%, var(--accent-a) 0%, #2a1b6b 70%, #120c2e 100%);
    box-shadow:
      0 0 24px rgba(124, 92, 255, 0.65),
      inset 0 -8px 18px rgba(0,0,0,0.5),
      inset 0 4px 10px rgba(255,255,255,0.35);
    animation: corePulse 3.4s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%,100% { box-shadow: 0 0 24px rgba(124,92,255,0.55), inset 0 -8px 18px rgba(0,0,0,0.5), inset 0 4px 10px rgba(255,255,255,0.35); }
    50%     { box-shadow: 0 0 40px rgba(34,211,238,0.7),  inset 0 -8px 18px rgba(0,0,0,0.5), inset 0 4px 10px rgba(255,255,255,0.45); }
  }

  /* ---- Hero block --------------------------------------------- */
  .hero { text-align: center; }
  .hero .eyebrow {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .hero .title {
    font-size: 38px;
    line-height: 1.08;
    font-weight: 900;
    letter-spacing: 0.01em;
    margin: 0;
    color: var(--ink);
    text-shadow: 0 2px 18px rgba(0,0,0,0.5);
  }
  .hero .title .reward {
    display: block;
    margin-top: 4px;
    background: linear-gradient(100deg, var(--accent-b) 0%, var(--accent-a) 45%, var(--accent-c) 100%);
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: gradientSlide 6s ease-in-out infinite, heroGlow 2.6s ease-in-out infinite;
    filter: drop-shadow(0 0 14px rgba(124, 92, 255, 0.55));
  }
  @keyframes gradientSlide { 0%,100%{ background-position: 0% 50%; } 50%{ background-position: 100% 50%; } }
  @keyframes heroGlow {
    0%,100% { filter: drop-shadow(0 0 12px rgba(124,92,255,0.45)); }
    50%     { filter: drop-shadow(0 0 22px rgba(255,106,181,0.65)); }
  }
  /* ---- Bottom: rotating product callout ----------------------- */
  .promo {
    width: 100%;
    margin-top: 4px;
    min-height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .promo .pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    max-width: 100%;
    padding: 11px 18px;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(124,92,255,0.18), rgba(34,211,238,0.14));
    border: 1px solid rgba(255, 255, 255, 0.16);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 8px 22px rgba(0,0,0,0.4);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .promo .pill.is-out { opacity: 0; transform: translateY(6px); }
  .promo .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-c);
    box-shadow: 0 0 10px var(--accent-c);
    flex: 0 0 auto;
  }
  .promo .brandtag {
    font-weight: 800;
    background: linear-gradient(90deg, var(--accent-a), var(--accent-c));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    white-space: nowrap;
  }
  .promo .copy {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---- Compact mode hides the promo strip --------------------- */
  body.compact .promo { display: none; }
  body.compact .card { gap: 16px; padding-bottom: 30px; }

  /* Reduce motion respect */
  @media (prefers-reduced-motion: reduce) {
    .ring, .d20, .coin, .halo, .core, .card, .hero .reward { animation: none !important; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="card">

      <!-- Top brand -->
      <div class="brand">
        <svg class="emblem" viewBox="0 0 32 32" aria-hidden="true">
          <defs>
            <linearGradient id="emb" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#7c5cff"/>
              <stop offset="0.5" stop-color="#ff6ab5"/>
              <stop offset="1" stop-color="#22d3ee"/>
            </linearGradient>
          </defs>
          <!-- stylized 'A' / eagle wing emblem -->
          <path d="M16 3 L28 27 L21.5 27 L16 14.5 L10.5 27 L4 27 Z" fill="url(#emb)"/>
          <path d="M16 16.5 L19 23 L13 23 Z" fill="#0c0a1c"/>
        </svg>
        <span class="wordmark">aquilo<span class="gg">.gg</span></span>
      </div>

      <!-- Spinning visual -->
      <div class="visual">
        <div class="halo"></div>
        <div class="core"></div>
        <div class="ring">
          <!-- d20 die -->
          <svg class="d20" viewBox="0 0 64 64" aria-hidden="true">
            <defs>
              <linearGradient id="d20g" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#9a7dff"/>
                <stop offset="1" stop-color="#5b34d6"/>
              </linearGradient>
            </defs>
            <polygon points="32,3 59,18 59,46 32,61 5,46 5,18" fill="url(#d20g)" stroke="#cdbcff" stroke-width="1.5"/>
            <polygon points="32,3 59,18 32,28 5,18" fill="#b6a2ff" opacity="0.55"/>
            <polygon points="32,28 59,18 59,46 32,61 5,46 5,18" fill="none" stroke="#3a2596" stroke-width="1"/>
            <polygon points="32,28 59,46 32,61 5,46" fill="#2a1b6b" opacity="0.35"/>
            <text x="32" y="40" text-anchor="middle" font-size="17" font-weight="900" fill="#fff" font-family="Segoe UI, sans-serif">20</text>
          </svg>
          <!-- coin -->
          <svg class="coin" viewBox="0 0 48 48" aria-hidden="true">
            <defs>
              <linearGradient id="coing" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#fff0a8"/>
                <stop offset="0.5" stop-color="#ffd34d"/>
                <stop offset="1" stop-color="#f59e0b"/>
              </linearGradient>
            </defs>
            <circle cx="24" cy="24" r="21" fill="url(#coing)" stroke="#b97606" stroke-width="2"/>
            <circle cx="24" cy="24" r="15" fill="none" stroke="#b97606" stroke-width="1.5" opacity="0.6"/>
            <path d="M24 13 L27.5 21 L36 21 L29 26 L31.5 34 L24 29 L16.5 34 L19 26 L12 21 L20.5 21 Z" fill="#b97606" opacity="0.85"/>
          </svg>
        </div>
      </div>

      <!-- Hero -->
      <div class="hero">
        <div class="eyebrow">New here? Tap follow</div>
        <h1 class="title">FOLLOW =<br><span class="reward">RANDOM GAME EFFECT</span></h1>
      </div>

      <!-- Rotating product callout -->
      <div class="promo">
        <div class="pill" id="promoPill">
          <span class="dot"></span>
          <span class="brandtag" id="promoBrand">aquilo.gg</span>
          <span class="copy" id="promoCopy">Play Boltbound TCG free</span>
        </div>
      </div>

    </div>
  </div>

  <script>
  /* ================= CONFIG ===================================== */
  const CONFIG = {
    // ms between product callouts
    rotationInterval: 7000,
    // Enabled callouts — comment out any line to disable it.
    callouts: [
      { brand: "aquilo.gg", copy: "Play Boltbound TCG — free" },
      { brand: "aquilo.gg", copy: "Build your Clash empire" },
      { brand: "aquilo.gg", copy: "RPG heroes + expeditions" },
      { brand: "StreamFusion", copy: "Free Twitch tools" },
      { brand: "Loadout", copy: "Overlays for streamers" },
      { brand: "aquilo.gg", copy: "Join the Patreon community" },
    ],
  };

  /* ================= URL FLAGS ================================== */
  const params = new URLSearchParams(location.search);

  // ?compact=1  -> hide rotating ad strip
  if (params.get("compact") === "1") {
    document.body.classList.add("compact");
  }

  // ?theme=violet|pink|teal -> tint the accent trio
  const THEMES = {
    violet: { a: "#7c5cff", b: "#9a7dff", c: "#22d3ee" },
    pink:   { a: "#ff6ab5", b: "#ff8fcb", c: "#7c5cff" },
    teal:   { a: "#22d3ee", b: "#5bff95", c: "#7c5cff" },
  };
  const theme = THEMES[params.get("theme")];
  if (theme) {
    const r = document.documentElement.style;
    r.setProperty("--accent-a", theme.a);
    r.setProperty("--accent-b", theme.b);
    r.setProperty("--accent-c", theme.c);
  }

  // ?interval=NNNN (seconds) -> override rotation speed
  const ivl = parseFloat(params.get("interval"));
  if (!isNaN(ivl) && ivl > 0) CONFIG.rotationInterval = ivl * 1000;

  /* ================= ROTATION ENGINE =========================== */
  (function rotate() {
    const pill  = document.getElementById("promoPill");
    const brand = document.getElementById("promoBrand");
    const copy  = document.getElementById("promoCopy");
    const list  = CONFIG.callouts;
    if (!pill || list.length === 0) return;

    let i = 0;
    function show(idx) {
      brand.textContent = list[idx].brand;
      copy.textContent  = list[idx].copy;
    }
    show(0);

    if (list.length < 2) return; // nothing to rotate

    setInterval(() => {
      pill.classList.add("is-out");          // fade/slide out
      setTimeout(() => {
        i = (i + 1) % list.length;
        show(i);
        pill.classList.remove("is-out");     // fade back in
      }, 600);                                // matches CSS transition
    }, CONFIG.rotationInterval);
  })();
  </script>
</body>
</html>
