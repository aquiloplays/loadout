name: Deploy worker

# Auto-deploys the discord-bot Cloudflare Worker on every push to the LIVE
# branch (sunset/remove-economy — that IS production for this worker; main is
# an older line, so deploying main would REVERT the worker). Deploying from
# git this way ends the "wrangler deploy ships a stale local working tree and
# reverts someone else's deploy" hazard — every deploy reflects origin.
# Applies all pending D1 migrations first, then runs wrangler deploy.
# One-time setup: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
# as repo secrets at https://github.com/aquiloplays/loadout/settings/secrets/actions

on:
  push:
    branches: [sunset/remove-economy]
    paths:
      - 'discord-bot/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: discord-bot
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: discord-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Apply every *-migration.sql in the discord-bot folder.
          # Migrations are idempotent ("CREATE TABLE IF NOT EXISTS") so
          # re-running is safe.
          shopt -s nullglob
          for f in *-migration.sql; do
            echo "Applying $f"
            npx wrangler d1 execute aquilo_bot_db --remote --file="$f" || true
          done

      - name: Ensure R2 buckets exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Create any R2 buckets referenced in wrangler.toml. If they
          # already exist, wrangler returns a non-zero exit which we
          # ignore. New buckets added to wrangler.toml are picked up
          # automatically by adding their name to this list.
          for bucket in aquilo-overlay-references; do
            echo "Ensuring R2 bucket: $bucket"
            npx wrangler r2 bucket create "$bucket" || true
          done

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Smoke check
        run: |
          # Confirm the deploy is live AND that key routes exist (a stale/old
          # tree would 404 these) before calling the deploy good.
          base="https://loadout-discord.aquiloplays.workers.dev"
          # Wait for the edge to serve the new version.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$base/api/dock/registry")
            echo "Try $i, dock/registry HTTP $code"
            [ "$code" = "200" ] || [ "$code" = "401" ] && break
            sleep 4
          done
          fail=0
          expect() { c=$(curl -s -o /dev/null -w "%{http_code}" "$base$1"); echo "  $c  $1"; case "$2" in *"$c"*) ;; *) echo "    ✗ expected $2"; fail=1;; esac; }
          expect "/api/account/me" "200"                       # sign-in wired
          expect "/api/twitch/category?login=aquilogg" "200"   # Helix category route
          expect "/api/account/twitch-categories?q=call" "401" # picker (gated, NOT 404)
          if [ "$fail" != "0" ]; then echo "Route(s) missing — likely a stale deploy."; exit 1; fi
          echo "Worker is live and routes present."
