name: Deploy worker

# Auto-deploys the discord-bot Cloudflare Worker on every push to main.
# Applies all pending D1 migrations first, then runs wrangler deploy.
# One-time setup: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
# as repo secrets at https://github.com/aquiloplays/loadout/settings/secrets/actions

on:
  push:
    branches: [main]
    paths:
      - 'discord-bot/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: discord-bot
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: discord-bot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Apply every *-migration.sql in the discord-bot folder.
          # Migrations are idempotent ("CREATE TABLE IF NOT EXISTS") so
          # re-running is safe.
          shopt -s nullglob
          for f in *-migration.sql; do
            echo "Applying $f"
            npx wrangler d1 execute aquilo_bot_db --remote --file="$f" || true
          done

      - name: Ensure R2 buckets exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Create any R2 buckets referenced in wrangler.toml. If they
          # already exist, wrangler returns a non-zero exit which we
          # ignore. New buckets added to wrangler.toml are picked up
          # automatically by adding their name to this list.
          for bucket in aquilo-overlay-references; do
            echo "Ensuring R2 bucket: $bucket"
            npx wrangler r2 bucket create "$bucket" || true
          done

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Smoke check
        run: |
          # Hit a public endpoint to confirm the deploy is live.
          # Fail soft so a brief edge propagation window doesn't fail CI.
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://loadout-discord.aquiloplays.workers.dev/api/dock/registry")
            echo "Try $i, HTTP $code"
            if [ "$code" = "200" ] || [ "$code" = "401" ]; then
              echo "Worker is live."
              exit 0
            fi
            sleep 4
          done
          echo "Worker did not respond cleanly within 20s, check dashboard."
