name: companion-streamkey release

# Builds the Aquilo Streamkey companion into a single-file Windows exe and
# attaches it to a GitHub Release. Triggers only on companion tags so it does
# not collide with the other release workflows.
on:
  push:
    tags:
      - "companion-streamkey-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion-streamkey
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: python build.py

      - name: Smoke-import modules
        run: python -c "import streamlabs_api, token_retriever, local_server, updater, autostart, diag, watchdog_task, category_cache, aitum_writer, obs_ws, presets, session_watchdog, settings, webhook, token_health, youtube_oauth, youtube_api, youtube_controller, _version; print('import ok', _version.__version__)"

      - name: Smoke-test the built exe
        shell: pwsh
        run: |
          # Launch the exe twice, fail the build if either launch context can't
          # bring /healthz up: (A) normal CWD == project dir, and (B) CWD set
          # to %WINDIR%\system32 which is what HKCU\Run, a pinned .lnk without
          # WorkingDirectory, and the Task Scheduler watchdog inherit. (B) is
          # the case that v0.2.5 silently regressed on with --runtime-tmpdir=.
          # so the smoke test must exercise it.
          $exe = (Resolve-Path "dist\AquiloStreamkey.exe").Path
          if (-not (Test-Path $exe)) { throw "Missing $exe after build" }
          function Try-Launch($label, $cwd) {
            Write-Host "=== smoke: $label  (cwd=$cwd) ==="
            $psi = New-Object System.Diagnostics.ProcessStartInfo
            $psi.FileName = $exe
            $psi.UseShellExecute = $false
            $psi.WorkingDirectory = $cwd
            $p = [System.Diagnostics.Process]::Start($psi)
            $ok = $false
            for ($i = 1; $i -le 30; $i++) {
              Start-Sleep -Seconds 1
              try {
                $r = Invoke-WebRequest "http://127.0.0.1:7480/healthz" -UseBasicParsing -TimeoutSec 2
                if ($r.StatusCode -eq 200) {
                  Write-Host "  OK after ${i}s: $($r.Content)"
                  $ok = $true; break
                }
              } catch { Write-Host "  [t=${i}s] no http yet" }
              if ($p.HasExited) { Write-Host "  process exited code=$($p.ExitCode) after ${i}s"; break }
            }
            try {
              $d = Invoke-WebRequest "http://127.0.0.1:7480/debug/diag" -UseBasicParsing -TimeoutSec 3
              Write-Host "  diag: $($d.Content)"
            } catch {}
            Get-Process -Name AquiloStreamkey -ErrorAction SilentlyContinue | Stop-Process -Force
            Start-Sleep -Seconds 1
            return $ok
          }
          $okA = Try-Launch "A normal CWD" (Get-Location).Path
          $okB = Try-Launch "B system32 CWD (regression guard for v0.2.5 bug)" "C:\Windows\System32"
          if (-not $okA) { throw "Smoke A failed: companion never answered /healthz with project CWD" }
          if (-not $okB) { throw "Smoke B failed: bootloader cannot run when CWD is not writable (System32). Check --runtime-tmpdir in build.py." }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Aquilo Streamkey ${{ github.ref_name }}
          files: companion-streamkey/dist/AquiloStreamkey.exe
          body: |
            Aquilo Streamkey companion.

            Download AquiloStreamkey.exe below and run it (system tray). Then add
            the dock in OBS: Docks, Custom Browser Docks, Add,
            https://aquilo.gg/dock/streamkey/

            See companion-streamkey/README.md for setup.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
