name: companion-streamkey release

# Builds the Aquilo Streamkey companion into a single-file Windows exe and
# attaches it to a GitHub Release. Triggers only on companion tags so it does
# not collide with the other release workflows.
on:
  push:
    tags:
      - "companion-streamkey-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion-streamkey
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: python build.py

      - name: Smoke-import modules
        run: python -c "import streamlabs_api, token_retriever, local_server, updater, autostart, diag, watchdog_task, _version; print('import ok', _version.__version__)"

      - name: Smoke-test the built exe
        shell: pwsh
        run: |
          # Launch the exe, poll /healthz for up to 30s, fail the build if it
          # never responds. Catches PyInstaller bootloader failures, missing
          # hidden imports, broken DLL dependencies, and bad runtime-tmpdir
          # config BEFORE we publish a release.
          $exe = "dist\AquiloStreamkey.exe"
          if (-not (Test-Path $exe)) { throw "Missing $exe after build" }
          $p = Start-Process $exe -PassThru
          $ok = $false
          for ($i = 1; $i -le 30; $i++) {
            Start-Sleep -Seconds 1
            try {
              $r = Invoke-WebRequest "http://127.0.0.1:7480/healthz" -UseBasicParsing -TimeoutSec 2
              if ($r.StatusCode -eq 200) {
                Write-Host "smoke OK after ${i}s: $($r.Content)"
                $ok = $true; break
              }
            } catch { Write-Host "[t=${i}s] no http yet" }
          }
          # Pull diag for the build log even if smoke passed; great when CI
          # ever flakes and we need to compare env between runs.
          try {
            $d = Invoke-WebRequest "http://127.0.0.1:7480/debug/diag" -UseBasicParsing -TimeoutSec 3
            Write-Host "diag: $($d.Content)"
          } catch {}
          try { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } catch {}
          Get-Process -Name AquiloStreamkey -ErrorAction SilentlyContinue | Stop-Process -Force
          if (-not $ok) { throw "Smoke test failed: companion never answered /healthz" }

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Aquilo Streamkey ${{ github.ref_name }}
          files: companion-streamkey/dist/AquiloStreamkey.exe
          body: |
            Aquilo Streamkey companion.

            Download AquiloStreamkey.exe below and run it (system tray). Then add
            the dock in OBS: Docks, Custom Browser Docks, Add,
            https://aquilo.gg/dock/streamkey/

            See companion-streamkey/README.md for setup.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
