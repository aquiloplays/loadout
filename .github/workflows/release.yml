name: Release

# Tag-driven release builds. Push a tag like `v0.2.0` and this workflow:
#   1. Compiles Loadout.dll in Release config
#   2. Generates the SB import bundle (loadout-import.sb.txt)
#   3. Packages the release zip (Loadout-vX.Y.Z.zip) with DLL + bundle + readme
#   4. Creates a GitHub Release on aquiloplays/loadout-downloads as draft
#      (this is the public binaries repo; download.aquilo.gg/loadout
#       resolves against it via the aquilo-redirects worker)
#   5. You flip the draft to Published when ready
#   6. The post-release-notes.yml workflow takes over once you publish
#
# ─── Required repo secret ────────────────────────────────────────────────
#   LOADOUT_DOWNLOADS_TOKEN  Fine-grained PAT with `Contents: read & write`
#                            scoped to aquiloplays/loadout-downloads.
#                            The default GITHUB_TOKEN is scoped to THIS
#                            repo only, so we need a separate token to
#                            push releases cross-repo. Generate at
#                            https://github.com/settings/personal-access-tokens
#                            and add as a secret on aquiloplays/loadout.
#
# Versioning convention: tag must start with `v` and match the csproj
# Version. tools/release.ps1 keeps these in sync; CI fails the release
# step if they diverge.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)build a release for (must already exist)'
        required: true
        type: string

permissions:
  contents: write    # required to create the GitHub Release

jobs:
  release:
    name: Build + publish release
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0   # release notes generation walks history

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve tag + version
        id: ver
        shell: pwsh
        run: |
          $tag = if ('${{ inputs.tag }}') { '${{ inputs.tag }}' } else { '${{ github.ref_name }}' }
          if ($tag -notmatch '^v\d+\.\d+\.\d+') {
            throw "Tag '$tag' must look like v0.1.0"
          }
          $version = $tag.TrimStart('v')

          # Sanity-check that the csproj version matches the tag.
          $csproj = Get-Content src/Loadout.Core/Loadout.Core.csproj -Raw
          if ($csproj -notmatch "<Version>$([regex]::Escape($version))</Version>") {
            throw "csproj version does not match tag $tag. Run tools/release.ps1 -Version $version before tagging."
          }

          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Loadout.dll
        shell: pwsh
        run: |
          dotnet build src/Loadout.Core/Loadout.Core.csproj -c Release --nologo
          if ($LASTEXITCODE -ne 0) { throw "Build failed" }

      - name: Generate import bundle
        shell: pwsh
        run: |
          .\tools\build-sb-import.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $stage = "release-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item src/Loadout.Core/bin/Release/net48/Loadout.dll        $stage/
          Copy-Item src/Loadout.Core/bin/Release/net48/Newtonsoft.Json.dll $stage/
          Copy-Item streamerbot/loadout-import.sb.txt                     $stage/
          Copy-Item README.md                                              $stage/README.md
          Copy-Item INSTALL.md                                             $stage/INSTALL.md
          Copy-Item CHANGELOG.md                                           $stage/CHANGELOG.md
          Copy-Item LICENSE                                                $stage/LICENSE

          # Quick-start txt for users who only download the zip.
          # Built via array+join rather than a here-string: YAML's
          # literal block scalar requires every line to be indented
          # at least as much as the block, and a PowerShell here-string
          # whose content sits at column 0 dedents below that, which
          # makes the YAML parser reject the file before any job runs.
          $qs = @(
            "Loadout v${{ steps.ver.outputs.version }}"
            "=========================================="
            ""
            "QUICK INSTALL:"
            ""
            "1. Drop Loadout.dll into <Streamerbot>/data/Loadout/."
            "2. Open Streamer.bot, click Import (top-right), paste the contents"
            "   of loadout-import.sb.txt."
            "3. Restart SB or right-click 'Loadout: Boot' and Run Now."
            "4. The onboarding wizard opens. Pick what you want enabled."
            ""
            "See INSTALL.md and CONFIG.md for the full walkthrough."
            "Issues: https://github.com/aquiloplays/loadout/issues"
          ) -join "`n"
          $qs | Out-File "$stage/QUICKSTART.txt" -Encoding utf8

          Compress-Archive -Path "$stage/*" -DestinationPath "Loadout-${{ steps.ver.outputs.tag }}.zip" -Force
          Get-ChildItem "Loadout-${{ steps.ver.outputs.tag }}.zip"

      - name: Create / update GitHub Release on loadout-downloads (draft)
        uses: softprops/action-gh-release@v2
        with:
          # Cross-repo publish to the public binaries-only repo so
          # download.aquilo.gg/loadout (CF worker) resolves to the
          # latest asset. The default GITHUB_TOKEN can't reach
          # another repo — LOADOUT_DOWNLOADS_TOKEN is a PAT with
          # Contents:write on loadout-downloads.
          repository: aquiloplays/loadout-downloads
          token: ${{ secrets.LOADOUT_DOWNLOADS_TOKEN }}
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Loadout ${{ steps.ver.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            src/Loadout.Core/bin/Release/net48/Loadout.dll
            src/Loadout.Core/bin/Release/net48/Newtonsoft.Json.dll
            streamerbot/loadout-import.sb.txt
            Loadout-${{ steps.ver.outputs.tag }}.zip
