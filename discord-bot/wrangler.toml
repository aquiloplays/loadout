name = "loadout-discord"
main = "worker.js"
compatibility_date = "2025-09-01"

# Free-tier Workers limits: 100k requests/day, 10ms CPU/request. Plenty
# for typical channels. Slash commands are sub-1ms each (KV reads + RNG);
# the only "slow" path is Ed25519 verification (~5ms in WebCrypto).

[vars]
# Public env. Per-guild secrets are stored in KV, not here.
ALLOW_ANY_GUILD = "true"   # set to "false" to lock down to specific guild IDs
DISCORD_APP_ID = "1500849448866025573"
# Aquilo's Vault → Loadout Bolts integration: only this guild can be credited.
# AQUILO_VAULT_BOLTS_SECRET is a worker secret (set via `wrangler secret put`).
AQUILO_VAULT_GUILD_ID = "1504103035951906883"
# Clay's Twitch channel (login: aquilogg) — relay room-key derivation +
# channel gate for /ext/* routes.
CLAY_TWITCH_CHANNEL_ID = "1497793223"

[[kv_namespaces]]
binding = "LOADOUT_BOLTS"
id = "ffa4638187fd4c71b65f62e00b9437fa"

# Hourly Worker crons. worker.js's `scheduled` handler dispatches by
# event.cron so each minute can drive a different job.
#   :17 — stocks price refresh (stocks.js stocksCronTick)
#   :23 — sports games + bet settlement (bet.js betCronTick)
[triggers]
crons = ["17 * * * *", "23 * * * *"]

# Public route: hosted by aquilo.gg. Self-hosters can either set their own
# route here or leave the default *.workers.dev URL after `wrangler deploy`.
# routes = [{ pattern = "loadout-discord.aquilo.gg/*", zone_name = "aquilo.gg" }]
