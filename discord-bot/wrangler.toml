name = "loadout-discord"
main = "worker.js"
compatibility_date = "2025-09-01"

# Free-tier Workers limits: 100k requests/day, 10ms CPU/request. Plenty
# for typical channels. Slash commands are sub-1ms each (KV reads + RNG);
# the only "slow" path is Ed25519 verification (~5ms in WebCrypto).

# Worker secrets (set via `wrangler secret put <NAME>`; values never
# committed):
#   DISCORD_BOT_TOKEN          bot token used by the slash-command +
#                              chat-reactions Discord REST calls
#   DISCORD_PUBLIC_KEY         ed25519 verifier for /interactions
#   AQUILO_SITE_WEB_SECRET     site → bot HMAC for /web/* (incl. the
#                              new /web/chat/recent + react routes)
#   AQUILO_BOT_SECRET          ops → bot for /announce + /broadcast
#   LOADOUT_BOLT_API_SECRET    aquilo ↔ loadout fold cross-call
#   COUNTING_WEBHOOK_SECRET    aquilo-presence → /counting/message
#   GIPHY_API_KEY              REQUIRED for /checkin GIF picker. Get
#                              a server key at https://developers.giphy.com/
#                              and set with `wrangler secret put GIPHY_API_KEY`.
#                              Without it /checkin posts the card but
#                              the GIF picker returns an error.
#   TWITCH_CLIENT_ID           REQUIRED for live-announce + clip cross-post.
#                              Twitch app at dev.twitch.tv/console/apps.
#   TWITCH_CLIENT_SECRET       paired with TWITCH_CLIENT_ID — used to mint
#                              the Helix App Access Token (cached in KV).
#   TWITCH_EVENTSUB_SECRET     long random hex used as the EventSub
#                              webhook HMAC secret. Generate fresh:
#                              `node -e "console.log(crypto.randomBytes(32).toString('hex'))"`
#                              Without all three Twitch secrets the
#                              live-announce + clip features no-op.
#   STREAMERBOT_WEBHOOK_SECRET REQUIRED for /streamerbot/event — Clay
#                              configures the same hex string in
#                              Streamer.bot's HTTP-action signing
#                              (x-aquilo-sb-ts + x-aquilo-sb-sig
#                              headers, SHA-256 over ts+"\n"+body).
#                              Without it the gifter-roles webhook
#                              returns 503.
#   TIKFINITY_WEBHOOK_SECRET   REQUIRED for /tikfinity/event — Clay
#                              pastes the same hex into TikFinity's
#                              "Trigger WebHook" custom header config
#                              (X-TikFinity-Secret). Routes gift
#                              events into the same recordGifterEvent
#                              pipeline as /streamerbot/event. Without
#                              it the bridge returns 503.
#   AQUILO_GATEWAY_SECRET      HMAC secret for the gateway shim's
#                              future signed routes (x-aquilo-gw-ts +
#                              x-aquilo-gw-sig). Same hex on the
#                              shim and the worker. The legacy
#                              x-counting-secret header is still
#                              accepted alongside this for back-compat.
#   PRINTERBOT_RELAY_SECRET    shared secret for the SB -> Worker
#                              receipt mirror at /printerbot/discord-relay.
#                              SB passes it in x-printerbot-secret; the
#                              Worker uses DISCORD_BOT_TOKEN to post the
#                              receipt PNG into the Discord channel.
#                              Without it the relay endpoint returns
#                              503 and the thermal pipeline continues
#                              uninterrupted (fail-open).

[vars]
# Public env. Per-guild secrets are stored in KV, not here.
ALLOW_ANY_GUILD = "true"   # set to "false" to lock down to specific guild IDs
DISCORD_APP_ID = "1500849448866025573"
# Primary Aquilo guild ID. Used as the default/active guild across the
# schedule embeds, stream pings, vote hub, lineup, and admin HMAC auth.
AQUILO_VAULT_GUILD_ID = "1504103035951906883"
# Clay's Twitch channel (login: itsaquilo since the 2026-07-10 rename) —
# relay room-key derivation + channel gate for /ext/* routes. The id
# (991099623) is permanent and survives renames; swapped 2026-06-02 from
# aquilogg (1497793223) per Clay.
CLAY_TWITCH_CHANNEL_ID = "991099623"
# Twitch login slug used for twitch.tv/<login> links + display. Falls
# back to the live Helix lookup; this var is the explicit override.
# Flipped prodigalttv → itsaquilo on rename day 2026-07-10.
CLAY_TWITCH_LOGIN = "itsaquilo"

