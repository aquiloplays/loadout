<svg viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bp_glow" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#78ffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#78ffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#78ffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bp_cyan" cx="36%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#d8ffff"/>
      <stop offset="22%" stop-color="#62e8f3"/>
      <stop offset="55%" stop-color="#21c7d6"/>
      <stop offset="100%" stop-color="#0a4750"/>
    </radialGradient>
    <radialGradient id="bp_magenta" cx="36%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#ffe4fc"/>
      <stop offset="22%" stop-color="#ff84f5"/>
      <stop offset="55%" stop-color="#ff3df0"/>
      <stop offset="100%" stop-color="#5a0a55"/>
    </radialGradient>
    <radialGradient id="bp_lime" cx="36%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#f0ffd6"/>
      <stop offset="22%" stop-color="#c4f06f"/>
      <stop offset="55%" stop-color="#9be23b"/>
      <stop offset="100%" stop-color="#33530d"/>
    </radialGradient>
    <radialGradient id="bp_yellow" cx="36%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#fffbe0"/>
      <stop offset="22%" stop-color="#ffe78a"/>
      <stop offset="55%" stop-color="#ffd24a"/>
      <stop offset="100%" stop-color="#5e4408"/>
    </radialGradient>
    <radialGradient id="bp_orange" cx="36%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#ffe9d6"/>
      <stop offset="22%" stop-color="#ffaa78"/>
      <stop offset="55%" stop-color="#ff7a3d"/>
      <stop offset="100%" stop-color="#5e2407"/>
    </radialGradient>
    <radialGradient id="bp_spec" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bp_shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#15151c" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#15151c" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#15151c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bp_cyanArc" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21c7d6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#9bffff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="bp_magArc" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3df0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff8af6" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="bp_softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="bp_ground" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="bp_shine" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="bp_b"/>
      <feSpecularLighting in="bp_b" surfaceScale="4" specularConstant="0.85" specularExponent="22" lighting-color="#ffffff" result="bp_s">
        <fePointLight x="80" y="60" z="140"/>
      </feSpecularLighting>
      <feComposite in="bp_s" in2="SourceAlpha" operator="in" result="bp_sc"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="bp_sc"/>
      </feMerge>
    </filter>
    <filter id="bp_sparkleblur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="128" cy="218" rx="84" ry="20" fill="url(#bp_shadow)" filter="url(#bp_ground)"/>

  <!-- neon glow halo -->
  <circle cx="128" cy="120" r="96" fill="url(#bp_glow)" filter="url(#bp_softglow)"/>

  <!-- ============ BACK ROW (2 balls) ============ -->
  <!-- back-left: lime -->
  <g filter="url(#bp_shine)">
    <circle cx="92" cy="92" r="40" fill="#15151c"/>
    <circle cx="92" cy="92" r="38" fill="url(#bp_lime)"/>
    <path d="M58 78 A38 38 0 0 1 86 56" fill="none" stroke="url(#bp_cyanArc)" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M126 100 A38 38 0 0 1 102 126" fill="none" stroke="url(#bp_magArc)" stroke-width="3.4" stroke-linecap="round"/>
    <ellipse cx="78" cy="76" rx="13" ry="9" fill="url(#bp_spec)" transform="rotate(-28 78 76)"/>
    <circle cx="100" cy="68" r="2.4" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- back-right: yellow -->
  <g filter="url(#bp_shine)">
    <circle cx="170" cy="90" r="38" fill="#15151c"/>
    <circle cx="170" cy="90" r="36" fill="url(#bp_yellow)"/>
    <path d="M138 78 A36 36 0 0 1 164 56" fill="none" stroke="url(#bp_cyanArc)" stroke-width="3.2" stroke-linecap="round"/>
    <path d="M202 98 A36 36 0 0 1 180 122" fill="none" stroke="url(#bp_magArc)" stroke-width="3.2" stroke-linecap="round"/>
    <ellipse cx="157" cy="74" rx="12" ry="8" fill="url(#bp_spec)" transform="rotate(-28 157 74)"/>
    <circle cx="178" cy="66" r="2.2" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- ============ FRONT ROW (3 balls) ============ -->
  <!-- front-left: cyan -->
  <g filter="url(#bp_shine)">
    <circle cx="74" cy="146" r="44" fill="#15151c"/>
    <circle cx="74" cy="146" r="42" fill="url(#bp_cyan)"/>
    <path d="M36 132 A42 42 0 0 1 66 106" fill="none" stroke="url(#bp_cyanArc)" stroke-width="3.6" stroke-linecap="round"/>
    <path d="M112 156 A42 42 0 0 1 86 184" fill="none" stroke="url(#bp_magArc)" stroke-width="3.6" stroke-linecap="round"/>
    <ellipse cx="58" cy="128" rx="15" ry="10" fill="url(#bp_spec)" transform="rotate(-28 58 128)"/>
    <circle cx="84" cy="120" r="2.8" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- front-right: orange -->
  <g filter="url(#bp_shine)">
    <circle cx="182" cy="148" r="42" fill="#15151c"/>
    <circle cx="182" cy="148" r="40" fill="url(#bp_orange)"/>
    <path d="M146 135 A40 40 0 0 1 174 110" fill="none" stroke="url(#bp_cyanArc)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M218 158 A40 40 0 0 1 194 184" fill="none" stroke="url(#bp_magArc)" stroke-width="3.5" stroke-linecap="round"/>
    <ellipse cx="167" cy="130" rx="14" ry="9" fill="url(#bp_spec)" transform="rotate(-28 167 130)"/>
    <circle cx="191" cy="123" r="2.6" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- front-center: magenta (frontmost) -->
  <g filter="url(#bp_shine)">
    <circle cx="128" cy="162" r="46" fill="#15151c"/>
    <circle cx="128" cy="162" r="44" fill="url(#bp_magenta)"/>
    <path d="M88 148 A44 44 0 0 1 119 121" fill="none" stroke="url(#bp_cyanArc)" stroke-width="3.8" stroke-linecap="round"/>
    <path d="M168 172 A44 44 0 0 1 141 201" fill="none" stroke="url(#bp_magArc)" stroke-width="3.8" stroke-linecap="round"/>
    <ellipse cx="111" cy="143" rx="16" ry="11" fill="url(#bp_spec)" transform="rotate(-28 111 143)"/>
    <circle cx="139" cy="135" r="3" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- ============ SPARKLES ============ -->
  <g filter="url(#bp_sparkleblur)">
    <path d="M40 70 l2 6 6 2 -6 2 -2 6 -2 -6 -6 -2 6 -2 z" fill="#bdffff"/>
    <path d="M214 78 l1.6 5 5 1.6 -5 1.6 -1.6 5 -1.6 -5 -5 -1.6 5 -1.6 z" fill="#ffb6f7"/>
    <path d="M222 150 l1.4 4.4 4.4 1.4 -4.4 1.4 -1.4 4.4 -1.4 -4.4 -4.4 -1.4 4.4 -1.4 z" fill="#eaffd6"/>
    <path d="M34 168 l1.4 4.4 4.4 1.4 -4.4 1.4 -1.4 4.4 -1.4 -4.4 -4.4 -1.4 4.4 -1.4 z" fill="#78ffff"/>
    <path d="M128 60 l1.2 3.8 3.8 1.2 -3.8 1.2 -1.2 3.8 -1.2 -3.8 -3.8 -1.2 3.8 -1.2 z" fill="#ffffff"/>
    <circle cx="58" cy="200" r="2" fill="#9be23b" opacity="0.9"/>
    <circle cx="198" cy="196" r="2" fill="#ffd24a" opacity="0.9"/>
    <circle cx="118" cy="44" r="1.6" fill="#78ffff" opacity="0.9"/>
  </g>
</svg>